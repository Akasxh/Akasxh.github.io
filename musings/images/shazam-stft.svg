<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450" font-family="Montserrat, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <!-- arrowheads -->
    <marker id="arrowI" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748B"/>
    </marker>

    <!-- per-frame magnitude bin fills (light tints) -->
    <linearGradient id="binSky" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="binViolet" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="binAmber" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.90"/>
    </linearGradient>

    <!-- faint dot grid for the outer panel -->
    <pattern id="dotGrid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#EEF2F7"/>
    </pattern>
  </defs>

  <!-- ===== Canvas ===== -->
  <rect width="1000" height="450" fill="#FFFFFF"/>
  <rect x="8" y="8" width="984" height="434" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="8" y="8" width="984" height="434" rx="16" fill="url(#dotGrid)"/>

  <!-- ===== Title ===== -->
  <text x="34" y="46" font-size="27" font-weight="700" fill="#0F172A">Short-Time Fourier Transform</text>
  <text x="34" y="71" font-size="16.5" fill="#64748B">One short, overlapping window at a time &#8594; window &#8594; FFT &#8594; a frequency column per frame</text>

  <!-- stage chips -->
  <g font-size="13" font-weight="700">
    <g transform="translate(34,92)">
      <rect width="120" height="24" rx="12" fill="#EEF0FF" stroke="#C7CCFB" stroke-width="1"/>
      <circle cx="16" cy="12" r="4" fill="#4F46E5"/>
      <text x="28" y="16.5" fill="#3730A3">1&#160;&#160;Waveform</text>
    </g>
    <g transform="translate(372,92)">
      <rect width="150" height="24" rx="12" fill="#F3EEFF" stroke="#DDD0FB" stroke-width="1"/>
      <circle cx="16" cy="12" r="4" fill="#8B5CF6"/>
      <text x="28" y="16.5" fill="#6D28D9">2&#160;&#160;Window &#215; FFT</text>
    </g>
    <g transform="translate(706,92)">
      <rect width="178" height="24" rx="12" fill="#FEF4E6" stroke="#F7D9A6" stroke-width="1"/>
      <circle cx="16" cy="12" r="4" fill="#F59E0B"/>
      <text x="28" y="16.5" fill="#B45309">3&#160;&#160;Frequency columns</text>
    </g>
  </g>

  <!-- ============================================================= -->
  <!-- STAGE 1 : WAVEFORM with overlapping sliding windows           -->
  <!-- ============================================================= -->
  <g>
    <rect x="34" y="132" width="320" height="208" rx="13" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

    <!-- axes -->
    <line x1="58" y1="156" x2="58" y2="300" stroke="#CBD5E1" stroke-width="1.5"/>
    <line x1="58" y1="228" x2="338" y2="228" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="52" y="163" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#94A3B8">+1</text>
    <text x="52" y="298" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#94A3B8">&#8722;1</text>
    <text x="46" y="232" text-anchor="middle" font-size="12.5" fill="#64748B" transform="rotate(-90,46,232)">amplitude</text>
    <text x="338" y="320" text-anchor="end" font-size="12.5" fill="#64748B">time &#8594;</text>

    <!-- three overlapping window bands (50% overlap, hop = half a window) -->
    <!-- frame 1 (sky) -->
    <rect x="78" y="158" width="120" height="140" rx="6" fill="#0EA5E9" opacity="0.10"/>
    <rect x="78" y="158" width="120" height="140" rx="6" fill="none" stroke="#0EA5E9" stroke-width="1.4" stroke-dasharray="5 4"/>
    <!-- frame 2 (violet) -->
    <rect x="138" y="158" width="120" height="140" rx="6" fill="#8B5CF6" opacity="0.10"/>
    <rect x="138" y="158" width="120" height="140" rx="6" fill="none" stroke="#8B5CF6" stroke-width="1.4" stroke-dasharray="5 4"/>
    <!-- frame 3 (amber) -->
    <rect x="198" y="158" width="120" height="140" rx="6" fill="#F59E0B" opacity="0.10"/>
    <rect x="198" y="158" width="120" height="140" rx="6" fill="none" stroke="#F59E0B" stroke-width="1.4" stroke-dasharray="5 4"/>

    <!-- frame index label (single, kept short to avoid crowding the top edge) -->
    <text x="64" y="151" text-anchor="start" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" font-weight="700" fill="#0284C7">overlapping frames m, m+1, m+2</text>
    <!-- frame indices tucked under their bands -->
    <text x="93" y="290" text-anchor="start" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10.5" font-weight="700" fill="#0284C7">m</text>
    <text x="288" y="290" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10.5" font-weight="700" fill="#B45309">m+2</text>

    <!-- complex waveform -->
    <polyline fill="none" stroke="#4F46E5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"
      points="60,228 66,205 72,182 78,170 84,178 90,200 96,224 102,250 108,268 114,272 120,256 126,230 132,206 138,188 144,184 150,196 156,218 162,242 168,260 174,264 180,250 186,226 192,202 198,186 204,184 210,198 216,222 222,246 228,262 234,262 240,244 246,218 252,196 258,184 264,190 270,210 276,234 282,254 288,262 294,254 300,234 306,212 312,196 318,192 324,202 330,218 336,232"/>

    <!-- overlap bracket (hop vs overlap callout) -->
    <line x1="138" y1="312" x2="198" y2="312" stroke="#64748B" stroke-width="1.3"/>
    <line x1="138" y1="308" x2="138" y2="316" stroke="#64748B" stroke-width="1.3"/>
    <line x1="198" y1="308" x2="198" y2="316" stroke="#64748B" stroke-width="1.3"/>
    <text x="168" y="335" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" fill="#475569">hop H</text>

    <!-- window length note, placed in open space at lower-right of the plot -->
    <text x="334" y="335" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#94A3B8">~0.3 s window</text>
  </g>

  <!-- arrow stage1 -> stage2 -->
  <line x1="358" y1="236" x2="372" y2="236" stroke="#4F46E5" stroke-width="2.4" marker-end="url(#arrowI)"/>

  <!-- ============================================================= -->
  <!-- STAGE 2 : Apply Hann window then FFT (per frame)              -->
  <!-- ============================================================= -->
  <g>
    <rect x="376" y="132" width="252" height="208" rx="13" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

    <!-- (a) raw frame -->
    <text x="408" y="158" font-size="12.5" font-weight="600" fill="#334155">frame</text>
    <rect x="394" y="166" width="78" height="58" rx="7" fill="#EEF0FF" stroke="#C7CCFB" stroke-width="1.2"/>
    <polyline fill="none" stroke="#4F46E5" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"
      points="398,195 404,178 410,210 416,184 422,206 428,176 434,204 440,182 446,208 452,186 458,200 464,192 468,196"/>

    <!-- multiply sign -->
    <text x="486" y="200" text-anchor="middle" font-size="20" font-weight="700" fill="#8B5CF6">&#215;</text>

    <!-- (b) Hann window bell -->
    <text x="500" y="158" font-size="12.5" font-weight="600" fill="#334155">Hann w[n]</text>
    <rect x="500" y="166" width="78" height="58" rx="7" fill="#F3EEFF" stroke="#DDD0FB" stroke-width="1.2"/>
    <path d="M504 221 C520 221 522 172 539 172 C556 172 558 221 574 221" fill="#8B5CF6" fill-opacity="0.16"/>
    <path d="M504 221 C520 221 522 172 539 172 C556 172 558 221 574 221" fill="none" stroke="#8B5CF6" stroke-width="2"/>

    <!-- equals -> windowed frame -->
    <line x1="408" y1="244" x2="408" y2="258" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowI)" transform="translate(-2,0)"/>
    <text x="402" y="276" font-size="12.5" font-weight="600" fill="#334155">tapered frame</text>
    <rect x="394" y="282" width="184" height="46" rx="7" fill="#FBFAFF" stroke="#DDD0FB" stroke-width="1.2"/>
    <!-- windowed waveform: same wave tapered by bell envelope -->
    <polyline fill="none" stroke="#7C3AED" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"
      points="400,305 408,303 416,300 424,294 432,289 440,300 448,290 456,296 464,302 472,300 480,304 488,306 496,302 504,306 512,300 520,294 528,289 536,287 544,289 552,294 560,300 568,303 574,305"/>
    <line x1="400" y1="305" x2="574" y2="305" stroke="#C4B5FD" stroke-width="0.8" stroke-dasharray="3 3"/>

    <!-- FFT badge with formula -->
    <line x1="486" y1="244" x2="486" y2="166" stroke="none"/>
    <text x="558" y="200" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#94A3B8"></text>
  </g>

  <!-- FFT formula band under stage 2 -->
  <g>
    <rect x="372" y="350" width="256" height="74" rx="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
    <text x="500" y="370" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6D28D9">FFT of each windowed frame</text>
    <text x="500" y="395" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#0F172A">X[m,k] = &#8721;&#8345; x[n+mH]&#183;w[n]&#183;e^(&#8722;j2&#960;kn/N)</text>
    <text x="500" y="413" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#64748B">m: frame &#183; H: hop &#183; w: Hann &#183; k: bin</text>
  </g>

  <!-- arrow stage2 -> stage3 -->
  <line x1="632" y1="236" x2="648" y2="236" stroke="#4F46E5" stroke-width="2.4" marker-end="url(#arrowI)"/>

  <!-- ============================================================= -->
  <!-- STAGE 3 : One frequency column (magnitude spectrum) per frame -->
  <!-- ============================================================= -->
  <g>
    <rect x="652" y="132" width="314" height="208" rx="13" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

    <!-- shared frequency axis (vertical) + time axis (horizontal) -->
    <line x1="690" y1="156" x2="690" y2="300" stroke="#CBD5E1" stroke-width="1.5"/>
    <line x1="690" y1="300" x2="950" y2="300" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="676" y="228" text-anchor="middle" font-size="12.5" fill="#64748B" transform="rotate(-90,676,228)">frequency</text>
    <text x="950" y="320" text-anchor="end" font-size="12.5" fill="#64748B">time &#8594;</text>
    <line x1="687" y1="160" x2="693" y2="160" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="684" y="164" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10.5" fill="#94A3B8">hi</text>
    <text x="684" y="299" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10.5" fill="#94A3B8">0</text>

    <!-- COLUMN 1 (sky) : frame m  | each bar = one frequency bin, length = magnitude -->
    <g>
      <text x="724" y="313" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#0284C7">m</text>
      <rect x="704" y="288" width="40" height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="276" width="22" height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="264" width="33" height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="252" width="18" height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="240" width="25" height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="228" width="14" height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="216" width="20" height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="204" width="11" height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="192" width="15" height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="180" width="9"  height="9"  rx="2.5" fill="url(#binSky)"/>
      <rect x="704" y="168" width="12" height="9"  rx="2.5" fill="url(#binSky)"/>
    </g>

    <!-- COLUMN 2 (violet) : frame m+1 -->
    <g>
      <text x="800" y="313" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#7C3AED">m+1</text>
      <rect x="780" y="288" width="28" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="276" width="40" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="264" width="22" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="252" width="34" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="240" width="18" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="228" width="27" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="216" width="14" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="204" width="21" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="192" width="12" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="180" width="17" height="9"  rx="2.5" fill="url(#binViolet)"/>
      <rect x="780" y="168" width="10" height="9"  rx="2.5" fill="url(#binViolet)"/>
    </g>

    <!-- COLUMN 3 (amber) : frame m+2  (dominant peak annotated) -->
    <g>
      <text x="876" y="313" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#B45309">m+2</text>
      <rect x="856" y="288" width="20" height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="276" width="31" height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="264" width="16" height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="252" width="60" height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="240" width="24" height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="228" width="13" height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="216" width="19" height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="204" width="10" height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="192" width="14" height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="180" width="9"  height="9"  rx="2.5" fill="url(#binAmber)"/>
      <rect x="856" y="168" width="11" height="9"  rx="2.5" fill="url(#binAmber)"/>

      <!-- peak callout on the dominant bin -->
      <circle cx="919" cy="256.5" r="3.4" fill="#F43F5E"/>
      <text x="956" y="251" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#E11D48">peak bin</text>
      <text x="956" y="265" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10.5" fill="#9F1239">loudest freq</text>
    </g>

    <!-- "one column per frame" note -->
    <text x="809" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">one column = |X[m, k]| per frame</text>
  </g>

  <!-- footer: stack columns -> spectrogram (Step 2) -->
  <g>
    <rect x="652" y="350" width="314" height="74" rx="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
    <text x="809" y="375" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">Slide the window across the whole signal</text>
    <text x="809" y="398" text-anchor="middle" font-size="12.5" fill="#475569">stack every frequency column side by side</text>
    <text x="809" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#0EA5E9">&#8594; the spectrogram (next step)</text>
  </g>
</svg>
