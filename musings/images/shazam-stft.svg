<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="300" fill="#f8f9fa" rx="12"/>

  <!-- Left panel: Waveform -->
  <rect x="30" y="40" width="240" height="200" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="150" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a">Time Domain</text>

  <!-- Sine wave polyline -->
  <polyline fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="45,140 55,110 65,85 75,75 85,85 95,110 105,140 115,170 125,195 135,205 145,195 155,170 165,140 175,110 185,85 195,75 205,85 215,110 225,140 235,170 245,195 255,205"/>

  <!-- Second harmonic overlay -->
  <polyline fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"
    points="45,140 50,125 55,115 60,120 65,135 70,150 75,155 80,145 85,128 90,115 95,118 100,132 105,148 110,155 115,148 120,130 125,115 130,115 135,128 140,148 145,158 150,150 155,132 160,118 165,115 170,125 175,142 180,155 185,152 190,135 195,118 200,112 205,120 210,138 215,152 220,155 225,142 230,125 235,115 240,118 245,130 250,148 255,155"/>

  <!-- Axis labels -->
  <text x="150" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Time</text>
  <text x="38" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" transform="rotate(-90,38,145)">Amplitude</text>

  <!-- Arrow -->
  <line x1="290" y1="140" x2="390" y2="140" stroke="#4f46e5" stroke-width="2.5" marker-end="url(#arrowHead)"/>
  <rect x="315" y="118" width="52" height="22" rx="4" fill="#4f46e5"/>
  <text x="341" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">STFT</text>

  <!-- Right panel: Frequency bars -->
  <rect x="420" y="40" width="250" height="200" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="545" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a">Frequency Domain</text>

  <!-- Frequency bars -->
  <rect x="440" y="155" width="18" height="75" rx="3" fill="url(#barGrad)"/>
  <rect x="465" y="85" width="18" height="145" rx="3" fill="url(#barGrad)"/>
  <rect x="490" y="120" width="18" height="110" rx="3" fill="url(#barGrad)"/>
  <rect x="515" y="65" width="18" height="165" rx="3" fill="url(#barGrad)"/>
  <rect x="540" y="170" width="18" height="60" rx="3" fill="url(#barGrad)"/>
  <rect x="565" y="100" width="18" height="130" rx="3" fill="url(#barGrad)"/>
  <rect x="590" y="185" width="18" height="45" rx="3" fill="url(#barGrad)"/>
  <rect x="615" y="195" width="18" height="35" rx="3" fill="url(#barGrad)"/>
  <rect x="640" y="210" width="18" height="20" rx="3" fill="url(#barGrad)"/>

  <!-- Axis labels -->
  <text x="545" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Frequency (Hz)</text>
  <text x="428" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" transform="rotate(-90,428,145)">Magnitude</text>

  <!-- Baseline -->
  <line x1="435" y1="230" x2="662" y2="230" stroke="#e2e8f0" stroke-width="1"/>
</svg>