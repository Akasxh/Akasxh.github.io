<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="450" viewBox="0 0 1100 450" role="img" aria-label="Comparison of Multi-Head Attention, Grouped-Query Attention and Multi-Query Attention showing 8 query heads sharing 8, 2 and 1 key/value heads respectively">
  <defs>
    <style>
      .ttl   { font-family: Montserrat, 'Segoe UI', system-ui, sans-serif; }
      .lbl   { font-family: Montserrat, 'Segoe UI', system-ui, sans-serif; }
      .mono  { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; }
    </style>
    <!-- soft card shadow -->
    <filter id="card" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <!-- faint dot grid -->
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#EEF2F7"/>
    </pattern>
    <!-- spectrum: larger cache/quality (rose) -> balanced (amber) -> smaller cache/fast (emerald) -->
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#F43F5E"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1100" height="450" fill="#FFFFFF"/>
  <rect x="14" y="14" width="1072" height="422" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="14" y="14" width="1072" height="422" rx="16" fill="url(#dots)"/>

  <!-- Title -->
  <text x="40" y="46" class="ttl" font-size="27" font-weight="700" fill="#0F172A">MHA vs GQA vs MQA</text>
  <text x="40" y="68" class="lbl" font-size="15" fill="#64748B">8 query heads share fewer key/value heads to shrink the KV cache. GQA interpolates between the two extremes.</text>

  <!-- ============================ MHA PANEL ============================ -->
  <g>
    <rect x="40" y="86" width="320" height="266" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#card)"/>
    <rect x="40" y="86" width="320" height="34" rx="14" fill="#EEF0FE"/>
    <rect x="40" y="104" width="320" height="16" fill="#EEF0FE"/>
    <text x="58" y="109" class="ttl" font-size="19" font-weight="700" fill="#4338CA">MHA</text>
    <text x="342" y="108" text-anchor="end" class="lbl" font-size="12.5" fill="#6366F1">Multi-Head Attention</text>

    <!-- Q heads: 8 -->
    <text x="58" y="150" class="lbl" font-size="13" font-weight="700" fill="#4F46E5">Q</text>
    <g class="mono" font-size="11" fill="#3730A3" text-anchor="middle">
      <g fill="#EEF0FE" stroke="#6366F1" stroke-width="1.5">
        <rect x="78"  y="138" width="26" height="26" rx="7"/>
        <rect x="113" y="138" width="26" height="26" rx="7"/>
        <rect x="148" y="138" width="26" height="26" rx="7"/>
        <rect x="183" y="138" width="26" height="26" rx="7"/>
        <rect x="218" y="138" width="26" height="26" rx="7"/>
        <rect x="253" y="138" width="26" height="26" rx="7"/>
        <rect x="288" y="138" width="26" height="26" rx="7"/>
        <rect x="323" y="138" width="26" height="26" rx="7"/>
      </g>
      <text x="91"  y="155">Q1</text><text x="126" y="155">Q2</text><text x="161" y="155">Q3</text><text x="196" y="155">Q4</text>
      <text x="231" y="155">Q5</text><text x="266" y="155">Q6</text><text x="301" y="155">Q7</text><text x="336" y="155">Q8</text>
    </g>

    <!-- connectors: one KV per Q -->
    <g stroke="#94A3B8" stroke-width="1.5">
      <line x1="91"  y1="164" x2="91"  y2="232"/><line x1="126" y1="164" x2="126" y2="232"/>
      <line x1="161" y1="164" x2="161" y2="232"/><line x1="196" y1="164" x2="196" y2="232"/>
      <line x1="231" y1="164" x2="231" y2="232"/><line x1="266" y1="164" x2="266" y2="232"/>
      <line x1="301" y1="164" x2="301" y2="232"/><line x1="336" y1="164" x2="336" y2="232"/>
    </g>

    <!-- KV heads: 8 -->
    <text x="58" y="246" class="lbl" font-size="13" font-weight="700" fill="#0F766E">KV</text>
    <g class="mono" font-size="9.5" text-anchor="middle">
      <g fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.5">
        <rect x="78"  y="232" width="26" height="30" rx="7"/>
        <rect x="113" y="232" width="26" height="30" rx="7"/>
        <rect x="148" y="232" width="26" height="30" rx="7"/>
        <rect x="183" y="232" width="26" height="30" rx="7"/>
        <rect x="218" y="232" width="26" height="30" rx="7"/>
        <rect x="253" y="232" width="26" height="30" rx="7"/>
        <rect x="288" y="232" width="26" height="30" rx="7"/>
        <rect x="323" y="232" width="26" height="30" rx="7"/>
      </g>
      <g fill="#075985">
        <text x="91"  y="250">K1</text><text x="126" y="250">K2</text><text x="161" y="250">K3</text><text x="196" y="250">K4</text>
        <text x="231" y="250">K5</text><text x="266" y="250">K6</text><text x="301" y="250">K7</text><text x="336" y="250">K8</text>
        <text x="91"  y="259">V1</text><text x="126" y="259">V2</text><text x="161" y="259">V3</text><text x="196" y="259">V4</text>
        <text x="231" y="259">V5</text><text x="266" y="259">V6</text><text x="301" y="259">V7</text><text x="336" y="259">V8</text>
      </g>
    </g>

    <!-- KV cache pill -->
    <rect x="110" y="298" width="180" height="38" rx="10" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.5"/>
    <text x="200" y="316" text-anchor="middle" class="lbl" font-size="12" fill="#9F1239">KV cache</text>
    <text x="200" y="331" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#BE123C">8 KV heads &#183; 8&#215;</text>
  </g>

  <!-- ============================ GQA PANEL ============================ -->
  <g>
    <rect x="390" y="86" width="320" height="266" rx="14" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2" filter="url(#card)"/>
    <rect x="390" y="86" width="320" height="34" rx="14" fill="#F3EEFE"/>
    <rect x="390" y="104" width="320" height="16" fill="#F3EEFE"/>
    <text x="408" y="109" class="ttl" font-size="19" font-weight="700" fill="#6D28D9">GQA</text>
    <text x="692" y="108" text-anchor="end" class="lbl" font-size="12.5" fill="#8B5CF6">Grouped-Query Attention</text>

    <!-- group brackets -->
    <rect x="424" y="132" width="128" height="38" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="5,3"/>
    <rect x="566" y="132" width="128" height="38" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="5,3"/>
    <text x="488" y="129" text-anchor="middle" class="lbl" font-size="10.5" fill="#7C3AED">group 1</text>
    <text x="630" y="129" text-anchor="middle" class="lbl" font-size="10.5" fill="#7C3AED">group 2</text>

    <!-- Q heads: 8 -->
    <text x="408" y="156" class="lbl" font-size="13" font-weight="700" fill="#4F46E5">Q</text>
    <g class="mono" font-size="11" text-anchor="middle">
      <g fill="#EEF0FE" stroke="#6366F1" stroke-width="1.5">
        <rect x="430" y="138" width="26" height="26" rx="7"/>
        <rect x="461" y="138" width="26" height="26" rx="7"/>
        <rect x="492" y="138" width="26" height="26" rx="7"/>
        <rect x="523" y="138" width="26" height="26" rx="7"/>
        <rect x="572" y="138" width="26" height="26" rx="7"/>
        <rect x="603" y="138" width="26" height="26" rx="7"/>
        <rect x="634" y="138" width="26" height="26" rx="7"/>
        <rect x="665" y="138" width="26" height="26" rx="7"/>
      </g>
      <g fill="#3730A3">
        <text x="443" y="155">Q1</text><text x="474" y="155">Q2</text><text x="505" y="155">Q3</text><text x="536" y="155">Q4</text>
        <text x="585" y="155">Q5</text><text x="616" y="155">Q6</text><text x="647" y="155">Q7</text><text x="678" y="155">Q8</text>
      </g>
    </g>

    <!-- connectors: 4 Q -> 1 shared KV per group -->
    <g stroke="#A78BFA" stroke-width="1.5">
      <line x1="443" y1="164" x2="488" y2="232"/><line x1="474" y1="164" x2="488" y2="232"/>
      <line x1="505" y1="164" x2="488" y2="232"/><line x1="536" y1="164" x2="488" y2="232"/>
      <line x1="585" y1="164" x2="630" y2="232"/><line x1="616" y1="164" x2="630" y2="232"/>
      <line x1="647" y1="164" x2="630" y2="232"/><line x1="678" y1="164" x2="630" y2="232"/>
    </g>

    <!-- KV heads: 2 -->
    <text x="408" y="250" class="lbl" font-size="13" font-weight="700" fill="#0F766E">KV</text>
    <g class="mono" font-size="11" text-anchor="middle">
      <g fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.5">
        <rect x="472" y="232" width="32" height="32" rx="8"/>
        <rect x="614" y="232" width="32" height="32" rx="8"/>
      </g>
      <g fill="#075985">
        <text x="488" y="246">K1</text><text x="488" y="259">V1</text>
        <text x="630" y="246">K2</text><text x="630" y="259">V2</text>
      </g>
    </g>

    <!-- KV cache pill -->
    <rect x="460" y="298" width="180" height="38" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="550" y="316" text-anchor="middle" class="lbl" font-size="12" fill="#92400E">KV cache</text>
    <text x="550" y="331" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#B45309">2 KV heads &#183; 2&#215;</text>
  </g>

  <!-- ============================ MQA PANEL ============================ -->
  <g>
    <rect x="740" y="86" width="320" height="266" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#card)"/>
    <rect x="740" y="86" width="320" height="34" rx="14" fill="#E7F7F0"/>
    <rect x="740" y="104" width="320" height="16" fill="#E7F7F0"/>
    <text x="758" y="109" class="ttl" font-size="19" font-weight="700" fill="#047857">MQA</text>
    <text x="1042" y="108" text-anchor="end" class="lbl" font-size="12.5" fill="#10B981">Multi-Query Attention</text>

    <!-- Q heads: 8 -->
    <text x="758" y="150" class="lbl" font-size="13" font-weight="700" fill="#4F46E5">Q</text>
    <g class="mono" font-size="11" text-anchor="middle">
      <g fill="#EEF0FE" stroke="#6366F1" stroke-width="1.5">
        <rect x="778"  y="138" width="26" height="26" rx="7"/>
        <rect x="813"  y="138" width="26" height="26" rx="7"/>
        <rect x="848"  y="138" width="26" height="26" rx="7"/>
        <rect x="883"  y="138" width="26" height="26" rx="7"/>
        <rect x="918"  y="138" width="26" height="26" rx="7"/>
        <rect x="953"  y="138" width="26" height="26" rx="7"/>
        <rect x="988"  y="138" width="26" height="26" rx="7"/>
        <rect x="1023" y="138" width="26" height="26" rx="7"/>
      </g>
      <g fill="#3730A3">
        <text x="791"  y="155">Q1</text><text x="826"  y="155">Q2</text><text x="861"  y="155">Q3</text><text x="896"  y="155">Q4</text>
        <text x="931"  y="155">Q5</text><text x="966"  y="155">Q6</text><text x="1001" y="155">Q7</text><text x="1036" y="155">Q8</text>
      </g>
    </g>

    <!-- connectors: all 8 Q -> single KV -->
    <g stroke="#34D399" stroke-width="1.5">
      <line x1="791"  y1="164" x2="913" y2="232"/><line x1="826"  y1="164" x2="913" y2="232"/>
      <line x1="861"  y1="164" x2="913" y2="232"/><line x1="896"  y1="164" x2="913" y2="232"/>
      <line x1="931"  y1="164" x2="913" y2="232"/><line x1="966"  y1="164" x2="913" y2="232"/>
      <line x1="1001" y1="164" x2="913" y2="232"/><line x1="1036" y1="164" x2="913" y2="232"/>
    </g>

    <!-- KV head: 1 -->
    <text x="758" y="252" class="lbl" font-size="13" font-weight="700" fill="#0F766E">KV</text>
    <g class="mono" font-size="11.5" text-anchor="middle">
      <rect x="895" y="231" width="36" height="34" rx="9" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.5"/>
      <text x="913" y="246" fill="#075985">K1</text>
      <text x="913" y="260" fill="#075985">V1</text>
    </g>

    <!-- KV cache pill -->
    <rect x="810" y="298" width="180" height="38" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
    <text x="900" y="316" text-anchor="middle" class="lbl" font-size="12" fill="#065F46">KV cache</text>
    <text x="900" y="331" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#047857">1 KV head &#183; 1&#215;</text>
  </g>

  <!-- ============================ SPECTRUM BAR ============================ -->
  <rect x="120" y="378" width="860" height="12" rx="6" fill="url(#spectrum)" opacity="0.85"/>
  <!-- tick markers aligned under each panel center -->
  <g fill="#475569">
    <circle cx="200" cy="384" r="5" fill="#FFFFFF" stroke="#F43F5E" stroke-width="2"/>
    <circle cx="550" cy="384" r="5" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="900" cy="384" r="5" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  </g>

  <text x="120" y="416" class="lbl" font-size="13" font-weight="700" fill="#0F172A">More quality</text>
  <text x="120" y="432" class="mono" font-size="11.5" fill="#64748B">larger KV cache &#183; more bandwidth</text>

  <text x="550" y="416" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#0F172A">Balanced</text>
  <text x="550" y="432" text-anchor="middle" class="mono" font-size="11.5" fill="#64748B">Llama&#8201;2&#8201;70B (64Q/8KV) &#183; Mistral&#8201;7B</text>

  <text x="980" y="416" text-anchor="end" class="lbl" font-size="13" font-weight="700" fill="#0F172A">Faster decode</text>
  <text x="980" y="432" text-anchor="end" class="mono" font-size="11.5" fill="#64748B">smaller KV cache &#183; less bandwidth</text>
</svg>
