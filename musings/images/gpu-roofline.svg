<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <linearGradient id="bg-rf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glowRf">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="plotClipRf">
      <rect x="120" y="40" width="830" height="420"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1000" height="550" fill="url(#bg-rf)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="white" stroke-width="1">
    <!-- Horizontal grid (log scale Y: positions for 1, 10, 100, 1000, 10000 TFLOPS) -->
    <line x1="120" y1="420" x2="950" y2="420"/>
    <line x1="120" y1="325" x2="950" y2="325"/>
    <line x1="120" y1="230" x2="950" y2="230"/>
    <line x1="120" y1="135" x2="950" y2="135"/>
    <line x1="120" y1="40" x2="950" y2="40"/>
    <!-- Vertical grid (log scale X: positions for 1, 10, 100, 1000) -->
    <line x1="120" y1="40" x2="120" y2="460"/>
    <line x1="397" y1="40" x2="397" y2="460"/>
    <line x1="673" y1="40" x2="673" y2="460"/>
    <line x1="950" y1="40" x2="950" y2="460"/>
  </g>

  <!-- Axes -->
  <line x1="120" y1="460" x2="950" y2="460" stroke="#475569" stroke-width="2"/>
  <line x1="120" y1="40" x2="120" y2="460" stroke="#475569" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="30" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#94a3b8" transform="rotate(-90, 30, 250)">Attainable Performance (TFLOPS)</text>

  <!-- X-axis label -->
  <text x="535" y="530" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#94a3b8">Arithmetic Intensity (FLOP/Byte)</text>

  <!-- Y-axis ticks -->
  <text x="108" y="425" text-anchor="end" font-family="monospace" font-size="13" fill="#64748b">1</text>
  <text x="108" y="330" text-anchor="end" font-family="monospace" font-size="13" fill="#64748b">10</text>
  <text x="108" y="235" text-anchor="end" font-family="monospace" font-size="13" fill="#64748b">100</text>
  <text x="108" y="140" text-anchor="end" font-family="monospace" font-size="13" fill="#64748b">1000</text>
  <text x="108" y="45" text-anchor="end" font-family="monospace" font-size="13" fill="#64748b">10000</text>

  <!-- X-axis ticks -->
  <text x="120" y="480" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">1</text>
  <text x="397" y="480" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">10</text>
  <text x="673" y="480" text-anchor="middle" font-size="13" font-family="monospace" fill="#64748b">100</text>
  <text x="950" y="480" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">1000</text>

  <!-- Tick marks -->
  <line x1="120" y1="460" x2="120" y2="467" stroke="#475569" stroke-width="1.5"/>
  <line x1="397" y1="460" x2="397" y2="467" stroke="#475569" stroke-width="1.5"/>
  <line x1="673" y1="460" x2="673" y2="467" stroke="#475569" stroke-width="1.5"/>
  <line x1="950" y1="460" x2="950" y2="467" stroke="#475569" stroke-width="1.5"/>
  <line x1="115" y1="420" x2="120" y2="420" stroke="#475569" stroke-width="1.5"/>
  <line x1="115" y1="325" x2="120" y2="325" stroke="#475569" stroke-width="1.5"/>
  <line x1="115" y1="230" x2="120" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="115" y1="135" x2="120" y2="135" stroke="#475569" stroke-width="1.5"/>
  <line x1="115" y1="40" x2="120" y2="40" stroke="#475569" stroke-width="1.5"/>

  <!-- Log scale mapping:
    X: log10(AI) mapped to [120, 950], so x = 120 + (log10(AI) - 0) * 276.67
      AI=1 -> 120, AI=10 -> 397, AI=100 -> 673, AI=1000 -> 950
    Y: log10(TFLOPS) mapped to [420, 40] (inverted), so y = 420 - (log10(TF) - 0) * 95
      1 -> 420, 10 -> 325, 100 -> 230, 1000 -> 135, 10000 -> 40

    A100: BW=2TB/s=2000 GB/s, Peak=312 TFLOPS FP16
      Memory-bound slope: perf = AI * BW = AI * 2000 GFLOPS = AI * 2 TFLOPS
      Ridge at AI = 312/2 = 156 FLOP/B => x = 120 + log10(156)*276.67 = 120 + 2.193*276.67 = 727
      At AI=1: 2 TFLOPS => y = 420 - log10(2)*95 = 420 - 28.6 = 391
      Ceiling: 312 TFLOPS => y = 420 - log10(312)*95 = 420 - 2.494*95 = 183

    H100: BW=3.35 TB/s, Peak=1979 TFLOPS
      Ridge at AI = 1979/3.35 = 591 => x = 120 + log10(591)*276.67 = 120 + 2.772*276.67 = 886
      At AI=1: 3.35 TFLOPS => y = 420 - log10(3.35)*95 = 420 - 50 = 370
      Ceiling: 1979 => y = 420 - log10(1979)*95 = 420 - 3.296*95 = 107

    B200: BW=8 TB/s, Peak=4500 TFLOPS
      Ridge at AI = 4500/8 = 562.5 => x = 120 + log10(562.5)*276.67 = 120 + 2.75*276.67 = 881
      At AI=1: 8 TFLOPS => y = 420 - log10(8)*95 = 420 - 85.8 = 334
      Ceiling: 4500 => y = 420 - log10(4500)*95 = 420 - 3.653*95 = 73
  -->

  <g clip-path="url(#plotClipRf)">
    <!-- A100 shaded area -->
    <path d="M 120,391 L 727,183 L 950,183 L 950,460 L 120,460 Z" fill="#4f46e5" opacity="0.06"/>

    <!-- H100 shaded area -->
    <path d="M 120,370 L 886,107 L 950,107 L 950,460 L 120,460 Z" fill="#a855f7" opacity="0.05"/>

    <!-- B200 shaded area -->
    <path d="M 120,334 L 881,73 L 950,73 L 950,460 L 120,460 Z" fill="#f59e0b" opacity="0.04"/>

    <!-- A100 roofline (indigo) -->
    <path d="M 120,391 L 727,183 L 950,183" fill="none" stroke="#6366f1" stroke-width="3" filter="url(#glowRf)"/>
    <!-- Ridge point -->
    <circle cx="727" cy="183" r="8" fill="#6366f1" stroke="white" stroke-width="2" filter="url(#glowRf)"/>

    <!-- H100 roofline (purple) -->
    <path d="M 120,370 L 886,107 L 950,107" fill="none" stroke="#a855f7" stroke-width="3" filter="url(#glowRf)"/>
    <!-- Ridge point -->
    <circle cx="886" cy="107" r="8" fill="#a855f7" stroke="white" stroke-width="2" filter="url(#glowRf)"/>

    <!-- B200 roofline (amber) -->
    <path d="M 120,334 L 881,73 L 950,73" fill="none" stroke="#f59e0b" stroke-width="3" filter="url(#glowRf)"/>
    <!-- Ridge point -->
    <circle cx="881" cy="73" r="8" fill="#f59e0b" stroke="white" stroke-width="2" filter="url(#glowRf)"/>
  </g>

  <!-- A100 ceiling label -->
  <text x="815" y="200" text-anchor="end" font-family="monospace" font-size="12" fill="#818cf8">312 TFLOPS</text>
  <!-- H100 ceiling label -->
  <text x="820" y="100" text-anchor="end" font-family="monospace" font-size="12" fill="#c084fc">1979 TFLOPS</text>
  <!-- B200 ceiling label -->
  <text x="810" y="67" text-anchor="end" font-family="monospace" font-size="12" fill="#fbbf24">4500 TFLOPS</text>

  <!-- Arrow annotation -->
  <path d="M 700,160 Q 780,130 850,95" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="850,95 842,105 852,103" fill="#94a3b8"/>
  <rect x="485" y="145" width="220" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="595" y="163" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8">Each generation: ridge point</text>
  <text x="595" y="180" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8">moves right, harder to saturate</text>

  <!-- Legend -->
  <rect x="140" y="55" width="200" height="105" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="165" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0">GPU Generation</text>
  <line x1="160" y1="95" x2="195" y2="95" stroke="#6366f1" stroke-width="3"/>
  <circle cx="178" cy="95" r="4" fill="#6366f1"/>
  <text x="205" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e2e8f0">A100 (2 TB/s)</text>
  <line x1="160" y1="118" x2="195" y2="118" stroke="#a855f7" stroke-width="3"/>
  <circle cx="178" cy="118" r="4" fill="#a855f7"/>
  <text x="205" y="123" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e2e8f0">H100 (3.35 TB/s)</text>
  <line x1="160" y1="141" x2="195" y2="141" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="178" cy="141" r="4" fill="#f59e0b"/>
  <text x="205" y="146" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e2e8f0">B200 (8 TB/s)</text>

  <!-- Region labels -->
  <text x="250" y="420" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#475569" transform="rotate(-42, 250, 420)">Memory Bound</text>
  <text x="850" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#475569">Compute Bound</text>
</svg>