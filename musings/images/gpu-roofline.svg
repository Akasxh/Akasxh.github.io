<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <clipPath id="plotClip">
      <rect x="80" y="30" width="560" height="260"/>
    </clipPath>
  </defs>

  <rect width="700" height="350" rx="16" fill="url(#bg4)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Plot area -->
  <!-- Y axis: log scale from 1 to 10000 TFLOPS. Map: y=290 is 1, y=30 is 10000. Each decade = 65px -->
  <!-- X axis: log scale from 1 to 1000 FLOP/Byte. Map: x=80 is 1, x=640 is 1000. Each decade = 186.67px -->

  <!-- Grid lines -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- Y grid: 1, 10, 100, 1000, 10000 -->
    <line x1="80" y1="290" x2="640" y2="290"/>
    <line x1="80" y1="225" x2="640" y2="225"/>
    <line x1="80" y1="160" x2="640" y2="160"/>
    <line x1="80" y1="95" x2="640" y2="95"/>
    <line x1="80" y1="30" x2="640" y2="30"/>
    <!-- X grid: 1, 10, 100, 1000 -->
    <line x1="80" y1="30" x2="80" y2="290"/>
    <line x1="267" y1="30" x2="267" y2="290"/>
    <line x1="453" y1="30" x2="453" y2="290"/>
    <line x1="640" y1="30" x2="640" y2="290"/>
  </g>

  <!-- Memory-bound shading -->
  <polygon points="80,290 80,30 320,290" fill="#eef2ff" opacity="0.5" clip-path="url(#plotClip)"/>

  <!-- Axis labels -->
  <text x="360" y="340" text-anchor="middle" font-size="11" fill="#0f172a">Arithmetic Intensity (FLOP/Byte)</text>
  <text x="20" y="160" text-anchor="middle" font-size="11" fill="#0f172a" transform="rotate(-90, 20, 160)">Performance (TFLOPS)</text>

  <!-- X tick labels -->
  <text x="80" y="308" text-anchor="middle" font-size="10" fill="#64748b">1</text>
  <text x="267" y="308" text-anchor="middle" font-size="10" fill="#64748b">10</text>
  <text x="453" y="308" text-anchor="middle" font-size="10" fill="#64748b">100</text>
  <text x="640" y="308" text-anchor="middle" font-size="10" fill="#64748b">1000</text>

  <!-- Y tick labels -->
  <text x="72" y="294" text-anchor="end" font-size="10" fill="#64748b">1</text>
  <text x="72" y="229" text-anchor="end" font-size="10" fill="#64748b">10</text>
  <text x="72" y="164" text-anchor="end" font-size="10" fill="#64748b">100</text>
  <text x="72" y="99" text-anchor="end" font-size="10" fill="#64748b">1K</text>
  <text x="72" y="34" text-anchor="end" font-size="10" fill="#64748b">10K</text>

  <!-- Helper: log10(x) position mapping
       x_pos = 80 + 186.67 * log10(x)     (x from 1 to 1000)
       y_pos = 290 - 65 * log10(y)         (y from 1 to 10000)

       Roofline: perf = min(compute_ceiling, bandwidth * arith_intensity)
       Ridge point: arith_intensity = compute_ceiling / bandwidth

       A100: BW=2000 GB/s = 2 TB/s, compute=312 TFLOPS FP16
         Ridge: 312/2000 = 0.156 FLOP/Byte -> but that's < 1, so on our chart it's off left
         Actually let me reconsider: 312 TFLOPS / 2 TB/s = 156 FLOP/Byte
         Ridge at AI=156: x = 80+186.67*log10(156) = 80+186.67*2.193 = 80+409.4 = 489
         y at ceiling: 290-65*log10(312) = 290-65*2.494 = 290-162.1 = 128

         Memory-bound slope from (1,2): y for AI=1 is BW=2000 GB/s * 1 FLOP/B = 2 TFLOPS
         y_pos = 290-65*log10(2) = 290-19.6 = 270
         Start: (80, 270), ridge: (489, 128), then flat to (640, 128)

       H100: BW=3350 GB/s, compute=1979 TFLOPS
         Ridge: 1979/3.35 = 590.7 -> actually 1979000/3350 = 590.7 FLOP/Byte
         x = 80+186.67*log10(590.7) = 80+186.67*2.771 = 80+517.3 = 597
         y at ceiling: 290-65*log10(1979) = 290-65*3.296 = 290-214.3 = 76

         AI=1: 3.35 TFLOPS -> y = 290-65*log10(3.35) = 290-65*0.525 = 290-34.1 = 256
         Start: (80, 256), ridge: (597, 76), then flat to (640, 76)

       B200: BW=8000 GB/s, compute=4500 TFLOPS
         Ridge: 4500/8 = 562.5 FLOP/Byte
         x = 80+186.67*log10(562.5) = 80+186.67*2.750 = 80+513.3 = 593
         y at ceiling: 290-65*log10(4500) = 290-65*3.653 = 290-237.5 = 52.5

         AI=1: 8 TFLOPS -> y = 290-65*log10(8) = 290-65*0.903 = 290-58.7 = 231
         Start: (80, 231), ridge: (593, 52.5), then flat to (640, 52.5)
  -->

  <g clip-path="url(#plotClip)">
    <!-- A100 roofline -->
    <polyline points="80,270 489,128 640,128" fill="none" stroke="#4f46e5" stroke-width="2.5"/>
    <!-- Ridge point marker -->
    <circle cx="489" cy="128" r="5" fill="white" stroke="#4f46e5" stroke-width="2"/>

    <!-- H100 roofline -->
    <polyline points="80,256 597,76 640,76" fill="none" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="597" cy="76" r="5" fill="white" stroke="#a855f7" stroke-width="2"/>

    <!-- B200 roofline -->
    <polyline points="80,231 593,52 640,52" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <circle cx="593" cy="52" r="5" fill="white" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 45)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#4f46e5" stroke-width="2.5"/>
    <text x="25" y="4" font-size="10" fill="#0f172a" font-weight="600">A100</text>
    <text x="60" y="4" font-size="9" fill="#64748b">312 TFLOPS, 2 TB/s</text>

    <line x1="0" y1="18" x2="20" y2="18" stroke="#a855f7" stroke-width="2.5"/>
    <text x="25" y="22" font-size="10" fill="#0f172a" font-weight="600">H100</text>
    <text x="60" y="22" font-size="9" fill="#64748b">1979 TFLOPS, 3.35 TB/s</text>

    <line x1="0" y1="36" x2="20" y2="36" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="25" y="40" font-size="10" fill="#0f172a" font-weight="600">B200</text>
    <text x="60" y="40" font-size="9" fill="#64748b">4500 TFLOPS, 8 TB/s</text>
  </g>

  <!-- Ridge point annotation -->
  <text x="130" y="275" font-size="9" fill="#64748b" font-style="italic">Memory-bound region</text>

  <!-- Arrow annotation at bottom -->
  <g transform="translate(300, 318)">
    <line x1="0" y1="0" x2="180" y2="0" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <text x="90" y="-6" text-anchor="middle" font-size="8.5" fill="#0f172a" font-weight="600">Ridge point moves right each generation</text>
    <text x="90" y="14" text-anchor="middle" font-size="8" fill="#64748b">Higher arithmetic intensity needed</text>
  </g>

  <!-- Redefine arrow for this context -->
  <defs>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#0f172a"/>
    </marker>
  </defs>
  <!-- Re-draw the arrow with proper marker -->
  <line x1="300" y1="318" x2="480" y2="318" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrowRight)"/>
</svg>