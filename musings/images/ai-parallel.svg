    <circle cx="510" cy="135" r="6"/><circle cx="540" cy="135" r="6"/><circle cx="570" cy="135" r="6"/>
    <circle cx="600" cy="135" r="6"/><circle cx="630" cy="135" r="6"/><circle cx="660" cy="135" r="6"/>
    <circle cx="690" cy="135" r="6"/>
    <!-- Row 4 -->
    <circle cx="420" cy="165" r="6"/><circle cx="450" cy="165" r="6"/><circle cx="480" cy="165" r="6"/>
    <circle cx="510" cy="165" r="6"/><circle cx="540" cy="165" r="6"/><circle cx="570" cy="165" r="6"/>
    <circle cx="600" cy="165" r="6"/><circle cx="630" cy="165" r="6"/><circle cx="660" cy="165" r="6"/>
    <circle cx="690" cy="165" r="6"/>
  </g>

  <text x="562" y="200" text-anchor="middle" font-size="9" fill="#4f46e5" font-style="italic">1000s of parallel AI agents</text>

  <!-- Lines to progress node -->
  <g stroke="#f59e0b" stroke-width="0.7" opacity="0.4">
    <line x1="420" y1="165" x2="562" y2="260"/><line x1="450" y1="165" x2="562" y2="260"/>
    <line x1="480" y1="165" x2="562" y2="260"/><line x1="510" y1="165" x2="562" y2="260"/>
    <line x1="540" y1="165" x2="562" y2="260"/><line x1="570" y1="165" x2="562" y2="260"/>
    <line x1="600" y1="165" x2="562" y2="260"/><line x1="630" y1="165" x2="562" y2="260"/>
    <line x1="660" y1="165" x2="562" y2="260"/><line x1="690" y1="165" x2="562" y2="260"/>
