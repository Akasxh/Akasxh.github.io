    <circle cx="510" cy="105" r="6"/><circle cx="540" cy="105" r="6"/><circle cx="570" cy="105" r="6"/>
    <circle cx="600" cy="105" r="6"/><circle cx="630" cy="105" r="6"/><circle cx="660" cy="105" r="6"/>
    <circle cx="690" cy="105" r="6"/>
    <!-- Row 3 -->
