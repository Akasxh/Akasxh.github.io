<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 350" width="750" height="350" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="750" height="350" rx="16" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Divider -->
  <line x1="375" y1="30" x2="375" y2="320" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- LEFT PANEL: Today -->
  <text x="187" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Today</text>

  <!-- Sparse connections (few thin gray lines) -->
  <line x1="100" y1="110" x2="180" y2="140" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="180" y1="140" x2="270" y2="120" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="140" y1="190" x2="230" y2="170" stroke="#cbd5e1" stroke-width="1.2"/>

  <!-- Expert nodes -->
  <circle cx="100" cy="110" r="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="114" text-anchor="middle" font-size="7" fill="#475569">Fusion</text>

  <circle cx="180" cy="140" r="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="180" y="144" text-anchor="middle" font-size="7" fill="#475569">Materials</text>

  <circle cx="270" cy="120" r="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="270" y="124" text-anchor="middle" font-size="7" fill="#475569">Orbital</text>

  <circle cx="140" cy="190" r="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="140" y="194" text-anchor="middle" font-size="7" fill="#475569">Bio</text>

  <circle cx="230" cy="170" r="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="230" y="174" text-anchor="middle" font-size="7" fill="#475569">CS</text>

  <circle cx="310" cy="185" r="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="310" y="189" text-anchor="middle" font-size="7" fill="#475569">Energy</text>

  <text x="187" y="230" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">~100s of experts per field</text>

  <!-- Dim progress node -->
  <line x1="100" y1="128" x2="187" y2="270" stroke="#cbd5e1" stroke-width="0.8"/>
  <line x1="180" y1="158" x2="187" y2="270" stroke="#cbd5e1" stroke-width="0.8"/>
  <line x1="270" y1="138" x2="187" y2="270" stroke="#cbd5e1" stroke-width="0.8"/>
  <line x1="140" y1="208" x2="187" y2="270" stroke="#cbd5e1" stroke-width="0.8"/>
  <line x1="230" y1="188" x2="187" y2="270" stroke="#cbd5e1" stroke-width="0.8"/>
  <line x1="310" y1="203" x2="187" y2="270" stroke="#cbd5e1" stroke-width="0.8"/>
  <circle cx="187" cy="285" r="22" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="187" y="282" text-anchor="middle" font-size="6.5" fill="#64748b">Civilization</text>
  <text x="187" y="291" text-anchor="middle" font-size="6.5" fill="#64748b">Progress</text>

