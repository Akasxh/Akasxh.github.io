    <line x1="600" y1="75" x2="600" y2="105"/><line x1="600" y1="105" x2="600" y2="135"/>
    <line x1="600" y1="135" x2="600" y2="165"/>
    <line x1="630" y1="75" x2="630" y2="105"/><line x1="630" y1="105" x2="630" y2="135"/>
    <line x1="630" y1="135" x2="630" y2="165"/>
    <line x1="660" y1="75" x2="660" y2="105"/><line x1="660" y1="105" x2="660" y2="135"/>
