<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500">
  <defs>
    <linearGradient id="bg-ai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="leftPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1117"/>
      <stop offset="100%" stop-color="#1a1520"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1c14"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>
    <radialGradient id="goldNode" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="glowAi">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlowAi">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="500" fill="url(#bg-ai)"/>

  <!-- Left Panel: Today -->
  <rect x="20" y="60" width="520" height="420" rx="12" fill="url(#leftPanel)" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="280" y="95" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="bold" fill="#fca5a5">Today</text>

  <!-- Right Panel: With Superhuman AI -->
  <rect x="560" y="60" width="520" height="420" rx="12" fill="url(#rightPanel)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="820" y="95" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="bold" fill="#86efac">With Superhuman AI</text>

  <!-- === LEFT PANEL: Expert Nodes === -->
  <!-- Sparse connections first (behind nodes) -->
  <line x1="130" y1="180" x2="280" y2="260" stroke="#475569" stroke-width="1.5" opacity="0.3"/>
  <line x1="280" y1="180" x2="430" y2="260" stroke="#475569" stroke-width="1.5" opacity="0.3"/>
  <line x1="430" y1="180" x2="280" y2="260" stroke="#475569" stroke-width="1.5" opacity="0.3"/>
  <line x1="130" y1="360" x2="280" y2="260" stroke="#475569" stroke-width="1.5" opacity="0.3"/>
  <line x1="130" y1="180" x2="130" y2="360" stroke="#475569" stroke-width="1" opacity="0.2"/>
  <line x1="430" y1="360" x2="430" y2="180" stroke="#475569" stroke-width="1" opacity="0.2"/>

  <!-- Central node (dim) -->
  <circle cx="280" cy="310" r="18" fill="#475569" opacity="0.4"/>
  <text x="280" y="315" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#94a3b8">Progress</text>

  <!-- Expert nodes -->
  <circle cx="130" cy="180" r="28" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="130" y="175" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e2e8f0">Fusion</text>
  <text x="130" y="190" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Physics</text>

  <circle cx="280" cy="160" r="28" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="280" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e2e8f0">Materials</text>
  <text x="280" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Science</text>

  <circle cx="430" cy="180" r="28" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="430" y="175" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e2e8f0">Orbital</text>
  <text x="430" y="190" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Mechanics</text>

  <circle cx="130" cy="360" r="28" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="130" y="365" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e2e8f0">Biology</text>

  <circle cx="280" cy="410" r="28" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="280" y="405" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e2e8f0">Computer</text>
  <text x="280" y="420" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Science</text>

  <circle cx="430" cy="360" r="28" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="430" y="355" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e2e8f0">Energy</text>
  <text x="430" y="370" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Systems</text>

  <!-- Left panel annotation -->
  <text x="280" y="465" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8">~100s of experts per field</text>

  <!-- === RIGHT PANEL: AI Agent Grid === -->
  <!-- Dense connection web (behind nodes) -->
  <g opacity="0.15" stroke="#22c55e" stroke-width="1">
    <!-- Horizontal connections -->
    <line x1="620" y1="160" x2="1040" y2="160"/>
    <line x1="620" y1="200" x2="1040" y2="200"/>
    <line x1="620" y1="240" x2="1040" y2="240"/>
    <line x1="620" y1="280" x2="1040" y2="280"/>
    <line x1="620" y1="320" x2="1040" y2="320"/>
    <line x1="620" y1="360" x2="1040" y2="360"/>
    <line x1="620" y1="400" x2="1040" y2="400"/>
    <!-- Vertical connections -->
    <line x1="640" y1="130" x2="640" y2="430"/>
    <line x1="690" y1="130" x2="690" y2="430"/>
    <line x1="740" y1="130" x2="740" y2="430"/>
    <line x1="790" y1="130" x2="790" y2="430"/>
    <line x1="840" y1="130" x2="840" y2="430"/>
    <line x1="890" y1="130" x2="890" y2="430"/>
    <line x1="940" y1="130" x2="940" y2="430"/>
    <line x1="990" y1="130" x2="990" y2="430"/>
    <!-- Diagonal connections -->
    <line x1="620" y1="130" x2="1040" y2="430"/>
    <line x1="1040" y1="130" x2="620" y2="430"/>
    <line x1="620" y1="200" x2="900" y2="430"/>
    <line x1="750" y1="130" x2="1040" y2="360"/>
    <line x1="1040" y1="200" x2="750" y2="430"/>
    <line x1="620" y1="360" x2="900" y2="130"/>
  </g>

  <!-- Additional web connections to golden center -->
  <g opacity="0.25" stroke="#fbbf24" stroke-width="1.5">
    <line x1="640" y1="160" x2="820" y2="285"/>
    <line x1="690" y1="200" x2="820" y2="285"/>
    <line x1="740" y1="160" x2="820" y2="285"/>
    <line x1="840" y1="160" x2="820" y2="285"/>
    <line x1="940" y1="200" x2="820" y2="285"/>
    <line x1="990" y1="240" x2="820" y2="285"/>
    <line x1="990" y1="360" x2="820" y2="285"/>
    <line x1="940" y1="400" x2="820" y2="285"/>
    <line x1="840" y1="400" x2="820" y2="285"/>
    <line x1="690" y1="400" x2="820" y2="285"/>
    <line x1="640" y1="360" x2="820" y2="285"/>
    <line x1="640" y1="280" x2="820" y2="285"/>
    <line x1="990" y1="280" x2="820" y2="285"/>
  </g>

  <!-- AI agent dots (grid of small circles) -->
  <g fill="#6366f1">
    <!-- Row 1 -->
    <circle cx="640" cy="160" r="8" opacity="0.8"/><circle cx="690" cy="160" r="8" opacity="0.7"/>
    <circle cx="740" cy="160" r="8" opacity="0.85"/><circle cx="790" cy="160" r="8" opacity="0.75"/>
    <circle cx="840" cy="160" r="8" opacity="0.8"/><circle cx="890" cy="160" r="8" opacity="0.7"/>
    <circle cx="940" cy="160" r="8" opacity="0.85"/><circle cx="990" cy="160" r="8" opacity="0.75"/>
    <!-- Row 2 -->
    <circle cx="640" cy="200" r="8" opacity="0.7"/><circle cx="690" cy="200" r="8" opacity="0.85"/>
    <circle cx="740" cy="200" r="8" opacity="0.75"/><circle cx="790" cy="200" r="8" opacity="0.8"/>
    <circle cx="840" cy="200" r="8" opacity="0.7"/><circle cx="890" cy="200" r="8" opacity="0.85"/>
    <circle cx="940" cy="200" r="8" opacity="0.75"/><circle cx="990" cy="200" r="8" opacity="0.8"/>
    <!-- Row 3 -->
    <circle cx="640" cy="240" r="8" opacity="0.85"/><circle cx="690" cy="240" r="8" opacity="0.75"/>
    <circle cx="740" cy="240" r="8" opacity="0.8"/><circle cx="840" cy="240" r="8" opacity="0.85"/>
    <circle cx="890" cy="240" r="8" opacity="0.75"/><circle cx="940" cy="240" r="8" opacity="0.8"/>
    <circle cx="990" cy="240" r="8" opacity="0.7"/>
    <!-- Row 4 -->
    <circle cx="640" cy="280" r="8" opacity="0.75"/><circle cx="690" cy="280" r="8" opacity="0.8"/>
    <circle cx="740" cy="280" r="8" opacity="0.7"/><circle cx="840" cy="280" r="8" opacity="0.75"/>
    <circle cx="890" cy="280" r="8" opacity="0.8"/><circle cx="940" cy="280" r="8" opacity="0.7"/>
    <circle cx="990" cy="280" r="8" opacity="0.85"/>
    <!-- Row 5 -->
    <circle cx="640" cy="320" r="8" opacity="0.8"/><circle cx="690" cy="320" r="8" opacity="0.7"/>
    <circle cx="740" cy="320" r="8" opacity="0.85"/><circle cx="790" cy="320" r="8" opacity="0.75"/>
    <circle cx="840" cy="320" r="8" opacity="0.8"/><circle cx="890" cy="320" r="8" opacity="0.7"/>
    <circle cx="940" cy="320" r="8" opacity="0.85"/><circle cx="990" cy="320" r="8" opacity="0.75"/>
    <!-- Row 6 -->
    <circle cx="640" cy="360" r="8" opacity="0.7"/><circle cx="690" cy="360" r="8" opacity="0.85"/>
    <circle cx="740" cy="360" r="8" opacity="0.75"/><circle cx="790" cy="360" r="8" opacity="0.8"/>
    <circle cx="840" cy="360" r="8" opacity="0.7"/><circle cx="890" cy="360" r="8" opacity="0.85"/>
    <circle cx="940" cy="360" r="8" opacity="0.75"/><circle cx="990" cy="360" r="8" opacity="0.8"/>
    <!-- Row 7 -->
    <circle cx="640" cy="400" r="8" opacity="0.85"/><circle cx="690" cy="400" r="8" opacity="0.75"/>
    <circle cx="740" cy="400" r="8" opacity="0.8"/><circle cx="790" cy="400" r="8" opacity="0.7"/>
    <circle cx="840" cy="400" r="8" opacity="0.85"/><circle cx="890" cy="400" r="8" opacity="0.75"/>
    <circle cx="940" cy="400" r="8" opacity="0.8"/><circle cx="990" cy="400" r="8" opacity="0.7"/>
  </g>

  <!-- Golden central node (right panel) -->
  <circle cx="820" cy="285" r="28" fill="url(#goldNode)" filter="url(#bigGlowAi)"/>
  <text x="820" y="282" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold" fill="#451a03">Civilization</text>
  <text x="820" y="294" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold" fill="#451a03">Progress</text>

  <!-- Right panel annotation -->
  <text x="820" y="455" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8">1000s of parallel AI agents</text>

  <!-- Divider arrow -->
  <polygon points="545,250 555,240 555,245 570,245 570,255 555,255 555,260" fill="#475569" opacity="0.6"/>
</svg>