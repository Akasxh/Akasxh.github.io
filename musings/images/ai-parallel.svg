    <line x1="540" y1="105" x2="570" y2="135"/><line x1="570" y1="105" x2="600" y2="135"/>
    <line x1="600" y1="105" x2="630" y2="135"/><line x1="630" y1="105" x2="660" y2="135"/>
    <line x1="660" y1="105" x2="690" y2="135"/>
    <line x1="420" y1="135" x2="450" y2="165"/><line x1="450" y1="135" x2="480" y2="165"/>
