<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 350">
  <defs>
    <linearGradient id="bgPi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="matchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadowPi">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowIndPi">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreenPi">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowPi" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#818cf8"/>
    </marker>
    <marker id="arrowGPi" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <pattern id="dotsPi" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#334155" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1100" height="350" fill="url(#bgPi)"/>
  <rect width="1100" height="350" fill="url(#dotsPi)"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0">Shazam Audio Recognition Pipeline</text>

  <!-- Step number circles and boxes -->
  <!-- Y center for boxes: 120, box height: 70 -->

  <!-- Step 1: Record -->
  <circle cx="75" cy="65" r="14" fill="#4f46e5" filter="url(#shadowPi)"/>
  <text x="75" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff">1</text>
  <rect x="15" y="85" width="120" height="70" rx="10" fill="url(#boxGrad)" stroke="#6366f1" stroke-width="2" filter="url(#glowIndPi)"/>
  <text x="75" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#fff">Record</text>
  <text x="75" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">(10 seconds)</text>

  <!-- Arrow 1-2 -->
  <line x1="137" y1="120" x2="162" y2="120" stroke="#818cf8" stroke-width="3" marker-end="url(#arrowPi)"/>

  <!-- Step 2: STFT -->
  <circle cx="225" cy="65" r="14" fill="#4f46e5" filter="url(#shadowPi)"/>
  <text x="225" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff">2</text>
  <rect x="165" y="85" width="120" height="70" rx="10" fill="url(#boxGrad)" stroke="#6366f1" stroke-width="2" filter="url(#glowIndPi)"/>
  <text x="225" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#fff">STFT</text>

  <!-- Arrow 2-3 -->
  <line x1="287" y1="120" x2="312" y2="120" stroke="#818cf8" stroke-width="3" marker-end="url(#arrowPi)"/>

  <!-- Step 3: Spectrogram -->
  <circle cx="385" cy="65" r="14" fill="#4f46e5" filter="url(#shadowPi)"/>
  <text x="385" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff">3</text>
  <rect x="315" y="85" width="140" height="70" rx="10" fill="url(#boxGrad)" stroke="#6366f1" stroke-width="2" filter="url(#glowIndPi)"/>
  <text x="385" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#fff">Spectrogram</text>

  <!-- Arrow 3-4 -->
  <line x1="457" y1="120" x2="482" y2="120" stroke="#818cf8" stroke-width="3" marker-end="url(#arrowPi)"/>

  <!-- Step 4: Peak Extract -->
  <circle cx="555" cy="65" r="14" fill="#4f46e5" filter="url(#shadowPi)"/>
  <text x="555" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff">4</text>
  <rect x="485" y="85" width="140" height="70" rx="10" fill="url(#boxGrad)" stroke="#6366f1" stroke-width="2" filter="url(#glowIndPi)"/>
  <text x="555" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#fff">Peak</text>
  <text x="555" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#fff">Extract</text>

  <!-- Arrow 4-5 -->
  <line x1="627" y1="120" x2="652" y2="120" stroke="#818cf8" stroke-width="3" marker-end="url(#arrowPi)"/>

  <!-- Step 5: Hash Pairs -->
  <circle cx="725" cy="65" r="14" fill="#4f46e5" filter="url(#shadowPi)"/>
  <text x="725" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff">5</text>
  <rect x="655" y="85" width="140" height="70" rx="10" fill="url(#boxGrad)" stroke="#6366f1" stroke-width="2" filter="url(#glowIndPi)"/>
  <text x="725" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#fff">Hash</text>
  <text x="725" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#fff">Pairs</text>

  <!-- Arrow 5-6 -->
  <line x1="797" y1="120" x2="822" y2="120" stroke="#818cf8" stroke-width="3" marker-end="url(#arrowPi)"/>

  <!-- Step 6: Lookup -->
  <circle cx="895" cy="65" r="14" fill="#4f46e5" filter="url(#shadowPi)"/>
  <text x="895" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff">6</text>
  <rect x="825" y="85" width="140" height="70" rx="10" fill="url(#boxGrad)" stroke="#6366f1" stroke-width="2" filter="url(#glowIndPi)"/>
  <text x="895" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#fff">Lookup</text>

  <!-- Arrow 6-7 -->
  <line x1="967" y1="120" x2="992" y2="120" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowGPi)"/>

  <!-- Step 7: Match! -->
  <circle cx="1050" cy="65" r="14" fill="#22c55e" filter="url(#shadowPi)"/>
  <text x="1050" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff">7</text>
  <rect x="995" y="85" width="90" height="70" rx="10" fill="url(#matchGrad)" filter="url(#glowGreenPi)"/>
  <text x="1040" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fff">Match!</text>
  <text x="1040" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#fff">&#x2714;</text>

  <!-- Hash Table (cylinder below Lookup) -->
  <line x1="895" y1="155" x2="895" y2="195" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowPi)"/>

  <!-- Cylinder shape -->
  <ellipse cx="895" cy="210" rx="65" ry="12" fill="#92400e" opacity="0.8"/>
  <rect x="830" y="210" width="130" height="60" fill="#78350f" opacity="0.8"/>
  <ellipse cx="895" cy="270" rx="65" ry="12" fill="#92400e" opacity="0.9"/>
  <ellipse cx="895" cy="210" rx="65" ry="12" fill="#b45309" opacity="0.9"/>

  <text x="895" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fef3c7">Hash Table</text>
  <text x="895" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fde68a">10M+ songs</text>

  <!-- Sub-labels below each box -->
  <text x="75" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Microphone</text>
  <text x="225" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Windowed FFT</text>
  <text x="385" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">T&#xd7;F matrix</text>
  <text x="555" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Local maxima</text>
  <text x="725" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">(f1,f2,&#x394;t)</text>

  <!-- Bottom description -->
  <rect x="200" y="300" width="700" height="35" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="550" y="323" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Total latency: &lt;1 second  |  Hash collisions resolved by temporal alignment scoring</text>
</svg>