<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 250" width="750" height="250">
  <defs>
    <marker id="arrPipe" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f46e5"/>
    </marker>
    <marker id="arrPipeUp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="750" height="250" fill="#f8f9fa" rx="12"/>

  <!-- Pipeline boxes -->
  <!-- Box 1: Mic Record -->
  <rect x="15" y="70" width="80" height="42" rx="8" fill="#4f46e5"/>
  <text x="55" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Mic Record</text>

  <!-- Arrow 1 -->
  <line x1="95" y1="91" x2="118" y2="91" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrPipe)"/>

  <!-- Box 2: STFT -->
  <rect x="120" y="70" width="72" height="42" rx="8" fill="#4f46e5"/>
  <text x="156" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">STFT</text>

  <!-- Arrow 2 -->
  <line x1="192" y1="91" x2="215" y2="91" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrPipe)"/>

  <!-- Box 3: Spectrogram -->
  <rect x="217" y="70" width="100" height="42" rx="8" fill="#4f46e5"/>
  <text x="267" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Spectrogram</text>

  <!-- Arrow 3 -->
  <line x1="317" y1="91" x2="340" y2="91" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrPipe)"/>

  <!-- Box 4: Peak Extract -->
  <rect x="342" y="70" width="95" height="42" rx="8" fill="#4f46e5"/>
  <text x="389" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Peak Extract</text>

  <!-- Arrow 4 -->
  <line x1="437" y1="91" x2="460" y2="91" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrPipe)"/>

  <!-- Box 5: Hash -->
  <rect x="462" y="70" width="68" height="42" rx="8" fill="#4f46e5"/>
  <text x="496" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Hash</text>

  <!-- Arrow 5 -->
  <line x1="530" y1="91" x2="553" y2="91" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrPipe)"/>

  <!-- Box 6: Lookup -->
  <rect x="555" y="70" width="76" height="42" rx="8" fill="#6366f1"/>
  <text x="593" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Lookup</text>

  <!-- Arrow 6 -->
  <line x1="631" y1="91" x2="654" y2="91" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrPipe)"/>

  <!-- Box 7: Match! -->
  <rect x="656" y="70" width="78" height="42" rx="8" fill="#a855f7"/>
  <text x="695" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Match!</text>

  <!-- Database cylinder -->
  <g transform="translate(555, 160)">
    <!-- Cylinder body -->
    <rect x="0" y="10" width="76" height="50" rx="2" fill="white" stroke="#6366f1" stroke-width="1.5"/>
    <!-- Cylinder top ellipse -->
    <ellipse cx="38" cy="12" rx="38" ry="12" fill="white" stroke="#6366f1" stroke-width="1.5"/>
    <!-- Cylinder bottom ellipse (visible arc) -->
    <path d="M0,60 Q0,72 38,72 Q76,72 76,60" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <!-- Inner lines for cylinder look -->
    <ellipse cx="38" cy="12" rx="38" ry="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <!-- Label -->
    <text x="38" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#4f46e5">Hash Table</text>
    <text x="38" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#6366f1">(10M songs)</text>
  </g>

  <!-- Arrow from DB up to Lookup -->
  <line x1="593" y1="160" x2="593" y2="115" stroke="#6366f1" stroke-width="2" marker-end="url(#arrPipeUp)"/>

  <!-- Subtle step numbers -->
  <text x="55" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">1</text>
  <text x="156" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">2</text>
  <text x="267" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">3</text>
  <text x="389" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">4</text>
  <text x="496" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">5</text>
  <text x="593" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">6</text>
</svg>