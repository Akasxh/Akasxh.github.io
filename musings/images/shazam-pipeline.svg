<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="350" viewBox="0 0 1100 350" font-family="Montserrat, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- arrowheads -->
    <marker id="arrSlate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrEmerald" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrIndigo" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6366F1"/>
    </marker>
    <!-- faint dot grid -->
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#EEF2F7"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1100" height="350" fill="#FFFFFF"/>
  <rect x="10" y="10" width="1080" height="330" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="11" y="11" width="1078" height="328" rx="15" fill="url(#dots)"/>

  <!-- title -->
  <text x="34" y="42" font-size="26" font-weight="700" fill="#0F172A">Shazam end-to-end recognition pipeline</text>
  <text x="34" y="64" font-size="14.5" fill="#64748B">Avery Wang, 2003: a noisy 10&#8201;s clip becomes a content-addressable fingerprint, matched in constant time</text>

  <!-- ================= STAGE CARDS (single left-to-right row) ================= -->
  <!-- 7 cards: x starts 50, width 124, gap 22, top 86, height 92 -->

  <!-- inter-stage arrows (drawn first, behind cards is fine since they sit in gaps) -->
  <g stroke-width="2.4" fill="none">
    <line x1="174" y1="132" x2="195" y2="132" stroke="#64748B" marker-end="url(#arrSlate)"/>
    <line x1="320" y1="132" x2="341" y2="132" stroke="#64748B" marker-end="url(#arrSlate)"/>
    <line x1="466" y1="132" x2="487" y2="132" stroke="#64748B" marker-end="url(#arrSlate)"/>
    <line x1="612" y1="132" x2="633" y2="132" stroke="#64748B" marker-end="url(#arrSlate)"/>
    <line x1="758" y1="132" x2="779" y2="132" stroke="#64748B" marker-end="url(#arrSlate)"/>
    <line x1="904" y1="132" x2="925" y2="132" stroke="#F59E0B" marker-end="url(#arrAmber)"/>
  </g>

  <!-- Card 1: Microphone capture -->
  <g>
    <rect x="50" y="86" width="124" height="92" rx="13" fill="#0EA5E9" fill-opacity="0.11" stroke="#0EA5E9" stroke-width="1.8"/>
    <circle cx="73" cy="78" r="11" fill="#0EA5E9"/>
    <text x="73" y="82.5" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
    <!-- mic glyph -->
    <g stroke="#0284C7" stroke-width="2.2" fill="none" stroke-linecap="round">
      <rect x="105" y="100" width="14" height="22" rx="7" fill="#0EA5E9" fill-opacity="0.25"/>
      <path d="M100 116 a12 12 0 0 0 24 0"/>
      <line x1="112" y1="128" x2="112" y2="135"/>
      <line x1="106" y1="135" x2="118" y2="135"/>
    </g>
    <text x="112" y="155" text-anchor="middle" font-size="15.5" font-weight="700" fill="#0F172A">Capture</text>
    <text x="112" y="171" text-anchor="middle" font-size="11.5" fill="#64748B" font-family="'JetBrains Mono', ui-monospace, monospace">~10 s mic audio</text>
  </g>

  <!-- Card 2: STFT -->
  <g>
    <rect x="196" y="86" width="124" height="92" rx="13" fill="#0EA5E9" fill-opacity="0.11" stroke="#0EA5E9" stroke-width="1.8"/>
    <circle cx="219" cy="78" r="11" fill="#0EA5E9"/>
    <text x="219" y="82.5" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
    <!-- waveform -> bars glyph -->
    <g stroke="#0284C7" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M243 112 q5 -10 10 0 t10 0 t10 0"/>
    </g>
    <g fill="#0EA5E9">
      <rect x="276" y="106" width="3.6" height="14" rx="1"/>
      <rect x="282" y="100" width="3.6" height="20" rx="1"/>
      <rect x="288" y="110" width="3.6" height="10" rx="1"/>
    </g>
    <text x="258" y="155" text-anchor="middle" font-size="15.5" font-weight="700" fill="#0F172A">STFT</text>
    <text x="258" y="171" text-anchor="middle" font-size="11.5" fill="#64748B" font-family="'JetBrains Mono', ui-monospace, monospace">~0.3 s windows</text>
  </g>

  <!-- Card 3: Spectrogram -->
  <g>
    <rect x="342" y="86" width="124" height="92" rx="13" fill="#8B5CF6" fill-opacity="0.11" stroke="#8B5CF6" stroke-width="1.8"/>
    <circle cx="365" cy="78" r="11" fill="#8B5CF6"/>
    <text x="365" y="82.5" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
    <!-- spectrogram heat cells -->
    <g>
      <rect x="386" y="100" width="9" height="9" fill="#8B5CF6" fill-opacity="0.30"/>
      <rect x="395" y="100" width="9" height="9" fill="#8B5CF6" fill-opacity="0.85"/>
      <rect x="404" y="100" width="9" height="9" fill="#8B5CF6" fill-opacity="0.45"/>
      <rect x="413" y="100" width="9" height="9" fill="#8B5CF6" fill-opacity="0.20"/>
      <rect x="386" y="109" width="9" height="9" fill="#8B5CF6" fill-opacity="0.55"/>
      <rect x="395" y="109" width="9" height="9" fill="#8B5CF6" fill-opacity="0.25"/>
      <rect x="404" y="109" width="9" height="9" fill="#8B5CF6" fill-opacity="0.90"/>
      <rect x="413" y="109" width="9" height="9" fill="#8B5CF6" fill-opacity="0.50"/>
    </g>
    <text x="404" y="155" text-anchor="middle" font-size="15.5" font-weight="700" fill="#0F172A">Spectrogram</text>
    <text x="404" y="171" text-anchor="middle" font-size="11.5" fill="#64748B" font-family="'JetBrains Mono', ui-monospace, monospace">time &#215; freq</text>
  </g>

  <!-- Card 4: Constellation peak picking -->
  <g>
    <rect x="488" y="86" width="124" height="92" rx="13" fill="#8B5CF6" fill-opacity="0.11" stroke="#8B5CF6" stroke-width="1.8"/>
    <circle cx="511" cy="78" r="11" fill="#8B5CF6"/>
    <text x="511" y="82.5" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
    <!-- constellation peaks -->
    <g fill="#7C3AED">
      <circle cx="536" cy="104" r="2.3"/>
      <circle cx="548" cy="116" r="2.3"/>
      <circle cx="560" cy="101" r="2.3"/>
      <circle cx="544" cy="108" r="2.3"/>
      <circle cx="566" cy="114" r="2.3"/>
      <circle cx="554" cy="120" r="2.3"/>
    </g>
    <text x="550" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">Constellation</text>
    <text x="550" y="171" text-anchor="middle" font-size="11.5" fill="#64748B" font-family="'JetBrains Mono', ui-monospace, monospace">spectral peaks</text>
  </g>

  <!-- Card 5: Hash fingerprints -->
  <g>
    <rect x="634" y="86" width="124" height="92" rx="13" fill="#4F46E5" fill-opacity="0.11" stroke="#4F46E5" stroke-width="1.8"/>
    <circle cx="657" cy="78" r="11" fill="#4F46E5"/>
    <text x="657" y="82.5" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">5</text>
    <!-- anchor->target pair glyph -->
    <g>
      <circle cx="684" cy="116" r="3" fill="#4F46E5"/>
      <circle cx="706" cy="106" r="2.6" fill="#6366F1"/>
      <circle cx="710" cy="118" r="2.6" fill="#6366F1"/>
      <line x1="684" y1="116" x2="706" y2="106" stroke="#6366F1" stroke-width="1.4"/>
      <line x1="684" y1="116" x2="710" y2="118" stroke="#6366F1" stroke-width="1.4"/>
    </g>
    <text x="696" y="155" text-anchor="middle" font-size="15.5" font-weight="700" fill="#0F172A">Hashing</text>
    <text x="696" y="171" text-anchor="middle" font-size="11" fill="#4F46E5" font-family="'JetBrains Mono', ui-monospace, monospace">(f1, f2, &#916;t)</text>
  </g>

  <!-- Card 6: Database lookup -->
  <g>
    <rect x="780" y="86" width="124" height="92" rx="13" fill="#4F46E5" fill-opacity="0.11" stroke="#4F46E5" stroke-width="1.8"/>
    <circle cx="803" cy="78" r="11" fill="#4F46E5"/>
    <text x="803" y="82.5" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">6</text>
    <!-- db cylinder glyph -->
    <g stroke="#4338CA" stroke-width="1.7" fill="#6366F1" fill-opacity="0.22">
      <ellipse cx="828" cy="104" rx="13" ry="4.2"/>
      <path d="M815 104 v14 a13 4.2 0 0 0 26 0 v-14" fill="#6366F1" fill-opacity="0.18"/>
      <path d="M815 111 a13 4.2 0 0 0 26 0" fill="none"/>
    </g>
    <text x="855" y="155" text-anchor="middle" font-size="15.5" font-weight="700" fill="#0F172A">Lookup</text>
    <text x="855" y="171" text-anchor="middle" font-size="11.5" fill="#4F46E5" font-family="'JetBrains Mono', ui-monospace, monospace">O(1) hash hits</text>
  </g>

  <!-- Card 7: Coherence scoring -->
  <g>
    <rect x="926" y="86" width="124" height="92" rx="13" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-width="1.8"/>
    <circle cx="949" cy="78" r="11" fill="#F59E0B"/>
    <text x="949" y="82.5" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">7</text>
    <!-- mini histogram with spike -->
    <g fill="#F59E0B">
      <rect x="975" y="116" width="4" height="4" rx="1" fill-opacity="0.5"/>
      <rect x="981" y="113" width="4" height="7" rx="1" fill-opacity="0.5"/>
      <rect x="987" y="100" width="4" height="20" rx="1"/>
      <rect x="993" y="115" width="4" height="5" rx="1" fill-opacity="0.5"/>
      <rect x="999" y="117" width="4" height="3" rx="1" fill-opacity="0.5"/>
    </g>
    <text x="988" y="155" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0F172A">Scoring</text>
    <text x="988" y="171" text-anchor="middle" font-size="11.5" fill="#B45309" font-family="'JetBrains Mono', ui-monospace, monospace">time-offset vote</text>
  </g>

  <!-- ================= LOWER HALF: two mechanism panels ================= -->

  <!-- Left thesis callout (under cards 1-4) -->
  <text x="50" y="222" font-size="12.5" fill="#334155">A 3-min track yields <tspan font-weight="700" fill="#1E293B">~10,000</tspan> hashes;</text>
  <text x="50" y="240" font-size="12.5" fill="#334155">a 10&#8201;s clip only <tspan font-weight="700" fill="#1E293B">a few hundred</tspan>.</text>
  <text x="50" y="270" font-size="12.5" fill="#64748B">Hashes encode peak <tspan font-style="italic" fill="#475569">relationships</tspan>,</text>
  <text x="50" y="288" font-size="12.5" fill="#64748B">not absolute pitch or time, so the</text>
  <text x="50" y="306" font-size="12.5" fill="#64748B">fingerprint survives noise, gain and EQ.</text>

  <!-- query-hash feed from card 5 (Hashing) down into the lookup panel -->
  <path d="M696 178 C696 192 604 190 604 204" fill="none" stroke="#6366F1" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrIndigo)"/>
  <text x="592" y="200" text-anchor="end" font-size="10.5" fill="#6366F1" font-family="'JetBrains Mono', ui-monospace, monospace">query hashes</text>

  <!-- PANEL A: Lookup / pre-indexed hash table (under stages 5-6) -->
  <g>
    <rect x="430" y="205" width="318" height="96" rx="12" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
    <text x="448" y="227" font-size="13.5" font-weight="700" fill="#3730A3">Database lookup &#183; O(1) per hash</text>
    <text x="448" y="245" font-size="11.5" fill="#475569" font-family="'JetBrains Mono', ui-monospace, monospace">millions of songs &#8226; billions of hashes</text>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11">
      <rect x="448" y="255" width="282" height="17" rx="4" fill="#EEF2FF" stroke="#E0E7FF" stroke-width="1"/>
      <text x="457" y="267" fill="#4338CA">0x3af1</text>
      <text x="520" y="267" fill="#64748B">&#8594; (songID, t&#8321;), (songID, t&#8322;)</text>
      <rect x="448" y="276" width="282" height="17" rx="4" fill="#EEF2FF" stroke="#E0E7FF" stroke-width="1"/>
      <text x="457" y="288" fill="#4338CA">0x9c20</text>
      <text x="520" y="288" fill="#64748B">&#8594; (songID, t&#8323;)</text>
    </g>
  </g>

  <!-- feed arrow: lookup hits -> scoring (routed cleanly in the gap between panels) -->
  <path d="M748 253 C758 253 758 253 762 253" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrSlate)"/>
  <text x="755" y="244" text-anchor="middle" font-size="10" fill="#94A3B8" font-family="'JetBrains Mono', ui-monospace, monospace">hits</text>

  <!-- PANEL B: Time-offset coherence scoring (under stage 7) -->
  <g>
    <rect x="764" y="205" width="302" height="96" rx="12" fill="#FFFFFF" stroke="#FCD9A6" stroke-width="1.5"/>
    <text x="781" y="227" font-size="13.5" font-weight="700" fill="#B45309">Time-offset coherence</text>
    <!-- axes -->
    <line x1="783" y1="288" x2="912" y2="288" stroke="#CBD5E1" stroke-width="1.3"/>
    <line x1="783" y1="244" x2="783" y2="288" stroke="#CBD5E1" stroke-width="1.3"/>
    <!-- vote histogram: scattered low bars + one sharp spike -->
    <g fill="#F59E0B">
      <rect x="788" y="282" width="4.5" height="6" rx="1" fill-opacity="0.4"/>
      <rect x="796" y="279" width="4.5" height="9" rx="1" fill-opacity="0.4"/>
      <rect x="804" y="283" width="4.5" height="5" rx="1" fill-opacity="0.4"/>
      <rect x="824" y="252" width="4.5" height="36" rx="1"/>
      <rect x="848" y="282" width="4.5" height="6" rx="1" fill-opacity="0.4"/>
      <rect x="856" y="280" width="4.5" height="8" rx="1" fill-opacity="0.4"/>
      <rect x="872" y="284" width="4.5" height="4" rx="1" fill-opacity="0.4"/>
      <rect x="888" y="281" width="4.5" height="7" rx="1" fill-opacity="0.4"/>
      <rect x="900" y="283" width="4.5" height="5" rx="1" fill-opacity="0.4"/>
    </g>
    <!-- spike callout -->
    <text x="826" y="248" text-anchor="middle" font-size="10" font-weight="700" fill="#B45309">spike</text>
    <text x="848" y="299" text-anchor="middle" font-size="9.5" fill="#94A3B8" font-family="'JetBrains Mono', ui-monospace, monospace">offset = t_ref &#8722; t_query</text>
    <!-- explanatory note (right column, fits inside panel) -->
    <text x="926" y="246" font-size="11" fill="#1E293B" font-weight="700">True match:</text>
    <text x="926" y="262" font-size="11" fill="#475569">votes pile at one</text>
    <text x="926" y="276" font-size="11" fill="#475569">constant &#916;.</text>
    <text x="926" y="293" font-size="11" fill="#94A3B8">False hits scatter.</text>
  </g>
  <!-- lookup hits feed scoring from card 7 down -->
  <path d="M988 178 L988 203" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrAmber)"/>

  <!-- MATCH terminal (under panel B) -->
  <g>
    <rect x="838" y="312" width="228" height="30" rx="9" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-width="1.8"/>
    <circle cx="858" cy="327" r="8.5" fill="#10B981"/>
    <path d="M854 327 l3 3 l5.5 -6" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="878" y="332" font-size="14.5" font-weight="700" fill="#065F46">Song identified</text>
  </g>
  <!-- scoring -> match -->
  <path d="M915 301 L915 310" fill="none" stroke="#10B981" stroke-width="2.2" marker-end="url(#arrEmerald)"/>
</svg>
