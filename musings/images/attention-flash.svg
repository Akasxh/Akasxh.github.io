<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="Montserrat, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- arrowheads -->
    <marker id="fa-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
    <marker id="fa-arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
    <marker id="fa-arrow-rose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F43F5E"/>
    </marker>
    <marker id="fa-arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10B981"/>
    </marker>
    <pattern id="fa-dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#EEF2F7"/>
    </pattern>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="1000" height="500" fill="#FFFFFF"/>
  <rect x="10" y="10" width="980" height="480" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="11" y="11" width="978" height="478" rx="15" fill="url(#fa-dots)"/>

  <!-- ===== Title ===== -->
  <text x="40" y="50" font-size="27" font-weight="700" fill="#0F172A">FlashAttention &#183; IO-aware tiling + online softmax</text>
  <text x="40" y="74" font-size="15.5" fill="#64748B">Exact attention that keeps work in fast SRAM and never writes the full N&#215;N score matrix to slow HBM</text>

  <!-- divider -->
  <line x1="40" y1="90" x2="960" y2="90" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ===================================================================== -->
  <!-- LEFT PANEL : GPU MEMORY HIERARCHY                                      -->
  <!-- ===================================================================== -->
  <text x="40" y="124" font-size="16.5" font-weight="700" fill="#334155">GPU memory hierarchy (A100)</text>
  <text x="40" y="145" font-size="13" fill="#64748B">small + fast on top, large + slow at the bottom</text>

  <!-- SRAM (top, smallest, fastest) -->
  <rect x="118" y="160" width="170" height="58" rx="12" fill="#6366F1" fill-opacity="0.14" stroke="#4F46E5" stroke-width="2"/>
  <text x="203" y="184" text-anchor="middle" font-size="17" font-weight="700" fill="#3730A3">SRAM &#183; on-chip</text>
  <text x="203" y="206" text-anchor="middle" font-size="13.5" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#4F46E5">192 KB/SM &#183; ~19 TB/s</text>

  <!-- L2 (middle) -->
  <rect x="78" y="232" width="250" height="56" rx="12" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-width="2"/>
  <text x="203" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#6D28D9">L2 cache</text>
  <text x="203" y="277" text-anchor="middle" font-size="13.5" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C3AED">40 MB</text>

  <!-- HBM (bottom, largest, slowest) -->
  <rect x="46" y="302" width="314" height="62" rx="12" fill="#0EA5E9" fill-opacity="0.10" stroke="#0EA5E9" stroke-width="2"/>
  <text x="203" y="327" text-anchor="middle" font-size="17" font-weight="700" fill="#075985">HBM &#183; off-chip main memory</text>
  <text x="203" y="349" text-anchor="middle" font-size="13.5" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#0369A1">80 GB &#183; ~2 TB/s</text>

  <!-- size / speed gradient axes -->
  <line x1="386" y1="166" x2="386" y2="360" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#fa-arrow-slate)"/>
  <text x="398" y="180" font-size="12" fill="#64748B">bigger</text>
  <text x="398" y="356" font-size="12" fill="#64748B">capacity</text>

  <line x1="30" y1="360" x2="30" y2="166" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#fa-arrow-slate)"/>
  <text x="20" y="178" font-size="12" fill="#64748B" transform="rotate(-90 20 178)" text-anchor="start">faster</text>

  <!-- speed factor callout -->
  <text x="203" y="386" text-anchor="middle" font-size="12.5" fill="#64748B">SRAM is</text>
  <text x="203" y="404" text-anchor="middle" font-size="13.5" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700" fill="#4F46E5">~10&#215; the bandwidth of HBM</text>

  <!-- naive vs flash mini contrast -->
  <rect x="40" y="420" width="346" height="54" rx="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="60" cy="438" r="5.5" fill="#F43F5E" fill-opacity="0.18" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="74" y="442" font-size="12.5" fill="#9F1239" font-weight="600">Standard:</text>
  <text x="142" y="442" font-size="12.5" fill="#64748B">writes full N&#215;N to HBM, reads it back &#8594; O(N&#178;) mem</text>
  <circle cx="60" cy="460" r="5.5" fill="#10B981" fill-opacity="0.18" stroke="#10B981" stroke-width="1.5"/>
  <text x="74" y="464" font-size="12.5" fill="#047857" font-weight="600">Flash:</text>
  <text x="120" y="464" font-size="12.5" fill="#64748B">tiles stay in SRAM, N&#215;N never materialized &#8594; O(N)</text>

  <!-- ===================================================================== -->
  <!-- divider between panels                                                 -->
  <!-- ===================================================================== -->
  <line x1="436" y1="104" x2="436" y2="476" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- ===================================================================== -->
  <!-- RIGHT PANEL : TILING + ONLINE SOFTMAX                                  -->
  <!-- ===================================================================== -->
  <text x="468" y="124" font-size="16.5" font-weight="700" fill="#334155">Block-by-block compute in SRAM</text>
  <text x="468" y="145" font-size="13" fill="#64748B">load Q/K/V tiles &#8594; partial attention &#8594; online softmax rescale</text>

  <!-- Q tile (loaded once per outer block) -->
  <rect x="468" y="166" width="64" height="64" rx="10" fill="#4F46E5" fill-opacity="0.13" stroke="#4F46E5" stroke-width="2"/>
  <line x1="468" y1="187.3" x2="532" y2="187.3" stroke="#4F46E5" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="468" y1="208.6" x2="532" y2="208.6" stroke="#4F46E5" stroke-width="1" stroke-opacity="0.5"/>
  <text x="500" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#3730A3" font-family="'JetBrains Mono', ui-monospace, monospace">Q&#7522;</text>

  <!-- K,V tiles, looped (shown as a small stack) -->
  <rect x="566" y="174" width="58" height="56" rx="10" fill="#0EA5E9" fill-opacity="0.10" stroke="#0EA5E9" stroke-width="1.4" stroke-opacity="0.6"/>
  <rect x="560" y="168" width="58" height="56" rx="10" fill="#0EA5E9" fill-opacity="0.12" stroke="#0EA5E9" stroke-width="2"/>
  <line x1="560" y1="186.6" x2="618" y2="186.6" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.55"/>
  <line x1="560" y1="205.3" x2="618" y2="205.3" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.55"/>
  <text x="589" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#075985" font-family="'JetBrains Mono', ui-monospace, monospace">K&#11388;, V&#11388;</text>
  <text x="500" y="264" text-anchor="middle" font-size="10.5" fill="#94A3B8">query tile</text>
  <text x="589" y="264" text-anchor="middle" font-size="10.5" fill="#94A3B8">KV blocks j = 1..T</text>

  <!-- arrow Q,K,V -> compute -->
  <path d="M624,200 H668" fill="none" stroke="#64748B" stroke-width="1.8" marker-end="url(#fa-arrow-slate)"/>

  <!-- Partial scores S_ij = Qi Kj^T (computed in SRAM, never stored to HBM) -->
  <rect x="670" y="166" width="118" height="64" rx="10" fill="#F8FAFC" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="729" y="190" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6D28D9">partial scores</text>
  <text x="729" y="210" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C3AED">S&#7522;&#11388; = Q&#7522;K&#11388;&#7488;</text>
  <text x="729" y="224" text-anchor="middle" font-size="10.5" fill="#94A3B8">one tile, in SRAM</text>

  <!-- arrow to online softmax -->
  <path d="M788,198 H832" fill="none" stroke="#64748B" stroke-width="1.8" marker-end="url(#fa-arrow-slate)"/>

  <!-- Online softmax running-state box -->
  <rect x="834" y="158" width="118" height="80" rx="11" fill="#F59E0B" fill-opacity="0.10" stroke="#F59E0B" stroke-width="2"/>
  <text x="893" y="178" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B45309">online softmax</text>
  <text x="893" y="200" text-anchor="middle" font-size="13.5" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#92400E">m &#8592; max(m, S)</text>
  <text x="893" y="220" text-anchor="middle" font-size="13.5" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#92400E">l &#8592; &#945;&#183;l + &#931;e^(S&#8722;m)</text>

  <!-- accumulator / running output -->
  <rect x="670" y="262" width="282" height="70" rx="11" fill="#10B981" fill-opacity="0.10" stroke="#10B981" stroke-width="2"/>
  <text x="811" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">rescale &amp; accumulate output (stays on-chip)</text>
  <text x="811" y="309" text-anchor="middle" font-size="14.5" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#065F46">O&#7522; &#8592; diag(&#945;)&#8315;&#185; O&#7522; + P&#771;&#7522;&#11388; V&#11388;</text>
  <text x="811" y="325" text-anchor="middle" font-size="10.5" fill="#94A3B8">running output for the Q tile, corrected as m, l update</text>

  <!-- arrow from softmax down to accumulator -->
  <path d="M893,238 V250 H839 V260" fill="none" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#fa-arrow-emerald)"/>
  <!-- arrow from partial scores down into accumulator -->
  <path d="M729,230 V252 H712 V260" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#fa-arrow-emerald)"/>

  <!-- loop-back arrow (next K/V block reuses same running state) -->
  <path d="M670,300 H648 V200 H636" fill="none" stroke="#10B981" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#fa-arrow-emerald)"/>
  <text x="657" y="248" font-size="10.5" fill="#047857" text-anchor="middle">next j</text>

  <!-- final write -->
  <path d="M811,332 V354" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#fa-arrow-emerald)"/>
  <rect x="700" y="356" width="222" height="40" rx="10" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-width="2"/>
  <text x="811" y="381" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065F46">final O written to HBM &#183; size O(N)</text>

  <!-- guarantee chip: N x N never stored -->
  <rect x="468" y="356" width="208" height="40" rx="10" fill="#FFFFFF" stroke="#F43F5E" stroke-width="1.8"/>
  <path d="M484,366 l14,20 M498,366 l-14,20" stroke="#F43F5E" stroke-width="2.4" stroke-linecap="round"/>
  <text x="511" y="372" font-size="12.5" font-weight="700" fill="#9F1239" font-family="'JetBrains Mono', ui-monospace, monospace">N&#215;N</text>
  <text x="511" y="388" font-size="11.5" fill="#64748B">never written to HBM</text>

  <!-- ===== bottom takeaway bar (spans both panels) ===== -->
  <rect x="40" y="450" width="0" height="0" fill="none"/>
  <g transform="translate(468,420)">
    <rect x="0" y="0" width="484" height="26" rx="13" fill="#4F46E5" fill-opacity="0.10" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="242" y="18" text-anchor="middle" font-size="14" font-weight="700" fill="#3730A3">
      <tspan font-family="'JetBrains Mono', ui-monospace, monospace">O(N&#178;) &#8594; O(N)</tspan>
      <tspan fill="#475569" font-weight="600" font-family="Montserrat, system-ui, sans-serif" font-size="13"> memory &#183; same exact result, 2-4&#215; faster</tspan>
    </text>
  </g>
</svg>
