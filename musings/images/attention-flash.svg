<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#4f46e5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="30" y="28" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">GPU Memory Hierarchy</text>

  <!-- Pyramid / Stack -->
  <!-- HBM - bottom, largest -->
  <rect x="60" y="230" width="340" height="80" rx="8" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="1.5"/>
  <text x="230" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#a855f7">HBM</text>
  <text x="230" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="rgba(15,23,42,0.6)">80 GB</text>
  <text x="230" y="296" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(15,23,42,0.45)">~2 TB/s bandwidth</text>

  <!-- L2 Cache - middle -->
  <rect x="110" y="145" width="240" height="70" rx="8" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
  <text x="230" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#6366f1">L2 Cache</text>
  <text x="230" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="rgba(15,23,42,0.6)">40 MB</text>

  <!-- SRAM - top, smallest -->
  <rect x="155" y="55" width="150" height="75" rx="8" fill="#4f46e5" opacity="0.18" stroke="#4f46e5" stroke-width="2"/>
  <text x="230" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#4f46e5">SRAM</text>
  <text x="230" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(15,23,42,0.6)">192 KB per SM</text>
  <text x="230" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(15,23,42,0.45)">~19 TB/s bandwidth</text>

  <!-- Speed labels on left -->
  <text x="45" y="92" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#4f46e5" font-weight="600">FAST</text>
  <line x1="25" y1="100" x2="25" y2="280" stroke="rgba(15,23,42,0.15)" stroke-width="1.5"/>
  <polygon points="25,100 21,112 29,112" fill="rgba(15,23,42,0.15)"/>
  <polygon points="25,280 21,268 29,268" fill="rgba(15,23,42,0.15)"/>
  <text x="45" y="278" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#a855f7" font-weight="600">SLOW</text>

  <!-- Right side comparison -->
  <!-- Standard Attention (bad) -->
  <g transform="translate(440, 70)">
    <rect x="0" y="0" width="240" height="100" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
    <text x="18" y="22" font-family="system-ui,sans-serif" font-size="16" fill="#ef4444" font-weight="700">&#x2717;</text>
    <text x="38" y="22" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#dc2626">Standard Attention</text>
    <text x="20" y="42" font-family="system-ui,sans-serif" font-size="10.5" fill="#0f172a" opacity="0.7">1. Write N x N matrix to HBM</text>
    <text x="20" y="57" font-family="system-ui,sans-serif" font-size="10.5" fill="#0f172a" opacity="0.7">2. Read back for softmax</text>
    <text x="20" y="72" font-family="system-ui,sans-serif" font-size="10.5" fill="#0f172a" opacity="0.7">3. Write softmax result to HBM</text>
    <text x="20" y="87" font-family="system-ui,sans-serif" font-size="10.5" fill="#0f172a" opacity="0.7">4. Read back for V multiply</text>
  </g>

  <!-- FlashAttention (good) -->
  <g transform="translate(440, 195)">
    <rect x="0" y="0" width="240" height="110" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    <text x="18" y="22" font-family="system-ui,sans-serif" font-size="16" fill="#22c55e" font-weight="700">&#x2713;</text>
    <text x="38" y="22" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#16a34a">FlashAttention</text>
    <text x="20" y="42" font-family="system-ui,sans-serif" font-size="10.5" fill="#0f172a" opacity="0.7">1. Load Q, K, V tiles into SRAM</text>
    <text x="20" y="57" font-family="system-ui,sans-serif" font-size="10.5" fill="#0f172a" opacity="0.7">2. Compute attention in SRAM</text>
    <text x="20" y="72" font-family="system-ui,sans-serif" font-size="10.5" fill="#0f172a" opacity="0.7">3. Online softmax (incremental)</text>
    <text x="20" y="87" font-family="system-ui,sans-serif" font-size="10.5" fill="#0f172a" opacity="0.7">4. Write only final output to HBM</text>
    <text x="20" y="103" font-family="system-ui,sans-serif" font-size="10" fill="#16a34a" font-weight="600">Memory: O(N) not O(N²)</text>
  </g>

  <!-- Connecting arrow from pyramid to comparison -->
  <line x1="400" y1="270" x2="438" y2="250" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="305" y1="92" x2="438" y2="92" stroke="#4f46e5" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
</svg>