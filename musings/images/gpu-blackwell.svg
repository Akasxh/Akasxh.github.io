<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 350" width="750" height="350" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="dieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="hbmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="750" height="350" rx="16" fill="url(#bg3)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">B200: 192 GB HBM3e, 8 TB/s bandwidth</text>

  <!-- HBM3e stacks - Left of Die 0 -->
  <g>
    <rect x="50" y="70" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="72" y="87" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="50" y="100" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="72" y="117" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="50" y="130" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="72" y="147" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="50" y="160" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="72" y="177" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="50" y="190" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="72" y="207" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="50" y="220" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="72" y="237" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
  </g>

  <!-- Connections HBM to Die 0 -->
  <g stroke="#a855f7" stroke-width="1.5" opacity="0.5">
    <line x1="95" y1="82" x2="120" y2="82"/><line x1="95" y1="112" x2="120" y2="112"/>
    <line x1="95" y1="142" x2="120" y2="142"/><line x1="95" y1="172" x2="120" y2="172"/>
    <line x1="95" y1="202" x2="120" y2="202"/><line x1="95" y1="232" x2="120" y2="232"/>
  </g>

  <!-- Die 0 -->
  <rect x="120" y="55" width="230" height="210" rx="12" fill="url(#dieGrad)" stroke="#312e81" stroke-width="2"/>
  <text x="235" y="140" text-anchor="middle" font-size="22" font-weight="700" fill="white">Die 0</text>
  <text x="235" y="165" text-anchor="middle" font-size="11" fill="#c7d2fe">5th Gen Tensor Cores</text>
  <text x="235" y="182" text-anchor="middle" font-size="11" fill="#c7d2fe">FP4 / FP8 / BF16</text>
  <text x="235" y="199" text-anchor="middle" font-size="10" fill="#a5b4fc">Transformer Engine v2</text>

  <!-- Die-to-Die Interconnect -->
  <rect x="355" y="55" width="40" height="210" rx="6" fill="#f59e0b" opacity="0.9"/>
  <text x="375" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#0f172a" transform="rotate(-90, 375, 145)">10 TB/s Die-to-Die</text>

  <!-- Bidirectional arrows in the interconnect -->
  <g stroke="#92400e" stroke-width="1.5">
    <line x1="362" y1="80" x2="362" y2="240"/>
    <line x1="388" y1="240" x2="388" y2="80"/>
    <polygon points="359,82 362,72 365,82" fill="#92400e"/>
    <polygon points="385,238 388,248 391,238" fill="#92400e"/>
  </g>

  <!-- Die 1 -->
  <rect x="400" y="55" width="230" height="210" rx="12" fill="url(#dieGrad)" stroke="#312e81" stroke-width="2"/>
  <text x="515" y="140" text-anchor="middle" font-size="22" font-weight="700" fill="white">Die 1</text>
  <text x="515" y="165" text-anchor="middle" font-size="11" fill="#c7d2fe">5th Gen Tensor Cores</text>
  <text x="515" y="182" text-anchor="middle" font-size="11" fill="#c7d2fe">FP4 / FP8 / BF16</text>
  <text x="515" y="199" text-anchor="middle" font-size="10" fill="#a5b4fc">Transformer Engine v2</text>

  <!-- HBM3e stacks - Right of Die 1 -->
  <g>
    <rect x="655" y="70" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="677" y="87" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="655" y="100" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="677" y="117" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="655" y="130" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="677" y="147" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="655" y="160" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="677" y="177" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="655" y="190" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="677" y="207" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
    <rect x="655" y="220" width="45" height="25" rx="4" fill="url(#hbmGrad)"/>
    <text x="677" y="237" text-anchor="middle" font-size="7" fill="white">HBM3e</text>
  </g>

  <!-- Connections Die 1 to HBM -->
  <g stroke="#a855f7" stroke-width="1.5" opacity="0.5">
    <line x1="630" y1="82" x2="655" y2="82"/><line x1="630" y1="112" x2="655" y2="112"/>
    <line x1="630" y1="142" x2="655" y2="142"/><line x1="630" y1="172" x2="655" y2="172"/>
    <line x1="630" y1="202" x2="655" y2="202"/><line x1="630" y1="232" x2="655" y2="232"/>
  </g>

  <!-- NVLink 5.0 bar at bottom -->
  <rect x="120" y="290" width="510" height="35" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="375" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">NVLink 5.0 — 1.8 TB/s</text>

  <!-- Connection lines from dies to NVLink -->
  <line x1="235" y1="265" x2="235" y2="290" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="515" y1="265" x2="515" y2="290" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
</svg>