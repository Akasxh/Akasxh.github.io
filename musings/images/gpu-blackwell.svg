<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" font-family="'Montserrat', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- Arrowheads -->
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
    <marker id="arrowD2D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97706"/>
    </marker>
    <!-- Faint dot grid -->
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#EEF2F7"/>
    </pattern>
  </defs>

  <!-- ===== Background panel ===== -->
  <rect x="0" y="0" width="1100" height="500" fill="#FFFFFF"/>
  <rect x="14" y="14" width="1072" height="472" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="14" y="14" width="1072" height="472" rx="16" fill="url(#dots)"/>

  <!-- ===== Title ===== -->
  <text x="550" y="56" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A">NVIDIA Blackwell B200: One GPU, Two Dies</text>
  <text x="550" y="82" text-anchor="middle" font-size="16" fill="#64748B">208B transistors &#183; TSMC 4NP &#183; 192 GB HBM3e &#183; 8 TB/s</text>

  <!-- ===== "Single logical GPU" brace over the package ===== -->
  <path d="M 150 116 L 150 108 Q 150 102 156 102 L 547 102 Q 553 102 553 96 L 553 96 Q 553 102 559 102 L 950 102 Q 956 102 956 108 L 956 116"
        fill="none" stroke="#94A3B8" stroke-width="1.6"/>
  <rect x="468" y="86" width="164" height="26" rx="9" fill="#EEF2F7" stroke="#CBD5E1" stroke-width="1"/>
  <text x="550" y="104" text-anchor="middle" font-size="14.5" font-weight="600" fill="#334155">Presents as a single GPU</text>

  <!-- ============================================================= -->
  <!-- ===============  PACKAGE  (dies + HBM + D2D)  ================ -->
  <!-- ============================================================= -->

  <!-- Package substrate -->
  <rect x="150" y="126" width="806" height="232" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="166" y="348" font-size="12.5" font-family="'JetBrains Mono','SFMono-Regular',monospace" fill="#94A3B8">CoWoS-L package substrate</text>

  <!-- LEFT HBM3e stacks (4) -->
  <g>
    <rect x="170" y="150" width="40" height="170" rx="8" fill="#8B5CF6" fill-opacity="0.13" stroke="#8B5CF6" stroke-width="1.6"/>
    <rect x="216" y="150" width="40" height="170" rx="8" fill="#8B5CF6" fill-opacity="0.13" stroke="#8B5CF6" stroke-width="1.6"/>
    <rect x="262" y="150" width="40" height="170" rx="8" fill="#8B5CF6" fill-opacity="0.13" stroke="#8B5CF6" stroke-width="1.6"/>
    <rect x="308" y="150" width="40" height="170" rx="8" fill="#8B5CF6" fill-opacity="0.13" stroke="#8B5CF6" stroke-width="1.6"/>
    <!-- HBM stack-layer hint lines -->
    <g stroke="#8B5CF6" stroke-opacity="0.30" stroke-width="1">
      <line x1="170" y1="192" x2="348" y2="192"/>
      <line x1="170" y1="235" x2="348" y2="235"/>
      <line x1="170" y1="278" x2="348" y2="278"/>
    </g>
    <text x="259" y="240" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9" transform="rotate(-90 259 240)">HBM3e &#215; 4</text>
  </g>

  <!-- DIE 0 -->
  <rect x="362" y="150" width="166" height="170" rx="12" fill="#6366F1" fill-opacity="0.12" stroke="#4F46E5" stroke-width="2"/>
  <!-- SM tile grid hint -->
  <g fill="#4F46E5" fill-opacity="0.10">
    <rect x="376" y="206" width="20" height="20" rx="3"/><rect x="402" y="206" width="20" height="20" rx="3"/>
    <rect x="428" y="206" width="20" height="20" rx="3"/><rect x="454" y="206" width="20" height="20" rx="3"/>
    <rect x="480" y="206" width="20" height="20" rx="3"/>
    <rect x="376" y="232" width="20" height="20" rx="3"/><rect x="402" y="232" width="20" height="20" rx="3"/>
    <rect x="428" y="232" width="20" height="20" rx="3"/><rect x="454" y="232" width="20" height="20" rx="3"/>
    <rect x="480" y="232" width="20" height="20" rx="3"/>
  </g>
  <text x="445" y="180" text-anchor="middle" font-size="20" font-weight="700" fill="#3730A3">Die 0</text>
  <text x="445" y="200" text-anchor="middle" font-size="12.5" font-family="'JetBrains Mono','SFMono-Regular',monospace" fill="#4F46E5">reticle-limit die</text>
  <text x="445" y="278" text-anchor="middle" font-size="12.5" font-family="'JetBrains Mono','SFMono-Regular',monospace" fill="#4F46E5">SMs + Tensor Cores</text>

  <!-- NV-HBI die-to-die link (center) -->
  <rect x="532" y="150" width="36" height="170" rx="9" fill="#F59E0B" fill-opacity="0.16" stroke="#D97706" stroke-width="2"/>
  <!-- bidirectional link arrows -->
  <line x1="550" y1="206" x2="550" y2="176" stroke="#D97706" stroke-width="2.4" marker-end="url(#arrowD2D)"/>
  <line x1="550" y1="264" x2="550" y2="294" stroke="#D97706" stroke-width="2.4" marker-end="url(#arrowD2D)"/>
  <text x="550" y="238" text-anchor="middle" font-size="13.5" font-weight="700" fill="#B45309" transform="rotate(-90 550 238)">NV-HBI</text>

  <!-- DIE 1 -->
  <rect x="572" y="150" width="166" height="170" rx="12" fill="#6366F1" fill-opacity="0.12" stroke="#4F46E5" stroke-width="2"/>
  <g fill="#4F46E5" fill-opacity="0.10">
    <rect x="586" y="206" width="20" height="20" rx="3"/><rect x="612" y="206" width="20" height="20" rx="3"/>
    <rect x="638" y="206" width="20" height="20" rx="3"/><rect x="664" y="206" width="20" height="20" rx="3"/>
    <rect x="690" y="206" width="20" height="20" rx="3"/>
    <rect x="586" y="232" width="20" height="20" rx="3"/><rect x="612" y="232" width="20" height="20" rx="3"/>
    <rect x="638" y="232" width="20" height="20" rx="3"/><rect x="664" y="232" width="20" height="20" rx="3"/>
    <rect x="690" y="232" width="20" height="20" rx="3"/>
  </g>
  <text x="655" y="180" text-anchor="middle" font-size="20" font-weight="700" fill="#3730A3">Die 1</text>
  <text x="655" y="200" text-anchor="middle" font-size="12.5" font-family="'JetBrains Mono','SFMono-Regular',monospace" fill="#4F46E5">reticle-limit die</text>
  <text x="655" y="278" text-anchor="middle" font-size="12.5" font-family="'JetBrains Mono','SFMono-Regular',monospace" fill="#4F46E5">SMs + Tensor Cores</text>

  <!-- RIGHT HBM3e stacks (4) -->
  <g>
    <rect x="752" y="150" width="40" height="170" rx="8" fill="#8B5CF6" fill-opacity="0.13" stroke="#8B5CF6" stroke-width="1.6"/>
    <rect x="798" y="150" width="40" height="170" rx="8" fill="#8B5CF6" fill-opacity="0.13" stroke="#8B5CF6" stroke-width="1.6"/>
    <rect x="844" y="150" width="40" height="170" rx="8" fill="#8B5CF6" fill-opacity="0.13" stroke="#8B5CF6" stroke-width="1.6"/>
    <rect x="890" y="150" width="40" height="170" rx="8" fill="#8B5CF6" fill-opacity="0.13" stroke="#8B5CF6" stroke-width="1.6"/>
    <g stroke="#8B5CF6" stroke-opacity="0.30" stroke-width="1">
      <line x1="752" y1="192" x2="930" y2="192"/>
      <line x1="752" y1="235" x2="930" y2="235"/>
      <line x1="752" y1="278" x2="930" y2="278"/>
    </g>
    <text x="841" y="240" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9" transform="rotate(-90 841 240)">HBM3e &#215; 4</text>
  </g>

  <!-- D2D bandwidth callout under the link -->
  <text x="550" y="376" text-anchor="middle" font-size="15" font-weight="700" fill="#B45309">10 TB/s die-to-die (NV-HBI)</text>

  <!-- ============================================================= -->
  <!-- ===============  NVLink 5.0 external bar  =================== -->
  <!-- ============================================================= -->
  <rect x="150" y="394" width="588" height="40" rx="11" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-width="1.8"/>
  <text x="444" y="413" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">5th-gen NVLink</text>
  <text x="444" y="429" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','SFMono-Regular',monospace" fill="#059669">1.8 TB/s per GPU &#183; up to 576 GPUs</text>
  <!-- connector from package to NVLink bar -->
  <line x1="444" y1="358" x2="444" y2="392" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrowSlate)"/>

  <!-- ============================================================= -->
  <!-- ===============  Right-side fact cards  ===================== -->
  <!-- ============================================================= -->
  <!-- Transformer Engine card -->
  <rect x="754" y="394" width="302" height="40" rx="11" fill="#0EA5E9" fill-opacity="0.10" stroke="#0EA5E9" stroke-width="1.6"/>
  <text x="770" y="413" font-size="14.5" font-weight="700" fill="#0369A1">2nd-gen Transformer Engine</text>
  <text x="770" y="429" font-size="12.5" font-family="'JetBrains Mono','SFMono-Regular',monospace" fill="#0284C7">FP4 / FP6 &#183; 5th-gen Tensor Cores</text>

  <!-- ============================================================= -->
  <!-- ===============  Bottom spec strip  ======================== -->
  <!-- ============================================================= -->
  <rect x="150" y="446" width="906" height="36" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
  <g font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="12.5">
    <circle cx="166" cy="464" r="4.3" fill="#4F46E5"/>
    <text x="179" y="468" fill="#334155">~20 PFLOPS FP4 (dense)</text>
    <line x1="382" y1="453" x2="382" y2="475" stroke="#E2E8F0" stroke-width="1.3"/>
    <circle cx="399" cy="464" r="4.3" fill="#0EA5E9"/>
    <text x="412" y="468" fill="#334155">~10 PFLOPS FP8 (dense)</text>
    <line x1="615" y1="453" x2="615" y2="475" stroke="#E2E8F0" stroke-width="1.3"/>
    <circle cx="632" cy="464" r="4.3" fill="#8B5CF6"/>
    <text x="645" y="468" fill="#334155">192 GB HBM3e @ 8 TB/s</text>
    <line x1="858" y1="453" x2="858" y2="475" stroke="#E2E8F0" stroke-width="1.3"/>
    <circle cx="875" cy="464" r="4.3" fill="#F59E0B"/>
    <text x="888" y="468" fill="#334155">GB200 = 2 GPU + Grace</text>
  </g>
</svg>
