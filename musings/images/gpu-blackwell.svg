<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500">
  <defs>
    <linearGradient id="bg-bw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="dieGrad0" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="dieGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="d2dGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="hbmGradBw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="nvlinkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="techGrid" patternUnits="userSpaceOnUse" width="30" height="30">
      <line x1="0" y1="0" x2="30" y2="0" stroke="#334155" stroke-width="0.5" opacity="0.15"/>
      <line x1="0" y1="0" x2="0" y2="30" stroke="#334155" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <filter id="glowBw">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="500" fill="url(#bg-bw)"/>
  <rect width="1100" height="500" fill="url(#techGrid)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="bold" fill="#e2e8f0">B200: 192 GB HBM3e | 8 TB/s | Dual Die</text>
  <text x="550" y="65" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8">NVIDIA Blackwell Architecture</text>

  <!-- HBM3e stacks LEFT (4 stacks) -->
  <g>
    <rect x="80" y="110" width="45" height="100" rx="6" fill="url(#hbmGradBw)" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
    <rect x="80" y="230" width="45" height="100" rx="6" fill="url(#hbmGradBw)" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
    <rect x="140" y="110" width="45" height="100" rx="6" fill="url(#hbmGradBw)" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
    <rect x="140" y="230" width="45" height="100" rx="6" fill="url(#hbmGradBw)" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
    <!-- Stack labels -->
    <text x="102" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe" transform="rotate(-90, 102, 165)">HBM3e</text>
    <text x="102" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe" transform="rotate(-90, 102, 285)">HBM3e</text>
    <text x="162" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe" transform="rotate(-90, 162, 165)">HBM3e</text>
    <text x="162" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe" transform="rotate(-90, 162, 285)">HBM3e</text>
    <!-- Connection lines to Die 0 -->
    <line x1="127" y1="160" x2="210" y2="160" stroke="#a855f7" stroke-width="2" opacity="0.4"/>
    <line x1="127" y1="280" x2="210" y2="280" stroke="#a855f7" stroke-width="2" opacity="0.4"/>
    <line x1="187" y1="160" x2="210" y2="160" stroke="#a855f7" stroke-width="1.5" opacity="0.3"/>
    <line x1="187" y1="280" x2="210" y2="280" stroke="#a855f7" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Die 0 -->
  <rect x="210" y="90" width="260" height="260" rx="12" fill="url(#dieGrad0)" stroke="#818cf8" stroke-width="2.5"/>
  <!-- Die internal pattern -->
  <g opacity="0.1">
    <rect x="225" y="105" width="50" height="50" rx="4" fill="white"/>
    <rect x="280" y="105" width="50" height="50" rx="4" fill="white"/>
    <rect x="335" y="105" width="50" height="50" rx="4" fill="white"/>
    <rect x="395" y="105" width="50" height="50" rx="4" fill="white"/>
    <rect x="225" y="160" width="50" height="50" rx="4" fill="white"/>
    <rect x="280" y="160" width="50" height="50" rx="4" fill="white"/>
    <rect x="335" y="160" width="50" height="50" rx="4" fill="white"/>
    <rect x="395" y="160" width="50" height="50" rx="4" fill="white"/>
    <rect x="225" y="215" width="50" height="50" rx="4" fill="white"/>
    <rect x="280" y="215" width="50" height="50" rx="4" fill="white"/>
    <rect x="335" y="215" width="50" height="50" rx="4" fill="white"/>
    <rect x="395" y="215" width="50" height="50" rx="4" fill="white"/>
    <rect x="225" y="270" width="50" height="50" rx="4" fill="white"/>
    <rect x="280" y="270" width="50" height="50" rx="4" fill="white"/>
    <rect x="335" y="270" width="50" height="50" rx="4" fill="white"/>
    <rect x="395" y="270" width="50" height="50" rx="4" fill="white"/>
  </g>
  <text x="340" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="bold" fill="white">Die 0</text>
  <text x="340" y="225" text-anchor="middle" font-family="monospace" font-size="13" fill="#c7d2fe">~72 SMs</text>
  <text x="340" y="245" text-anchor="middle" font-family="monospace" font-size="12" fill="#a5b4fc">2nd Gen TF32</text>

  <!-- Die-to-Die Link -->
  <rect x="475" y="110" width="50" height="220" rx="8" fill="url(#d2dGrad)" filter="url(#glowBw)"/>
  <text x="500" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#451a03" transform="rotate(-90, 500, 200)">10 TB/s D2D Link</text>
  <!-- Lightning bolts -->
  <text x="500" y="140" text-anchor="middle" font-family="Arial" font-size="18" fill="#451a03" opacity="0.5">&#x26A1;</text>
  <text x="500" y="280" text-anchor="middle" font-family="Arial" font-size="18" fill="#451a03" opacity="0.5">&#x26A1;</text>

  <!-- Die 1 -->
  <rect x="530" y="90" width="260" height="260" rx="12" fill="url(#dieGrad1)" stroke="#818cf8" stroke-width="2.5"/>
  <!-- Die internal pattern -->
  <g opacity="0.1">
    <rect x="545" y="105" width="50" height="50" rx="4" fill="white"/>
    <rect x="600" y="105" width="50" height="50" rx="4" fill="white"/>
    <rect x="655" y="105" width="50" height="50" rx="4" fill="white"/>
    <rect x="715" y="105" width="50" height="50" rx="4" fill="white"/>
    <rect x="545" y="160" width="50" height="50" rx="4" fill="white"/>
    <rect x="600" y="160" width="50" height="50" rx="4" fill="white"/>
    <rect x="655" y="160" width="50" height="50" rx="4" fill="white"/>
    <rect x="715" y="160" width="50" height="50" rx="4" fill="white"/>
    <rect x="545" y="215" width="50" height="50" rx="4" fill="white"/>
    <rect x="600" y="215" width="50" height="50" rx="4" fill="white"/>
    <rect x="655" y="215" width="50" height="50" rx="4" fill="white"/>
    <rect x="715" y="215" width="50" height="50" rx="4" fill="white"/>
    <rect x="545" y="270" width="50" height="50" rx="4" fill="white"/>
    <rect x="600" y="270" width="50" height="50" rx="4" fill="white"/>
    <rect x="655" y="270" width="50" height="50" rx="4" fill="white"/>
    <rect x="715" y="270" width="50" height="50" rx="4" fill="white"/>
  </g>
  <text x="660" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="bold" fill="white">Die 1</text>
  <text x="660" y="225" text-anchor="middle" font-family="monospace" font-size="13" fill="#c7d2fe">~72 SMs</text>
  <text x="660" y="245" text-anchor="middle" font-family="monospace" font-size="12" fill="#a5b4fc">2nd Gen TF32</text>

  <!-- HBM3e stacks RIGHT (4 stacks) -->
  <g>
    <rect x="815" y="110" width="45" height="100" rx="6" fill="url(#hbmGradBw)" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
    <rect x="815" y="230" width="45" height="100" rx="6" fill="url(#hbmGradBw)" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
    <rect x="875" y="110" width="45" height="100" rx="6" fill="url(#hbmGradBw)" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
    <rect x="875" y="230" width="45" height="100" rx="6" fill="url(#hbmGradBw)" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
    <text x="837" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe" transform="rotate(-90, 837, 165)">HBM3e</text>
    <text x="837" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe" transform="rotate(-90, 837, 285)">HBM3e</text>
    <text x="897" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe" transform="rotate(-90, 897, 165)">HBM3e</text>
    <text x="897" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe" transform="rotate(-90, 897, 285)">HBM3e</text>
    <!-- Connection lines to Die 1 -->
    <line x1="815" y1="160" x2="792" y2="160" stroke="#a855f7" stroke-width="2" opacity="0.4"/>
    <line x1="815" y1="280" x2="792" y2="280" stroke="#a855f7" stroke-width="2" opacity="0.4"/>
    <line x1="875" y1="160" x2="792" y2="160" stroke="#a855f7" stroke-width="1.5" opacity="0.3"/>
    <line x1="875" y1="280" x2="792" y2="280" stroke="#a855f7" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Memory label -->
  <text x="112" y="365" text-anchor="middle" font-family="monospace" font-size="12" fill="#a855f7">96 GB</text>
  <text x="897" y="365" text-anchor="middle" font-family="monospace" font-size="12" fill="#a855f7">96 GB</text>

  <!-- NVLink 5.0 bar spanning both dies -->
  <rect x="200" y="390" width="600" height="40" rx="10" fill="url(#nvlinkGrad)" opacity="0.8" stroke="#22c55e" stroke-width="2"/>
  <text x="500" y="416" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="white">NVLink 5.0 — 1.8 TB/s</text>

  <!-- Bottom specs -->
  <rect x="200" y="450" width="600" height="35" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="310" y="473" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8">208B transistors</text>
  <text x="500" y="473" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8">4nm process</text>
  <text x="690" y="473" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8">1000W TDP</text>

  <!-- Separators in bottom bar -->
  <line x1="400" y1="455" x2="400" y2="480" stroke="#334155" stroke-width="1"/>
  <line x1="600" y1="455" x2="600" y2="480" stroke="#334155" stroke-width="1"/>
</svg>