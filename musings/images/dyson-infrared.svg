<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <defs>
    <clipPath id="plotClip">
      <rect x="80" y="30" width="570" height="210"/>
    </clipPath>
  </defs>

  <rect width="700" height="300" fill="#f8f9fa" rx="8"/>

  <!-- Axes -->
  <line x1="80" y1="240" x2="660" y2="240" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="80" y2="30" stroke="#0f172a" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="25" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0f172a" transform="rotate(-90,25,140)">Flux / Brightness</text>

  <!-- X-axis label -->
  <text x="370" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0f172a">Wavelength</text>

  <!-- X-axis region labels -->
  <!-- Visible: 80-220, Near IR: 220-400, Mid IR: 400-660 -->
  <line x1="220" y1="240" x2="220" y2="248" stroke="#0f172a" stroke-width="1"/>
  <line x1="400" y1="240" x2="400" y2="248" stroke="#0f172a" stroke-width="1"/>

  <text x="150" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Visible</text>
  <text x="310" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Near IR</text>
  <text x="530" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Mid IR</text>

  <!-- Visible light color bar -->
  <defs>
    <linearGradient id="visGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="25%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="75%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect x="80" y="243" width="140" height="4" fill="url(#visGrad)" opacity="0.6"/>

  <!-- Normal Star curve (blackbody peaking in visible) -->
  <!-- Smooth curve: rises from left, peaks around x=160, decays toward right -->
  <path d="M80,238 C90,235 110,200 130,130 C140,95 150,72 160,65 C170,62 180,68 195,85 C210,105 230,140 260,170 C290,195 330,215 380,225 C430,232 500,236 580,238 L660,239"
        fill="none" stroke="#4f46e5" stroke-width="2.5" clip-path="url(#plotClip)"/>

  <!-- Star + Dyson Swarm curve: same visible peak, but with IR bump -->
  <path d="M80,238 C90,235 110,200 130,130 C140,95 150,72 160,65 C170,62 180,68 195,85 C210,105 230,140 260,170 C290,195 320,210 360,215 C380,210 410,185 440,155 C460,140 480,138 500,145 C520,155 550,180 580,210 C610,228 640,236 660,238"
        fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="8,4" clip-path="url(#plotClip)"/>

  <!-- Shaded area between curves in IR region (approx x=360 to x=620) -->
  <path d="M360,215 C380,210 410,185 440,155 C460,140 480,138 500,145 C520,155 550,180 580,210 C610,228 640,236 660,238
           L660,239 C640,237 610,236 580,238 C550,237 500,236 430,232 C400,229 380,225 360,220 Z"
        fill="#7c3aed" opacity="0.15" clip-path="url(#plotClip)"/>

  <!-- "Infrared Excess" label -->
  <text x="490" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#7c3aed">Infrared</text>
  <text x="490" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#7c3aed">Excess</text>
  <!-- Arrow pointing to shaded area -->
  <line x1="490" y1="188" x2="480" y2="200" stroke="#7c3aed" stroke-width="1"/>
  <polygon points="480,200 476,192 484,194" fill="#7c3aed"/>

  <!-- Legend -->
  <line x1="100" y1="18" x2="130" y2="18" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="135" y="22" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">Normal Star</text>

  <line x1="260" y1="18" x2="290" y2="18" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="295" y="22" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">Star + Dyson Swarm</text>

  <!-- Y-axis tick marks -->
  <line x1="75" y1="240" x2="80" y2="240" stroke="#0f172a" stroke-width="1"/>
  <line x1="75" y1="150" x2="80" y2="150" stroke="#0f172a" stroke-width="1"/>
  <line x1="75" y1="65" x2="80" y2="65" stroke="#0f172a" stroke-width="1"/>
</svg>