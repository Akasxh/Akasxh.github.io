<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="bg-ir" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="20%" stop-color="#3b82f6"/>
      <stop offset="40%" stop-color="#22c55e"/>
      <stop offset="60%" stop-color="#eab308"/>
      <stop offset="80%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <clipPath id="plotArea">
      <rect x="100" y="60" width="850" height="350"/>
    </clipPath>
    <filter id="glowIr">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bg-ir)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="white" stroke-width="1">
    <line x1="100" y1="110" x2="950" y2="110"/>
    <line x1="100" y1="160" x2="950" y2="160"/>
    <line x1="100" y1="210" x2="950" y2="210"/>
    <line x1="100" y1="260" x2="950" y2="260"/>
    <line x1="100" y1="310" x2="950" y2="310"/>
    <line x1="100" y1="360" x2="950" y2="360"/>
    <line x1="200" y1="60" x2="200" y2="410"/>
    <line x1="300" y1="60" x2="300" y2="410"/>
    <line x1="400" y1="60" x2="400" y2="410"/>
    <line x1="500" y1="60" x2="500" y2="410"/>
    <line x1="600" y1="60" x2="600" y2="410"/>
    <line x1="700" y1="60" x2="700" y2="410"/>
    <line x1="800" y1="60" x2="800" y2="410"/>
    <line x1="900" y1="60" x2="900" y2="410"/>
  </g>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0">How to Detect a Dyson Swarm</text>

  <!-- Axes -->
  <line x1="100" y1="410" x2="950" y2="410" stroke="#475569" stroke-width="2"/>
  <line x1="100" y1="60" x2="100" y2="410" stroke="#475569" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="30" y="240" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#94a3b8" transform="rotate(-90, 30, 240)">Flux / Brightness</text>

  <!-- X-axis label -->
  <text x="525" y="490" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#94a3b8">Wavelength</text>

  <!-- X-axis ticks and labels -->
  <text x="130" y="435" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">0.1&#x3bc;m</text>
  <text x="230" y="435" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">0.3&#x3bc;m</text>
  <text x="340" y="435" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">0.7&#x3bc;m</text>
  <text x="450" y="435" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">2&#x3bc;m</text>
  <text x="570" y="435" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">5&#x3bc;m</text>
  <text x="700" y="435" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">20&#x3bc;m</text>
  <text x="850" y="435" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">100&#x3bc;m</text>

  <!-- Tick marks -->
  <line x1="130" y1="410" x2="130" y2="418" stroke="#475569" stroke-width="1.5"/>
  <line x1="230" y1="410" x2="230" y2="418" stroke="#475569" stroke-width="1.5"/>
  <line x1="340" y1="410" x2="340" y2="418" stroke="#475569" stroke-width="1.5"/>
  <line x1="450" y1="410" x2="450" y2="418" stroke="#475569" stroke-width="1.5"/>
  <line x1="570" y1="410" x2="570" y2="418" stroke="#475569" stroke-width="1.5"/>
  <line x1="700" y1="410" x2="700" y2="418" stroke="#475569" stroke-width="1.5"/>
  <line x1="850" y1="410" x2="850" y2="418" stroke="#475569" stroke-width="1.5"/>

  <!-- Spectral region labels -->
  <text x="160" y="460" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#7c3aed">UV</text>
  <!-- Rainbow bar for visible -->
  <rect x="220" y="448" width="130" height="10" rx="5" fill="url(#rainbow)" opacity="0.8"/>
  <text x="285" y="472" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">Visible</text>
  <text x="420" y="460" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ef4444">Near IR</text>
  <text x="560" y="460" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#dc2626">Mid IR</text>
  <text x="770" y="460" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#991b1b">Far IR</text>

  <!-- Infrared excess shaded area (between curves in IR region) -->
  <g clip-path="url(#plotArea)">
    <path d="M 500,310 Q 550,290 600,260 Q 650,230 700,220 Q 750,230 800,270 Q 850,320 900,370 L 900,370 Q 850,350 800,330 Q 750,310 700,310 Q 650,330 600,355 Q 550,380 500,390 Z"
          fill="#a855f7" opacity="0.2"/>

    <!-- Normal star blackbody curve (indigo) -->
    <path d="M 120,400 Q 150,395 180,380 Q 210,340 240,260 Q 270,150 300,100 Q 320,90 340,110 Q 370,160 400,240 Q 430,310 460,350 Q 500,390 550,398 Q 600,402 700,406 Q 800,408 950,410"
          fill="none" stroke="#6366f1" stroke-width="3" filter="url(#glowIr)"/>

    <!-- Star + Dyson Swarm curve (amber) - same visible peak, extra IR bump -->
    <path d="M 120,400 Q 150,395 180,380 Q 210,340 240,260 Q 270,150 300,100 Q 320,90 340,110 Q 370,160 400,240 Q 430,310 460,345 Q 500,370 530,340 Q 560,300 600,260 Q 650,225 700,220 Q 750,235 800,280 Q 850,340 900,380 Q 930,400 950,408"
          fill="none" stroke="#f59e0b" stroke-width="3" filter="url(#glowIr)"/>
  </g>

  <!-- IR excess label -->
  <line x1="660" y1="190" x2="680" y2="230" stroke="#c084fc" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="565" y="168" width="200" height="26" rx="8" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="1"/>
  <text x="665" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#c084fc">Infrared Excess</text>
  <text x="665" y="210" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a855f7">(Detection Signal)</text>

  <!-- Peak label -->
  <line x1="300" y1="80" x2="300" y2="96" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="300" y="75" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8">Peak (visible)</text>

  <!-- Legend -->
  <rect x="770" y="70" width="185" height="76" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <line x1="785" y1="95" x2="820" y2="95" stroke="#6366f1" stroke-width="3"/>
  <text x="830" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e2e8f0">Normal Star</text>
  <line x1="785" y1="120" x2="820" y2="120" stroke="#f59e0b" stroke-width="3"/>
  <text x="830" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e2e8f0">Star + Dyson Swarm</text>
</svg>