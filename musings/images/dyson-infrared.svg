<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="Montserrat, 'Segoe UI', system-ui, -apple-system, Arial, sans-serif">
  <defs>
    <!-- arrowheads -->
    <marker id="ir-arr-amber" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="ir-arr-rose" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F43F5E"/>
    </marker>
    <marker id="ir-arr-slate" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748B"/>
    </marker>

    <!-- visible-spectrum strip -->
    <linearGradient id="ir-vis" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7C3AED"/>
      <stop offset="22%" stop-color="#3B82F6"/>
      <stop offset="48%" stop-color="#10B981"/>
      <stop offset="72%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>

    <!-- soft star core for the inset -->
    <radialGradient id="ir-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFDF5"/>
      <stop offset="42%" stop-color="#FCD34D"/>
      <stop offset="82%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- faint dot grid -->
    <pattern id="ir-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.3" fill="#EEF2F7"/>
    </pattern>

    <clipPath id="ir-plot"><rect x="120" y="150" width="640" height="240"/></clipPath>
  </defs>

  <!-- ===== Canvas (BRIGHT) ===== -->
  <rect width="1000" height="500" fill="#FFFFFF"/>
  <rect x="12" y="12" width="976" height="476" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="13" y="13" width="974" height="474" rx="15" fill="url(#ir-dots)" opacity="0.9"/>

  <!-- ===== Title ===== -->
  <text x="40" y="54" font-size="29" font-weight="700" fill="#0F172A">The Infrared Signature of a Dyson Swarm</text>
  <text x="40" y="80" font-size="16.5" fill="#64748B">Energy is conserved: absorbed starlight (visible / UV) is re-radiated as cooler thermal infrared, an anomalous IR excess.</text>

  <!-- ================= MAIN SED PLOT ================= -->
  <!-- plot frame -->
  <rect x="120" y="150" width="640" height="240" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- horizontal gridlines -->
  <g stroke="#EEF2F7" stroke-width="1">
    <line x1="120" y1="198" x2="760" y2="198"/>
    <line x1="120" y1="246" x2="760" y2="246"/>
    <line x1="120" y1="294" x2="760" y2="294"/>
    <line x1="120" y1="342" x2="760" y2="342"/>
  </g>
  <!-- decade gridlines (0.3 / 1 / 10 / 30 um) -->
  <g stroke="#E8EDF4" stroke-width="1" stroke-dasharray="2 5">
    <line x1="287.3" y1="158" x2="287.3" y2="388"/>
    <line x1="607.3" y1="158" x2="607.3" y2="388"/>
  </g>

  <!-- axes -->
  <line x1="120" y1="388" x2="760" y2="388" stroke="#94A3B8" stroke-width="1.8"/>
  <line x1="120" y1="150" x2="120" y2="388" stroke="#94A3B8" stroke-width="1.8"/>

  <!-- y-axis label -->
  <text x="98" y="269" text-anchor="middle" font-size="13.5" fill="#64748B" transform="rotate(-90,98,269)">energy radiated  &#955;F&#955;  &#8594;</text>

  <!-- ===== Shaded regions ===== -->
  <g clip-path="url(#ir-plot)">
    <!-- absorbed visible energy (between bare-star curve and the dimmed leaked light) -->
    <path d="M 120.0,249.7 L 132.9,224.4 L 145.7,200.9 L 158.6,181.1 L 171.5,166.7 L 184.3,159.0 L 197.2,158.1 L 210.1,159.1 L 222.9,161.0 L 235.8,163.8 L 248.6,167.5 L 261.5,172.1 L 274.4,177.4 L 287.2,183.5 L 300.1,190.3 L 313.0,197.6 L 325.8,205.4 L 338.7,213.7 L 351.6,222.2 L 364.4,231.0 L 377.3,240.0 L 390.2,249.0 L 403.0,258.1 L 415.9,267.0 L 428.7,275.8 L 441.6,284.4 L 454.5,292.8 L 467.3,300.8 L 480.2,308.5 L 493.1,315.8 L 505.9,322.8 L 518.8,329.3 L 531.7,335.3 L 544.5,341.0 L 557.4,346.2 L 570.3,351.0 L 583.1,355.4 L 596.0,359.4 L 608.8,363.0 L 621.7,366.2 L 634.6,369.1 L 647.4,371.7 L 660.3,374.0 L 673.2,376.0 L 686.0,377.8 L 698.9,379.3 L 711.8,380.7 L 715.0,381.0 L 715.0,385.0 L 711.8,384.9 L 698.9,384.4 L 686.0,383.7 L 673.2,383.0 L 660.3,382.1 L 647.4,381.2 L 634.6,380.1 L 621.7,378.8 L 608.8,377.5 L 596.0,376.0 L 583.1,374.3 L 570.3,372.5 L 557.4,370.4 L 544.5,368.3 L 531.7,365.9 L 518.8,363.3 L 505.9,360.6 L 493.1,357.7 L 480.2,354.6 L 467.3,351.4 L 454.5,348.0 L 441.6,344.5 L 428.7,340.9 L 415.9,337.2 L 403.0,333.4 L 390.2,329.6 L 377.3,325.8 L 364.4,322.1 L 351.6,318.4 L 338.7,314.8 L 325.8,311.3 L 313.0,308.0 L 300.1,305.0 L 287.2,302.1 L 274.4,299.6 L 261.5,297.3 L 248.6,295.4 L 235.8,293.8 L 222.9,292.6 L 210.1,291.8 L 197.2,291.4 L 184.3,291.8 L 171.5,295.0 L 158.6,301.1 L 145.7,309.4 L 132.9,319.3 L 120.0,329.9 Z"
          fill="#F59E0B" opacity="0.13"/>

    <!-- infrared excess (the detection signal) -->
    <path d="M 341.9,388.0 L 341.9,384.5 L 351.6,383.5 L 361.2,382.1 L 370.9,380.5 L 380.5,378.5 L 390.2,376.1 L 399.8,373.2 L 409.4,369.7 L 419.1,365.8 L 428.7,361.2 L 438.4,356.0 L 448.0,350.2 L 457.7,343.8 L 467.3,336.8 L 477.0,329.3 L 486.6,321.4 L 496.3,313.2 L 505.9,304.8 L 515.6,296.4 L 525.2,288.2 L 534.9,280.3 L 544.5,273.0 L 554.2,266.4 L 563.8,260.8 L 573.5,256.2 L 583.1,252.8 L 592.8,250.7 L 602.4,250.0 L 612.1,250.5 L 621.7,252.1 L 631.4,254.8 L 641.0,258.4 L 650.7,262.9 L 660.3,268.2 L 669.9,274.1 L 679.6,280.6 L 689.2,287.6 L 698.9,294.8 L 708.5,302.2 L 718.2,309.6 L 727.8,316.9 L 737.5,324.1 L 747.1,331.0 L 756.8,337.5 L 760.0,339.6 L 760.0,388.0 Z"
          fill="#F43F5E" opacity="0.14"/>
  </g>

  <!-- ===== Curves ===== -->
  <!-- bare star (~5778 K) -->
  <polyline fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    points="120.0,249.7 132.9,224.4 145.7,200.9 158.6,181.1 171.5,166.7 184.3,159.0 197.2,158.1 210.1,159.1 222.9,161.0 235.8,163.8 248.6,167.5 261.5,172.1 274.4,177.4 287.2,183.5 300.1,190.3 313.0,197.6 325.8,205.4 338.7,213.7 351.6,222.2 364.4,231.0 377.3,240.0 390.2,249.0 403.0,258.1 415.9,267.0 428.7,275.8 441.6,284.4 454.5,292.8 467.3,300.8 480.2,308.5 493.1,315.8 505.9,322.8 518.8,329.3 531.7,335.3 544.5,341.0 557.4,346.2 570.3,351.0 583.1,355.4 596.0,359.4 608.8,363.0 621.7,366.2 634.6,369.1 647.4,371.7 660.3,374.0 673.2,376.0 686.0,377.8 698.9,379.3 711.8,380.7 724.6,381.8 737.5,382.8 750.4,383.7 760.0,384.2"/>

  <!-- star + Dyson swarm: dimmed visible peak + IR re-emission bump -->
  <polyline fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    points="120.0,329.9 132.9,319.3 145.7,309.4 158.6,301.1 171.5,295.0 184.3,291.8 197.2,291.4 210.1,291.8 222.9,292.6 235.8,293.7 248.6,295.2 261.5,297.1 274.4,299.2 287.2,301.5 300.1,304.0 313.0,306.6 325.8,309.2 338.7,311.6 351.6,313.8 364.4,315.7 377.3,317.0 390.2,317.7 403.0,317.5 415.9,316.3 428.7,314.1 441.6,310.6 454.5,306.0 467.3,300.2 480.2,293.3 493.1,285.6 505.9,277.4 518.8,269.0 531.7,260.8 544.5,253.3 557.4,246.9 570.3,242.0 583.1,239.1 596.0,238.3 608.8,239.7 621.7,243.0 634.6,247.9 647.4,254.4 660.3,262.3 673.2,271.2 686.0,280.9 698.9,291.1 711.8,301.6 724.6,311.9 737.5,321.9 750.4,331.4 760.0,338.0"/>

  <!-- ===== Peak markers / annotations ===== -->
  <!-- star visible peak @ 0.5 um -->
  <line x1="191" y1="158" x2="191" y2="150" stroke="#B45309" stroke-width="1.2" stroke-dasharray="3 2"/>
  <circle cx="191" cy="158" r="3.6" fill="#F59E0B" stroke="#FFFFFF" stroke-width="1.4"/>
  <text x="200" y="148" font-size="12.5" font-weight="700" fill="#B45309">peak &#8776; 0.5&#956;m</text>
  <text x="200" y="163" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10.5" fill="#92400E">visible, T&#8776;5778K</text>

  <!-- dimmed visible peak callout -->
  <circle cx="197.2" cy="291.4" r="3.4" fill="#4F46E5" stroke="#FFFFFF" stroke-width="1.3"/>
  <line x1="158" y1="276" x2="192" y2="289" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="130" y="262" font-size="11.5" font-weight="700" fill="#4338CA">visible peak</text>
  <text x="130" y="276" font-size="11.5" font-weight="700" fill="#4338CA">dimmed</text>

  <!-- IR excess peak @ ~10 um -->
  <circle cx="602.4" cy="250" r="3.8" fill="#F43F5E" stroke="#FFFFFF" stroke-width="1.4"/>
  <line x1="602.4" y1="246" x2="602.4" y2="206" stroke="#E11D48" stroke-width="1.2" stroke-dasharray="3 2"/>
  <rect x="520" y="170" width="186" height="36" rx="9" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="1.3"/>
  <text x="613" y="186" text-anchor="middle" font-size="13.5" font-weight="700" fill="#9F1239">INFRARED EXCESS</text>
  <text x="613" y="200" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10.5" fill="#BE123C">peak &#8776; 10&#956;m &#183; T&#8776;300K</text>

  <!-- absorbed-region label -->
  <text x="300" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309">absorbed</text>
  <text x="300" y="246" text-anchor="middle" font-size="11" fill="#B45309">visible / UV</text>

  <!-- energy-conservation arrow from absorbed -> re-emitted -->
  <path d="M 360 360 C 430 405 500 405 560 365" fill="none" stroke="#64748B" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ir-arr-slate)"/>
  <text x="460" y="378" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" font-weight="600" fill="#475569">same energy, longer &#955;</text>

  <!-- ===== X axis: ticks, WISE bands, spectral strip ===== -->
  <!-- tick marks + wavelength labels -->
  <g stroke="#94A3B8" stroke-width="1.4">
    <line x1="191" y1="388" x2="191" y2="394"/>
    <line x1="287.3" y1="388" x2="287.3" y2="394"/>
    <line x1="383.7" y1="388" x2="383.7" y2="394"/>
    <line x1="607.3" y1="388" x2="607.3" y2="394"/>
    <line x1="716.9" y1="388" x2="716.9" y2="394"/>
  </g>
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#64748B" text-anchor="middle">
    <text x="191"  y="406">0.5</text>
    <text x="287.3" y="406">1</text>
    <text x="383.7" y="406">2</text>
    <text x="607.3" y="406">10</text>
    <text x="716.9" y="406">22</text>
  </g>
  <text x="505" y="406" text-anchor="middle" font-size="12" fill="#64748B">wavelength / &#956;m &#183; log</text>

  <!-- spectral region strip under axis -->
  <rect x="120" y="416" width="135" height="9" rx="4.5" fill="url(#ir-vis)"/>
  <text x="187" y="441" text-anchor="middle" font-size="11.5" font-weight="600" fill="#475569">visible</text>
  <text x="135" y="441" text-anchor="middle" font-size="11" fill="#7C3AED">UV</text>
  <line x1="255" y1="420" x2="607" y2="420" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  <text x="360" y="441" text-anchor="middle" font-size="11.5" font-weight="600" fill="#475569">near-IR</text>
  <line x1="450" y1="420" x2="760" y2="420" stroke="#F43F5E" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <text x="620" y="441" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9F1239">mid-IR (the excess)</text>

  <!-- WISE bands W1..W4 markers along axis -->
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="9.5" text-anchor="middle">
    <!-- W1 3.4 / W2 4.6 (no excess) -->
    <g fill="#94A3B8" stroke="#CBD5E1">
      <rect x="451" y="455" width="14" height="13" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
      <rect x="493" y="455" width="14" height="13" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    </g>
    <!-- W3 12 / W4 22 (excess seen here) -->
    <g>
      <rect x="626" y="455" width="14" height="13" rx="3" fill="#FFE4E6" stroke="#FB7185" stroke-width="1.2"/>
      <rect x="710" y="455" width="14" height="13" rx="3" fill="#FFE4E6" stroke="#FB7185" stroke-width="1.2"/>
    </g>
    <text x="458" y="464" fill="#64748B" font-weight="700">W1</text>
    <text x="500" y="464" fill="#64748B" font-weight="700">W2</text>
    <text x="633" y="464" fill="#9F1239" font-weight="700">W3</text>
    <text x="717" y="464" fill="#9F1239" font-weight="700">W4</text>
  </g>
  <text x="120" y="466" font-size="11.5" font-weight="700" fill="#334155">NASA WISE bands</text>
  <text x="120" y="480" font-size="10.5" fill="#64748B">3.4 / 4.6 / 12 / 22 &#956;m</text>
  <text x="540" y="480" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10" fill="#9F1239">excess shows up in W3 + W4</text>

  <!-- ===== Plot legend (open mid-plot area, clear of curves & arrow) ===== -->
  <g>
    <rect x="406" y="306" width="200" height="46" rx="9" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
    <line x1="420" y1="323" x2="450" y2="323" stroke="#F59E0B" stroke-width="3"/>
    <text x="458" y="327" font-size="12.5" fill="#334155">bare star spectrum</text>
    <line x1="420" y1="341" x2="450" y2="341" stroke="#4F46E5" stroke-width="3"/>
    <text x="458" y="345" font-size="12.5" fill="#334155">star + Dyson swarm</text>
  </g>

  <!-- ================= RIGHT RAIL ================= -->
  <!-- (1) energy-conservation inset: star -> shell -> IR -->
  <g>
    <rect x="786" y="100" width="186" height="150" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="879" y="122" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0F172A">Why it glows in IR</text>

    <!-- star -->
    <circle cx="833" cy="182" r="34" fill="url(#ir-sun)"/>
    <circle cx="833" cy="182" r="15" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.3"/>
    <text x="833" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#7C2D12">star</text>

    <!-- collector shell arc -->
    <path d="M 869 150 A 44 44 0 0 1 869 214" fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
    <path d="M 869 150 A 44 44 0 0 1 869 214" fill="none" stroke="#6366F1" stroke-width="3" stroke-dasharray="1 6" stroke-linecap="round" opacity="0.6"/>
    <text x="892" y="146" font-size="9.5" font-weight="700" fill="#4338CA">shell</text>

    <!-- visible in (amber) -->
    <line x1="851" y1="172" x2="866" y2="166" stroke="#F59E0B" stroke-width="2.2" marker-end="url(#ir-arr-amber)"/>
    <line x1="851" y1="192" x2="866" y2="198" stroke="#F59E0B" stroke-width="2.2" marker-end="url(#ir-arr-amber)"/>
    <!-- IR out (rose, wavy) -->
    <path d="M 880 168 q 7 -7 14 0 q 7 7 14 0" fill="none" stroke="#F43F5E" stroke-width="2" marker-end="url(#ir-arr-rose)"/>
    <path d="M 880 196 q 7 -7 14 0 q 7 7 14 0" fill="none" stroke="#F43F5E" stroke-width="2" marker-end="url(#ir-arr-rose)"/>

    <text x="879" y="236" text-anchor="middle" font-size="11" fill="#334155">visible in &#8594; heat &#8594; IR out</text>
  </g>

  <!-- (2) Wien's law card -->
  <g>
    <rect x="786" y="262" width="186" height="98" rx="12" fill="#EEF0FF" stroke="#C7CCFB" stroke-width="1.3"/>
    <text x="800" y="284" font-size="13" font-weight="700" fill="#3730A3">Wien&#8217;s displacement law</text>
    <text x="879" y="307" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="13" fill="#1E1B4B">&#955;&#8344;&#8337;&#8342;&#8342; = 2898 &#956;m&#183;K / T</text>
    <text x="800" y="330" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#B45309">5778 K &#8594; 0.50 &#956;m  (green)</text>
    <text x="800" y="349" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#9F1239">&#160;300 K &#8594; 9.7 &#956;m  (mid-IR)</text>
  </g>

  <!-- (3) how SETI detects it -->
  <g>
    <rect x="786" y="372" width="186" height="104" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="800" y="393" font-size="12.5" font-weight="700" fill="#0F172A">How SETI hunts them</text>
    <circle cx="806" cy="411" r="2.6" fill="#F43F5E"/>
    <text x="816" y="415" font-size="11" fill="#334155">IR excess vs. the star&#8217;s</text>
    <text x="816" y="429" font-size="11" fill="#334155">predicted spectral type</text>
    <circle cx="806" cy="446" r="2.6" fill="#0EA5E9"/>
    <text x="816" y="450" font-size="11" fill="#334155">visible dimming as</text>
    <text x="816" y="464" font-size="11" fill="#334155">collectors transit</text>
  </g>
</svg>
