<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <filter id="sunGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rayGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="700" height="400" fill="#f8f9fa" rx="8"/>

  <!-- Orbit paths (dashed ellipses at various inclinations) -->
  <ellipse cx="350" cy="200" rx="160" ry="160" fill="none" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="6,4"/>
  <ellipse cx="350" cy="200" rx="190" ry="100" fill="none" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="6,4" transform="rotate(-15,350,200)"/>
  <ellipse cx="350" cy="200" rx="170" ry="90" fill="none" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="6,4" transform="rotate(25,350,200)"/>
  <ellipse cx="350" cy="200" rx="200" ry="130" fill="none" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="6,4" transform="rotate(-40,350,200)"/>
  <ellipse cx="350" cy="200" rx="180" ry="120" fill="none" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="6,4" transform="rotate(50,350,200)"/>
  <ellipse cx="350" cy="200" rx="150" ry="80" fill="none" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="6,4" transform="rotate(-60,350,200)"/>

  <!-- Sun rays (behind sun) -->
  <g opacity="0.15" filter="url(#rayGlow)">
    <line x1="350" y1="200" x2="350" y2="80" stroke="#f59e0b" stroke-width="3"/>
    <line x1="350" y1="200" x2="350" y2="320" stroke="#f59e0b" stroke-width="3"/>
    <line x1="350" y1="200" x2="230" y2="200" stroke="#f59e0b" stroke-width="3"/>
    <line x1="350" y1="200" x2="470" y2="200" stroke="#f59e0b" stroke-width="3"/>
    <line x1="350" y1="200" x2="265" y2="115" stroke="#f59e0b" stroke-width="3"/>
    <line x1="350" y1="200" x2="435" y2="285" stroke="#f59e0b" stroke-width="3"/>
    <line x1="350" y1="200" x2="435" y2="115" stroke="#f59e0b" stroke-width="3"/>
    <line x1="350" y1="200" x2="265" y2="285" stroke="#f59e0b" stroke-width="3"/>
  </g>

  <!-- Sun -->
  <circle cx="350" cy="200" r="40" fill="url(#sunGrad)" filter="url(#sunGlow)"/>

  <!-- Solar collector platforms (small rectangles at various positions) -->
  <g fill="#4f46e5" opacity="0.85">
    <!-- Ring 1: close orbit -->
    <rect x="275" y="110" width="8" height="6" rx="1" transform="rotate(-20,279,113)"/>
    <rect x="420" y="130" width="8" height="6" rx="1" transform="rotate(15,424,133)"/>
    <rect x="440" y="235" width="8" height="6" rx="1" transform="rotate(40,444,238)"/>
    <rect x="260" y="260" width="8" height="6" rx="1" transform="rotate(-35,264,263)"/>
    <rect x="310" y="310" width="8" height="6" rx="1" transform="rotate(10,314,313)"/>
    <rect x="410" y="295" width="8" height="6" rx="1" transform="rotate(55,414,298)"/>

    <!-- Ring 2: mid orbit -->
    <rect x="200" y="155" width="9" height="7" rx="1" transform="rotate(-10,204,158)"/>
    <rect x="490" y="175" width="9" height="7" rx="1" transform="rotate(25,494,178)"/>
    <rect x="480" y="270" width="9" height="7" rx="1" transform="rotate(50,484,273)"/>
    <rect x="210" y="280" width="9" height="7" rx="1" transform="rotate(-45,214,283)"/>
    <rect x="175" y="210" width="9" height="7" rx="1" transform="rotate(-5,179,213)"/>
    <rect x="505" y="210" width="9" height="7" rx="1" transform="rotate(30,509,213)"/>
    <rect x="330" y="50" width="9" height="7" rx="1" transform="rotate(5,334,53)"/>
    <rect x="380" y="345" width="9" height="7" rx="1" transform="rotate(-15,384,348)"/>

    <!-- Ring 3: outer orbit -->
    <rect x="155" y="130" width="10" height="7" rx="1" transform="rotate(20,160,133)"/>
    <rect x="530" y="150" width="10" height="7" rx="1" transform="rotate(-10,535,153)"/>
    <rect x="545" y="240" width="10" height="7" rx="1" transform="rotate(35,550,243)"/>
    <rect x="150" y="270" width="10" height="7" rx="1" transform="rotate(-25,155,273)"/>
    <rect x="280" y="360" width="10" height="7" rx="1" transform="rotate(15,285,363)"/>
    <rect x="430" y="50" width="10" height="7" rx="1" transform="rotate(-20,435,53)"/>
    <rect x="250" y="55" width="10" height="7" rx="1" transform="rotate(10,255,58)"/>
    <rect x="460" y="340" width="10" height="7" rx="1" transform="rotate(45,465,343)"/>
    <rect x="540" y="300" width="10" height="7" rx="1" transform="rotate(-30,545,303)"/>
    <rect x="150" y="185" width="10" height="7" rx="1" transform="rotate(5,155,188)"/>
  </g>

  <!-- Energy transmission arrows (a few from collectors toward sun) -->
  <g stroke="#ef4444" stroke-width="1.2" fill="none" opacity="0.5" stroke-dasharray="4,3">
    <line x1="208" y1="160" x2="315" y2="190"/>
    <line x1="494" y1="180" x2="395" y2="195"/>
    <line x1="218" y1="283" x2="320" y2="225"/>
    <line x1="484" y1="273" x2="390" y2="220"/>
  </g>
  <!-- Arrow tips -->
  <g fill="#ef4444" opacity="0.5">
    <polygon points="315,190 308,185 310,193"/>
    <polygon points="395,195 402,190 400,198"/>
    <polygon points="320,225 313,220 315,228"/>
    <polygon points="390,220 397,215 395,223"/>
  </g>

  <!-- Labels -->
  <text x="350" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Star</text>

  <!-- Solar Collectors label with line -->
  <line x1="540" y1="150" x2="590" y2="95" stroke="#0f172a" stroke-width="0.8"/>
  <circle cx="540" cy="150" r="2" fill="#0f172a"/>
  <text x="592" y="92" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4f46e5">Solar</text>
  <text x="592" y="105" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4f46e5">Collectors</text>

  <!-- Orbit Paths label with line -->
  <line x1="192" y1="315" x2="130" y2="355" stroke="#0f172a" stroke-width="0.8"/>
  <circle cx="192" cy="315" r="2" fill="#0f172a"/>
  <text x="75" y="370" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748b">Orbit Paths</text>

  <!-- Energy label -->
  <line x1="310" y1="188" x2="85" y2="100" stroke="#0f172a" stroke-width="0.8"/>
  <circle cx="310" cy="188" r="2" fill="#0f172a"/>
  <text x="22" y="97" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444">Energy</text>
  <text x="22" y="110" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444">Transmission</text>
</svg>