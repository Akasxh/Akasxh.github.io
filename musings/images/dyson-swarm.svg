<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" font-family="Montserrat, 'Segoe UI', system-ui, -apple-system, Arial, sans-serif">
  <defs>
    <!-- Soft star core -->
    <radialGradient id="ds-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDF5"/>
      <stop offset="38%" stop-color="#FCD34D"/>
      <stop offset="78%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ds-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#FCD34D" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
    <!-- Faint dot grid -->
    <pattern id="ds-dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.3" fill="#EEF2F7"/>
    </pattern>
    <!-- Arrowheads -->
    <marker id="ds-arrow-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
    <marker id="ds-arrow-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
    <!-- One reusable collector panel: a tilted solar tile with two cells -->
    <g id="ds-panel">
      <rect x="-9" y="-5.5" width="18" height="11" rx="2" fill="#EEF1FE" stroke="#4F46E5" stroke-width="1.4"/>
      <line x1="0" y1="-5.5" x2="0" y2="5.5" stroke="#4F46E5" stroke-width="1" opacity="0.55"/>
    </g>
  </defs>

  <!-- ===== Panel / background (BRIGHT) ===== -->
  <rect width="1000" height="600" fill="#FFFFFF"/>
  <rect x="12" y="12" width="976" height="576" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="13" y="13" width="974" height="574" rx="15" fill="url(#ds-dots)" opacity="0.9"/>

  <!-- ===== Title ===== -->
  <text x="44" y="58" font-size="30" font-weight="700" fill="#0F172A">Dyson Swarm</text>
  <text x="44" y="84" font-size="17" fill="#64748B">Thousands of independent collectors orbiting a star, not a solid shell</text>

  <!-- ===== Main scene group (shifted left to leave room for the right-hand note) ===== -->
  <g>
    <!-- Orbital paths at differing inclinations & semi-major axes (the swarm's tiled, non-intersecting shells) -->
    <g fill="none" stroke-linecap="round">
      <ellipse cx="430" cy="330" rx="248" ry="92"  stroke="#6366F1" stroke-width="1.6" stroke-dasharray="2,8" opacity="0.55"/>
      <ellipse cx="430" cy="330" rx="262" ry="150" stroke="#8B5CF6" stroke-width="1.6" stroke-dasharray="2,8" opacity="0.50" transform="rotate(26 430 330)"/>
      <ellipse cx="430" cy="330" rx="250" ry="138" stroke="#0EA5E9" stroke-width="1.6" stroke-dasharray="2,8" opacity="0.50" transform="rotate(-30 430 330)"/>
      <ellipse cx="430" cy="330" rx="214" ry="200" stroke="#6366F1" stroke-width="1.6" stroke-dasharray="2,8" opacity="0.45" transform="rotate(62 430 330)"/>
      <ellipse cx="430" cy="330" rx="270" ry="116" stroke="#8B5CF6" stroke-width="1.6" stroke-dasharray="2,8" opacity="0.45" transform="rotate(-58 430 330)"/>
    </g>

    <!-- Star: halo + core -->
    <circle cx="430" cy="330" r="150" fill="url(#ds-halo)"/>
    <circle cx="430" cy="330" r="62" fill="url(#ds-sun)"/>
    <circle cx="430" cy="330" r="62" fill="none" stroke="#F59E0B" stroke-width="1.4" opacity="0.6"/>
    <text x="430" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#7C2D12">Star</text>
    <text x="430" y="346" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="12.5" font-weight="600" fill="#92400E">3.8&#215;10&#178;&#8310; W</text>

    <!-- Energy beamed inward from a few collectors to a relay near the star (collect + relay) -->
    <g stroke="#F59E0B" stroke-width="2" opacity="0.7" marker-end="url(#ds-arrow-amber)">
      <line x1="207" y1="298" x2="366" y2="322"/>
      <line x1="648" y1="372" x2="498" y2="344"/>
      <line x1="430" y1="135" x2="430" y2="264"/>
      <line x1="300" y1="492" x2="392" y2="392"/>
    </g>

    <!-- ===== Collectors on the orbital paths (panels share one symbol; tilt varies by orbit) ===== -->
    <!-- Orbit A (flat, indigo) -->
    <use href="#ds-panel" transform="translate(207 298) rotate(8)"/>
    <use href="#ds-panel" transform="translate(672 360) rotate(-8)"/>
    <use href="#ds-panel" transform="translate(330 410) rotate(12)"/>
    <use href="#ds-panel" transform="translate(560 250) rotate(-10)"/>
    <use href="#ds-panel" transform="translate(178 330) rotate(4)"/>
    <use href="#ds-panel" transform="translate(682 330) rotate(-4)"/>

    <!-- Orbit B (violet tilt) -->
    <use href="#ds-panel" transform="translate(248 220) rotate(40)"/>
    <use href="#ds-panel" transform="translate(636 452) rotate(-40)"/>
    <use href="#ds-panel" transform="translate(560 196) rotate(34)"/>
    <use href="#ds-panel" transform="translate(300 480) rotate(-34)"/>

    <!-- Orbit C (sky tilt, opposite) -->
    <use href="#ds-panel" transform="translate(232 430) rotate(-44)"/>
    <use href="#ds-panel" transform="translate(640 220) rotate(44)"/>
    <use href="#ds-panel" transform="translate(330 168) rotate(-50)"/>
    <use href="#ds-panel" transform="translate(540 470) rotate(50)"/>

    <!-- Orbit D (steep, indigo) -->
    <use href="#ds-panel" transform="translate(430 135) rotate(78)"/>
    <use href="#ds-panel" transform="translate(430 524) rotate(78)"/>
    <use href="#ds-panel" transform="translate(372 150) rotate(70)"/>
    <use href="#ds-panel" transform="translate(496 510) rotate(70)"/>

    <!-- Orbit E (violet, shallow opposite) -->
    <use href="#ds-panel" transform="translate(206 392) rotate(-20)"/>
    <use href="#ds-panel" transform="translate(656 268) rotate(-20)"/>
    <use href="#ds-panel" transform="translate(286 178) rotate(24)"/>
    <use href="#ds-panel" transform="translate(580 484) rotate(24)"/>

    <!-- A few smaller distant collectors to convey "thousands" -->
    <g fill="#C7D2FE" stroke="#6366F1" stroke-width="1">
      <rect x="156" y="262" width="11" height="6.5" rx="1.6" transform="rotate(18 161 265)"/>
      <rect x="700" y="398" width="11" height="6.5" rx="1.6" transform="rotate(-18 705 401)"/>
      <rect x="404" y="120" width="11" height="6.5" rx="1.6" transform="rotate(72 409 123)"/>
      <rect x="452" y="540" width="11" height="6.5" rx="1.6" transform="rotate(72 457 543)"/>
      <rect x="690" y="248" width="11" height="6.5" rx="1.6" transform="rotate(-46 695 251)"/>
      <rect x="170" y="414" width="11" height="6.5" rx="1.6" transform="rotate(-22 175 417)"/>
    </g>

    <!-- Re-radiated infrared waste heat from the collectors (the detectable signature) -->
    <g stroke="#F43F5E" stroke-width="1.7" opacity="0.7" fill="none" stroke-linecap="round">
      <path d="M186 286 q5 -6 10 0 q5 6 10 0 q5 -6 10 0"/>
      <path d="M700 372 q5 -6 10 0 q5 6 10 0 q5 -6 10 0"/>
      <path d="M444 118 q5 -6 10 0 q5 6 10 0 q5 -6 10 0"/>
      <path d="M316 426 q5 -6 10 0 q5 6 10 0 q5 -6 10 0" transform="rotate(20 326 426)"/>
    </g>
  </g>

  <!-- ===== Right-hand explanatory note: collector + the myth contrast ===== -->
  <g>
    <!-- Single collector callout -->
    <rect x="742" y="120" width="220" height="150" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <text x="762" y="148" font-size="15" font-weight="700" fill="#0F172A">One swarm element</text>
    <g transform="translate(792 192) scale(2.4)">
      <use href="#ds-panel"/>
    </g>
    <line x1="822" y1="208" x2="852" y2="208" stroke="#F59E0B" stroke-width="2.2" marker-end="url(#ds-arrow-amber)"/>
    <text x="862" y="200" font-size="12.5" fill="#334155">absorbs</text>
    <text x="862" y="216" font-size="12.5" fill="#334155">sunlight</text>
    <path d="M792 224 q6 8 12 0 q6 -8 12 0" stroke="#F43F5E" stroke-width="1.8" fill="none"/>
    <text x="762" y="252" font-size="12.5" fill="#334155">Independent platform on its</text>
    <text x="762" y="268" font-size="12.5" fill="#334155">own orbit; re-emits IR heat.</text>
  </g>

  <!-- ===== Bottom legend strip ===== -->
  <g>
    <rect x="36" y="528" width="700" height="48" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>

    <!-- Collector -->
    <g transform="translate(62 552)"><use href="#ds-panel"/></g>
    <text x="80" y="557" font-size="14.5" fill="#334155">Solar collector</text>

    <!-- Orbital planes -->
    <line x1="218" y1="552" x2="250" y2="552" stroke="#6366F1" stroke-width="2" stroke-dasharray="2,7"/>
    <text x="258" y="557" font-size="14.5" fill="#334155">Orbital planes</text>

    <!-- Energy beamed in -->
    <line x1="392" y1="552" x2="424" y2="552" stroke="#F59E0B" stroke-width="2.4" marker-end="url(#ds-arrow-amber)"/>
    <text x="432" y="557" font-size="14.5" fill="#334155">Energy relay</text>

    <!-- IR re-emission -->
    <path d="M566 552 q7 -8 14 0 q7 8 14 0" stroke="#F43F5E" stroke-width="2" fill="none"/>
    <text x="602" y="557" font-size="14.5" fill="#334155">Re-emitted IR</text>
  </g>

  <!-- ===== Myth-vs-reality note (bottom right) ===== -->
  <g>
    <rect x="752" y="528" width="210" height="48" rx="12" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.3"/>
    <circle cx="776" cy="552" r="9" fill="none" stroke="#F43F5E" stroke-width="2.2"/>
    <line x1="769.6" y1="558.4" x2="782.4" y2="545.6" stroke="#F43F5E" stroke-width="2.2"/>
    <text x="794" y="548" font-size="12" font-weight="700" fill="#9F1239">Not a rigid shell</text>
    <text x="794" y="565" font-size="11.5" fill="#9F1239">a solid sphere is unstable</text>
  </g>
</svg>
