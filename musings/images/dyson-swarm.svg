<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bg-sw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="sunCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunCorona" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowSw">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bg-sw)"/>

  <!-- Stars -->
  <circle cx="40" cy="25" r="1.2" fill="white" opacity="0.2"/>
  <circle cx="120" cy="60" r="0.8" fill="white" opacity="0.15"/>
  <circle cx="200" cy="15" r="1" fill="white" opacity="0.25"/>
  <circle cx="310" cy="45" r="0.7" fill="white" opacity="0.1"/>
  <circle cx="780" cy="30" r="1.3" fill="white" opacity="0.2"/>
  <circle cx="860" cy="80" r="0.9" fill="white" opacity="0.15"/>
  <circle cx="940" cy="20" r="1.1" fill="white" opacity="0.25"/>
  <circle cx="50" cy="550" r="1" fill="white" opacity="0.15"/>
  <circle cx="180" cy="570" r="1.2" fill="white" opacity="0.2"/>
  <circle cx="820" cy="560" r="0.8" fill="white" opacity="0.1"/>
  <circle cx="950" cy="540" r="1" fill="white" opacity="0.2"/>
  <circle cx="60" cy="300" r="0.7" fill="white" opacity="0.15"/>
  <circle cx="30" cy="420" r="0.9" fill="white" opacity="0.1"/>
  <circle cx="960" cy="380" r="1.1" fill="white" opacity="0.2"/>
  <circle cx="930" cy="170" r="0.8" fill="white" opacity="0.15"/>
  <circle cx="80" cy="150" r="1" fill="white" opacity="0.2"/>
  <circle cx="900" cy="450" r="0.6" fill="white" opacity="0.25"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="bold" fill="#e2e8f0">Dyson Swarm Architecture</text>

  <!-- Sun corona glow -->
  <circle cx="500" cy="300" r="160" fill="url(#sunCorona)" filter="url(#bigGlow)"/>
  <!-- Sun -->
  <circle cx="500" cy="300" r="85" fill="url(#sunCore)" filter="url(#glowSw)"/>
  <!-- Sun surface detail -->
  <circle cx="475" cy="280" r="12" fill="#fef3c7" opacity="0.3"/>
  <circle cx="520" cy="310" r="8" fill="#fef3c7" opacity="0.2"/>
  <circle cx="490" cy="330" r="10" fill="#fef3c7" opacity="0.25"/>
  <!-- Sun label -->
  <text x="500" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#451a03">3.8 x 10&#xb2;&#x2076; W</text>

  <!-- Orbital ellipses (dashed) -->
  <ellipse cx="500" cy="300" rx="180" ry="140" fill="none" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="8,6" opacity="0.3"/>
  <ellipse cx="500" cy="300" rx="220" ry="110" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-dasharray="8,6" opacity="0.25" transform="rotate(15, 500, 300)"/>
  <ellipse cx="500" cy="300" rx="250" ry="160" fill="none" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="8,6" opacity="0.3" transform="rotate(-10, 500, 300)"/>
  <ellipse cx="500" cy="300" rx="200" ry="170" fill="none" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="8,6" opacity="0.2" transform="rotate(35, 500, 300)"/>
  <ellipse cx="500" cy="300" rx="240" ry="130" fill="none" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="8,6" opacity="0.25" transform="rotate(-25, 500, 300)"/>
  <ellipse cx="500" cy="300" rx="210" ry="150" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-dasharray="8,6" opacity="0.2" transform="rotate(50, 500, 300)"/>

  <!-- Solar collectors - orbit 1 -->
  <rect x="315" y="195" width="14" height="8" rx="2" fill="#818cf8" opacity="0.9" transform="rotate(20, 322, 199)"/>
  <rect x="670" y="390" width="14" height="8" rx="2" fill="#818cf8" opacity="0.9" transform="rotate(-15, 677, 394)"/>
  <rect x="380" y="430" width="14" height="8" rx="2" fill="#818cf8" opacity="0.85" transform="rotate(40, 387, 434)"/>
  <rect x="620" y="170" width="14" height="8" rx="2" fill="#818cf8" opacity="0.9" transform="rotate(-30, 627, 174)"/>
  <rect x="290" y="310" width="14" height="8" rx="2" fill="#818cf8" opacity="0.8" transform="rotate(10, 297, 314)"/>
  <rect x="710" y="280" width="14" height="8" rx="2" fill="#818cf8" opacity="0.85" transform="rotate(-5, 717, 284)"/>

  <!-- Solar collectors - orbit 2 -->
  <rect x="270" y="240" width="12" height="7" rx="2" fill="#a855f7" opacity="0.85" transform="rotate(25, 276, 244)"/>
  <rect x="720" y="340" width="12" height="7" rx="2" fill="#a855f7" opacity="0.8" transform="rotate(-20, 726, 344)"/>
  <rect x="350" y="155" width="12" height="7" rx="2" fill="#a855f7" opacity="0.9" transform="rotate(45, 356, 159)"/>
  <rect x="650" y="440" width="12" height="7" rx="2" fill="#a855f7" opacity="0.85" transform="rotate(-35, 656, 444)"/>
  <rect x="260" y="360" width="12" height="7" rx="2" fill="#a855f7" opacity="0.8" transform="rotate(15, 266, 364)"/>
  <rect x="740" y="220" width="12" height="7" rx="2" fill="#a855f7" opacity="0.85" transform="rotate(-10, 746, 224)"/>

  <!-- Solar collectors - orbit 3 -->
  <rect x="250" y="280" width="11" height="6" rx="2" fill="#c084fc" opacity="0.8" transform="rotate(30, 256, 283)"/>
  <rect x="745" cy="310" width="11" height="6" rx="2" fill="#c084fc" opacity="0.75" transform="rotate(-25, 751, 313)"/>
  <rect x="340" y="460" width="11" height="6" rx="2" fill="#c084fc" opacity="0.8" transform="rotate(50, 346, 463)"/>
  <rect x="660" y="140" width="11" height="6" rx="2" fill="#c084fc" opacity="0.85" transform="rotate(-40, 666, 143)"/>
  <rect x="280" y="180" width="11" height="6" rx="2" fill="#c084fc" opacity="0.75" transform="rotate(5, 286, 183)"/>
  <rect x="720" y="420" width="11" height="6" rx="2" fill="#c084fc" opacity="0.8" transform="rotate(-15, 726, 423)"/>

  <!-- More collectors scattered -->
  <rect x="330" y="380" width="10" height="6" rx="2" fill="#6366f1" opacity="0.75" transform="rotate(35, 335, 383)"/>
  <rect x="680" y="210" width="10" height="6" rx="2" fill="#6366f1" opacity="0.8" transform="rotate(-45, 685, 213)"/>
  <rect x="420" y="140" width="10" height="6" rx="2" fill="#6366f1" opacity="0.7" transform="rotate(60, 425, 143)"/>
  <rect x="580" y="460" width="10" height="6" rx="2" fill="#6366f1" opacity="0.75" transform="rotate(-55, 585, 463)"/>
  <rect x="240" y="320" width="10" height="6" rx="2" fill="#6366f1" opacity="0.7" transform="rotate(20, 245, 323)"/>
  <rect x="760" y="270" width="10" height="6" rx="2" fill="#6366f1" opacity="0.75" transform="rotate(-30, 765, 273)"/>
  <rect x="310" y="440" width="10" height="6" rx="2" fill="#818cf8" opacity="0.7" transform="rotate(40, 315, 443)"/>
  <rect x="690" y="160" width="10" height="6" rx="2" fill="#818cf8" opacity="0.75" transform="rotate(-50, 695, 163)"/>
  <rect x="460" y="460" width="10" height="6" rx="2" fill="#a855f7" opacity="0.7" transform="rotate(15, 465, 463)"/>
  <rect x="540" y="130" width="10" height="6" rx="2" fill="#a855f7" opacity="0.75" transform="rotate(-10, 545, 133)"/>
  <rect x="750" y="360" width="10" height="6" rx="2" fill="#c084fc" opacity="0.7" transform="rotate(25, 755, 363)"/>
  <rect x="250" y="220" width="10" height="6" rx="2" fill="#c084fc" opacity="0.75" transform="rotate(-35, 255, 223)"/>

  <!-- Energy collection arrows (thin amber) -->
  <line x1="322" y1="199" x2="430" y2="265" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="677" y1="394" x2="570" y2="335" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="627" y1="174" x2="555" y2="245" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="387" y1="434" x2="460" y2="360" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="717" y1="284" x2="580" y2="295" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="297" y1="314" x2="420" y2="305" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Labels -->
  <rect x="40" y="530" width="200" height="36" rx="8" fill="#1e293b" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="7" y="530" width="10" height="6" rx="2" fill="#818cf8"/>
  <text x="140" y="554" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e2e8f0">Solar Collectors</text>

  <rect x="280" y="530" width="200" height="36" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="380" y="554" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e2e8f0">Orbital Planes</text>

  <rect x="520" y="530" width="230" height="36" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="635" y="554" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e2e8f0">Energy Transmission</text>

  <!-- Star label -->
  <text x="500" y="405" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#fbbf24" filter="url(#glowSw)">Star</text>

  <!-- Annotation -->
  <rect x="770" y="530" width="200" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="870" y="554" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">Multiple orbital inclinations</text>
</svg>