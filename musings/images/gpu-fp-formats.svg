<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="bg-fp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="signGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="expGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="mantGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="450" fill="url(#bg-fp)"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="bold" fill="#e2e8f0">Floating Point Format Comparison</text>

  <!-- Legend -->
  <rect x="300" y="62" width="400" height="32" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="320" y="72" width="30" height="14" rx="4" fill="url(#signGrad)"/>
  <text x="358" y="84" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e2e8f0">Sign</text>
  <rect x="410" y="72" width="30" height="14" rx="4" fill="url(#expGrad)"/>
  <text x="448" y="84" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e2e8f0">Exponent</text>
  <rect x="530" y="72" width="30" height="14" rx="4" fill="url(#mantGrad)"/>
  <text x="568" y="84" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e2e8f0">Mantissa</text>

  <!-- Scale: 1 bit = 20px width, base x = 220 -->
  <!-- FP32: 32 bits total [1 sign | 8 exp | 23 mant] -->
  <g transform="translate(0, 115)">
    <text x="60" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0">FP32</text>
    <text x="60" y="50" text-anchor="middle" font-family="monospace" font-size="14" fill="#64748b">32 bits</text>
    <!-- Sign: 1 bit = 20px -->
    <rect x="220" y="12" width="20" height="44" rx="4" fill="url(#signGrad)" stroke="#fca5a5" stroke-width="1" stroke-opacity="0.3"/>
    <text x="230" y="39" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">1</text>
    <!-- Exponent: 8 bits = 160px -->
    <rect x="242" y="12" width="160" height="44" rx="4" fill="url(#expGrad)" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="322" y="39" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">8 bits</text>
    <!-- Mantissa: 23 bits = 460px -->
    <rect x="404" y="12" width="460" height="44" rx="4" fill="url(#mantGrad)" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3"/>
    <text x="634" y="39" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">23 bits</text>
  </g>

  <!-- TF32: 19 bits total [1 sign | 8 exp | 10 mant] -->
  <g transform="translate(0, 195)">
    <text x="60" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0">TF32</text>
    <text x="60" y="50" text-anchor="middle" font-family="monospace" font-size="14" fill="#64748b">19 bits</text>
    <rect x="220" y="12" width="20" height="44" rx="4" fill="url(#signGrad)" stroke="#fca5a5" stroke-width="1" stroke-opacity="0.3"/>
    <text x="230" y="39" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">1</text>
    <rect x="242" y="12" width="160" height="44" rx="4" fill="url(#expGrad)" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="322" y="39" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">8 bits</text>
    <rect x="404" y="12" width="200" height="44" rx="4" fill="url(#mantGrad)" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3"/>
    <text x="504" y="39" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">10 bits</text>
  </g>

  <!-- FP16: 16 bits total [1 sign | 5 exp | 10 mant] -->
  <g transform="translate(0, 275)">
    <text x="60" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0">FP16</text>
    <text x="60" y="50" text-anchor="middle" font-family="monospace" font-size="14" fill="#64748b">16 bits</text>
    <rect x="220" y="12" width="20" height="44" rx="4" fill="url(#signGrad)" stroke="#fca5a5" stroke-width="1" stroke-opacity="0.3"/>
    <text x="230" y="39" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">1</text>
    <rect x="242" y="12" width="100" height="44" rx="4" fill="url(#expGrad)" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="292" y="39" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">5 bits</text>
    <rect x="344" y="12" width="200" height="44" rx="4" fill="url(#mantGrad)" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3"/>
    <text x="444" y="39" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">10 bits</text>
  </g>

  <!-- BF16: 16 bits total [1 sign | 8 exp | 7 mant] -->
  <g transform="translate(0, 355)">
    <text x="60" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0">BF16</text>
    <text x="60" y="50" text-anchor="middle" font-family="monospace" font-size="14" fill="#64748b">16 bits</text>
    <rect x="220" y="12" width="20" height="44" rx="4" fill="url(#signGrad)" stroke="#fca5a5" stroke-width="1" stroke-opacity="0.3"/>
    <text x="230" y="39" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">1</text>
    <rect x="242" y="12" width="160" height="44" rx="4" fill="url(#expGrad)" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="322" y="39" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">8 bits</text>
    <rect x="404" y="12" width="140" height="44" rx="4" fill="url(#mantGrad)" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3"/>
    <text x="474" y="39" text-anchor="middle" font-family="monospace" font-size="14" fill="white" font-weight="bold">7 bits</text>
  </g>

  <!-- "Same range as FP32" annotation connecting FP32 and TF32 exponents -->
  <line x1="405" y1="147" x2="405" y2="207" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M 398,147 L 405,140 L 412,147" fill="none" stroke="#22c55e" stroke-width="2"/>
  <path d="M 398,207 L 405,214 L 412,207" fill="none" stroke="#22c55e" stroke-width="2"/>
  <rect x="680" y="168" width="195" height="28" rx="8" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1.5"/>
  <text x="777" y="187" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#22c55e">Same range as FP32</text>
  <line x1="678" y1="182" x2="415" y2="182" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- "Same range" for BF16 too -->
  <line x1="405" y1="335" x2="405" y2="367" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <rect x="680" y="373" width="195" height="24" rx="8" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="777" y="390" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#22c55e" opacity="0.7">Same range as FP32</text>
  <line x1="678" y1="385" x2="415" y2="385" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
</svg>