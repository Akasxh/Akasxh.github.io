<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450" role="img" aria-label="Floating-point format bit layouts compared: FP32 (1 sign, 8 exponent, 23 mantissa), TF32 (1/8/10, 19 bits used), FP16 (1/5/10), BF16 (1/8/7), FP8 E4M3 (1/4/3), FP8 E5M2 (1/5/2) and FP4 E2M1 (1/2/1), each drawn as a horizontal bit-field bar.">
  <defs>
    <style>
      .ttl  { font-family: Montserrat, 'Segoe UI', system-ui, sans-serif; }
      .lbl  { font-family: Montserrat, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    </style>
    <!-- soft card shadow for bars -->
    <filter id="fpCard" x="-4%" y="-30%" width="108%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <!-- faint background dot grid -->
    <pattern id="fpDots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#EEF2F7"/>
    </pattern>
  </defs>

  <!-- ===== background ===== -->
  <rect width="1000" height="450" fill="#FFFFFF"/>
  <rect x="12" y="12" width="976" height="426" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="12" y="12" width="976" height="426" rx="16" fill="url(#fpDots)"/>

  <!-- ===== title ===== -->
  <text x="44" y="48" class="ttl" font-size="28" font-weight="700" fill="#0F172A">Floating-Point Format Comparison</text>
  <text x="44" y="73" class="lbl" font-size="15" fill="#64748B">Each bar splits its bits&#8201;:&#8201; sign &#183; exponent (range) &#183; mantissa (precision)</text>

  <!-- ===== legend (top-right) ===== -->
  <g>
    <rect x="676" y="50" width="22" height="14" rx="4" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.5"/>
    <text x="704" y="61" class="lbl" font-size="14" fill="#334155">Sign</text>
    <rect x="752" y="50" width="22" height="14" rx="4" fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="780" y="61" class="lbl" font-size="14" fill="#334155">Exponent</text>
    <rect x="858" y="50" width="22" height="14" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="886" y="61" class="lbl" font-size="14" fill="#334155">Mantissa</text>
  </g>

  <!-- ===================================================================
       Scale: 1 bit = 22.5 units, bars start at x = 200.
       Cumulative edges: sign|exp at x=222.5; +8b exp -> 402.5; FP32 mant end -> 920.
       Bars left-aligned so total length encodes the storage size.
       Row pitch 45, bar height 30. Name baseline = bar-top + 20.
  ==================================================================== -->

  <!-- ============ FP32 : 1 / 8 / 23  (32-bit) ============ -->
  <g>
    <circle cx="35" cy="124" r="3.2" fill="#6366F1"/>
    <text x="44" y="130" class="ttl" font-size="18" font-weight="700" fill="#0F172A">FP32</text>
    <text x="192" y="130" text-anchor="end" class="mono" font-size="12.5" fill="#64748B">32&#8201;bit</text>
    <g filter="url(#fpCard)">
      <rect x="200"   y="110" width="22.5"  height="30" rx="6" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.5"/>
      <rect x="222.5" y="110" width="180"   height="30"        fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
      <rect x="402.5" y="110" width="517.5" height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    </g>
    <text x="211.25" y="130" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#9F1239">1</text>
    <text x="312.5"  y="130" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#312E81">8&#8201;exp</text>
    <text x="661.25" y="130" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#92400E">23&#8201;mant</text>
  </g>

  <!-- ============ TF32 : 1 / 8 / 10  (19 bits used, stored in 32-bit) ============ -->
  <g>
    <circle cx="35" cy="169" r="3.2" fill="#6366F1"/>
    <text x="44" y="175" class="ttl" font-size="18" font-weight="700" fill="#0F172A">TF32</text>
    <text x="192" y="175" text-anchor="end" class="mono" font-size="12.5" fill="#64748B">19&#8201;bit</text>
    <!-- ghost remainder of the 32-bit container -->
    <rect x="627.5" y="155" width="292.5" height="30" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.3" stroke-dasharray="5,4"/>
    <text x="773.75" y="174" text-anchor="middle" class="mono" font-size="11.5" fill="#94A3B8">unused &#183; held in a 32-bit register</text>
    <g filter="url(#fpCard)">
      <rect x="200"   y="155" width="22.5" height="30" rx="6" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.5"/>
      <rect x="222.5" y="155" width="180"  height="30"        fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
      <rect x="402.5" y="155" width="225"  height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    </g>
    <text x="211.25" y="175" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#9F1239">1</text>
    <text x="312.5"  y="175" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#312E81">8&#8201;exp</text>
    <text x="515"    y="175" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#92400E">10&#8201;mant</text>
  </g>

  <!-- ============ FP16 : 1 / 5 / 10  (16-bit) ============ -->
  <g>
    <text x="44" y="220" class="ttl" font-size="18" font-weight="700" fill="#0F172A">FP16</text>
    <text x="192" y="220" text-anchor="end" class="mono" font-size="12.5" fill="#64748B">16&#8201;bit</text>
    <g filter="url(#fpCard)">
      <rect x="200"   y="200" width="22.5" height="30" rx="6" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.5"/>
      <rect x="222.5" y="200" width="112.5" height="30"       fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
      <rect x="335"   y="200" width="225"   height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    </g>
    <text x="211.25" y="220" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#9F1239">1</text>
    <text x="278.75" y="220" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#312E81">5&#8201;exp</text>
    <text x="447.5"  y="220" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#92400E">10&#8201;mant</text>
    <text x="578" y="220" class="mono" font-size="13" fill="#475569">5-bit exp &#183; half precision</text>
  </g>

  <!-- ============ BF16 : 1 / 8 / 7  (16-bit, FP32 range) ============ -->
  <g>
    <circle cx="35" cy="259" r="3.2" fill="#6366F1"/>
    <text x="44" y="265" class="ttl" font-size="18" font-weight="700" fill="#0F172A">BF16</text>
    <text x="192" y="265" text-anchor="end" class="mono" font-size="12.5" fill="#64748B">16&#8201;bit</text>
    <g filter="url(#fpCard)">
      <rect x="200"   y="245" width="22.5" height="30" rx="6" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.5"/>
      <rect x="222.5" y="245" width="180"   height="30"       fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
      <rect x="402.5" y="245" width="157.5" height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    </g>
    <text x="211.25" y="265" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#9F1239">1</text>
    <text x="312.5"  y="265" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#312E81">8&#8201;exp</text>
    <text x="481.25" y="265" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#92400E">7&#8201;mant</text>
    <text x="578" y="265" class="mono" font-size="13" fill="#475569">8-bit exp &#183; same range as FP32</text>
  </g>

  <!-- ============ FP8 E4M3 : 1 / 4 / 3  (8-bit) ============ -->
  <g>
    <text x="44" y="310" class="ttl" font-size="18" font-weight="700" fill="#0F172A">FP8 <tspan class="mono" font-size="14" fill="#475569">E4M3</tspan></text>
    <text x="192" y="310" text-anchor="end" class="mono" font-size="12.5" fill="#64748B">8&#8201;bit</text>
    <g filter="url(#fpCard)">
      <rect x="200"   y="290" width="22.5" height="30" rx="6" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.5"/>
      <rect x="222.5" y="290" width="90"    height="30"       fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
      <rect x="312.5" y="290" width="67.5"  height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    </g>
    <text x="211.25" y="310" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#9F1239">1</text>
    <text x="267.5"  y="310" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#312E81">4&#8201;exp</text>
    <text x="346.25" y="310" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#92400E">3</text>
    <text x="398" y="310" class="mono" font-size="13" fill="#475569">4-bit exp &#183; weights &amp; activations</text>
  </g>

  <!-- ============ FP8 E5M2 : 1 / 5 / 2  (8-bit) ============ -->
  <g>
    <text x="44" y="355" class="ttl" font-size="18" font-weight="700" fill="#0F172A">FP8 <tspan class="mono" font-size="14" fill="#475569">E5M2</tspan></text>
    <text x="192" y="355" text-anchor="end" class="mono" font-size="12.5" fill="#64748B">8&#8201;bit</text>
    <g filter="url(#fpCard)">
      <rect x="200"   y="335" width="22.5" height="30" rx="6" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.5"/>
      <rect x="222.5" y="335" width="112.5" height="30"       fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
      <rect x="335"   y="335" width="45"    height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    </g>
    <text x="211.25" y="355" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#9F1239">1</text>
    <text x="278.75" y="355" text-anchor="middle" class="mono" font-size="13.5" font-weight="700" fill="#312E81">5&#8201;exp</text>
    <text x="357.5"  y="355" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#92400E">2</text>
    <text x="398" y="355" class="mono" font-size="13" fill="#475569">5-bit exp &#183; gradients (wider range)</text>
  </g>

  <!-- ============ FP4 E2M1 : 1 / 2 / 1  (4-bit) ============ -->
  <g>
    <text x="44" y="400" class="ttl" font-size="18" font-weight="700" fill="#0F172A">FP4 <tspan class="mono" font-size="14" fill="#475569">E2M1</tspan></text>
    <text x="192" y="400" text-anchor="end" class="mono" font-size="12.5" fill="#64748B">4&#8201;bit</text>
    <g filter="url(#fpCard)">
      <rect x="200"   y="380" width="22.5" height="30" rx="6" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.5"/>
      <rect x="222.5" y="380" width="45"   height="30"        fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
      <rect x="267.5" y="380" width="22.5" height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    </g>
    <text x="211.25" y="400" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#9F1239">1</text>
    <text x="245"    y="400" text-anchor="middle" class="mono" font-size="13" font-weight="700" fill="#312E81">2</text>
    <text x="278.75" y="400" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#92400E">1</text>
    <text x="308" y="400" class="mono" font-size="13" fill="#475569">2-bit exp &#183; FP4 lands on Blackwell</text>
  </g>

  <!-- ===== footnote ===== -->
  <text x="44" y="428" class="lbl" font-size="12.5" fill="#64748B"><tspan fill="#6366F1" font-weight="700">&#9679;</tspan> Wider exponent = larger range; more mantissa bits = more precision. FP32, TF32 and BF16 share an 8-bit exponent, so all three reach the FP32 range.</text>
</svg>
