<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 280" width="750" height="280" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="750" height="280" rx="16" fill="url(#bgG)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="375" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Floating Point Format Comparison</text>

  <!-- Scale: 1 bit = 18px width. Max = 32 bits = 576px. Start x=87 -->
  <!-- FP32: 32 bits total -->
  <g transform="translate(0, 50)">
    <text x="80" y="18" text-anchor="end" font-size="13" font-weight="600" fill="#0f172a">FP32</text>
    <text x="80" y="32" text-anchor="end" font-size="10" fill="#64748b">32 bits</text>
    <!-- Sign: 1 bit -->
    <rect x="87" y="6" width="18" height="30" rx="3" fill="#0f172a"/>
    <text x="96" y="25" text-anchor="middle" font-size="8" fill="white">1</text>
    <!-- Exponent: 8 bits -->
    <rect x="107" y="6" width="144" height="30" rx="3" fill="#4f46e5"/>
    <text x="179" y="25" text-anchor="middle" font-size="11" fill="white" font-weight="600">8 exp</text>
    <!-- Mantissa: 23 bits -->
    <rect x="253" y="6" width="414" height="30" rx="3" fill="#a5b4fc"/>
    <text x="460" y="25" text-anchor="middle" font-size="11" fill="#312e81" font-weight="600">23 mantissa</text>
  </g>

  <!-- TF32: 19 bits total. Scale: 18px/bit -->
  <g transform="translate(0, 105)">
    <text x="80" y="18" text-anchor="end" font-size="13" font-weight="600" fill="#0f172a">TF32</text>
    <text x="80" y="32" text-anchor="end" font-size="10" fill="#64748b">19 bits</text>
    <rect x="87" y="6" width="18" height="30" rx="3" fill="#0f172a"/>
    <text x="96" y="25" text-anchor="middle" font-size="8" fill="white">1</text>
    <rect x="107" y="6" width="144" height="30" rx="3" fill="#4f46e5"/>
    <text x="179" y="25" text-anchor="middle" font-size="11" fill="white" font-weight="600">8 exp</text>
    <rect x="253" y="6" width="180" height="30" rx="3" fill="#a5b4fc"/>
    <text x="343" y="25" text-anchor="middle" font-size="11" fill="#312e81" font-weight="600">10 mantissa</text>
    <!-- Annotation -->
    <text x="450" y="25" font-size="9" fill="#4f46e5" font-style="italic">= FP32 range + FP16 precision</text>
  </g>

  <!-- FP16: 16 bits total -->
  <g transform="translate(0, 160)">
    <text x="80" y="18" text-anchor="end" font-size="13" font-weight="600" fill="#0f172a">FP16</text>
    <text x="80" y="32" text-anchor="end" font-size="10" fill="#64748b">16 bits</text>
    <rect x="87" y="6" width="18" height="30" rx="3" fill="#0f172a"/>
    <text x="96" y="25" text-anchor="middle" font-size="8" fill="white">1</text>
    <rect x="107" y="6" width="90" height="30" rx="3" fill="#a855f7"/>
    <text x="152" y="25" text-anchor="middle" font-size="11" fill="white" font-weight="600">5 exp</text>
    <rect x="199" y="6" width="180" height="30" rx="3" fill="#d8b4fe"/>
    <text x="289" y="25" text-anchor="middle" font-size="11" fill="#581c87" font-weight="600">10 mantissa</text>
  </g>

  <!-- BF16: 16 bits total -->
  <g transform="translate(0, 215)">
    <text x="80" y="18" text-anchor="end" font-size="13" font-weight="600" fill="#0f172a">BF16</text>
    <text x="80" y="32" text-anchor="end" font-size="10" fill="#64748b">16 bits</text>
    <rect x="87" y="6" width="18" height="30" rx="3" fill="#0f172a"/>
    <text x="96" y="25" text-anchor="middle" font-size="8" fill="white">1</text>
    <rect x="107" y="6" width="144" height="30" rx="3" fill="#4f46e5"/>
    <text x="179" y="25" text-anchor="middle" font-size="11" fill="white" font-weight="600">8 exp</text>
    <rect x="253" y="6" width="126" height="30" rx="3" fill="#a5b4fc"/>
    <text x="316" y="25" text-anchor="middle" font-size="11" fill="#312e81" font-weight="600">7 mantissa</text>
  </g>

  <!-- Legend: color meaning -->
  <g transform="translate(87, 260)">
    <rect width="10" height="10" rx="2" fill="#0f172a"/><text x="14" y="9" font-size="9" fill="#64748b">Sign</text>
    <rect x="50" width="10" height="10" rx="2" fill="#4f46e5"/><text x="64" y="9" font-size="9" fill="#64748b">Exponent (range)</text>
    <rect x="170" width="10" height="10" rx="2" fill="#a5b4fc"/><text x="184" y="9" font-size="9" fill="#64748b">Mantissa (precision)</text>
  </g>
</svg>