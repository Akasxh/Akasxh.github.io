<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="Montserrat, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- Arrow markers -->
    <marker id="tma-arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
    <marker id="tma-arr-amber-sm" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
    <marker id="tma-arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
    <marker id="tma-arr-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10B981"/>
    </marker>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="1000" height="500" fill="#FFFFFF"/>
  <rect x="8" y="8" width="984" height="484" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ===== Title ===== -->
  <text x="500" y="46" text-anchor="middle" font-size="29" font-weight="700" fill="#0F172A">Tensor Memory Accelerator (TMA)</text>
  <text x="500" y="71" text-anchor="middle" font-size="16" font-weight="500" fill="#64748B">Hopper (H100): one thread issues an asynchronous bulk copy of a tensor tile, driven by a descriptor</text>

  <!-- ====================================================================== -->
  <!-- GLOBAL MEMORY (left)                                                    -->
  <!-- ====================================================================== -->
  <rect x="34" y="120" width="236" height="250" rx="14" fill="#0EA5E9" fill-opacity="0.10" stroke="#0EA5E9" stroke-width="2"/>
  <text x="152" y="148" text-anchor="middle" font-size="19" font-weight="700" fill="#075985">Global Memory</text>
  <text x="152" y="170" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" fill="#0369A1">HBM3 · multi-dim tensor</text>

  <!-- tensor grid with a highlighted tile -->
  <g stroke="#7DD3FC" stroke-width="1.5" fill="#FFFFFF">
    <rect x="64" y="188" width="176" height="160" rx="8"/>
  </g>
  <g stroke="#BAE6FD" stroke-width="1">
    <line x1="64" y1="228" x2="240" y2="228"/>
    <line x1="64" y1="268" x2="240" y2="268"/>
    <line x1="64" y1="308" x2="240" y2="308"/>
    <line x1="108" y1="188" x2="108" y2="348"/>
    <line x1="152" y1="188" x2="152" y2="348"/>
    <line x1="196" y1="188" x2="196" y2="348"/>
  </g>
  <!-- highlighted tile (the bytes being copied) -->
  <rect x="108" y="228" width="88" height="80" rx="3" fill="#F59E0B" fill-opacity="0.22" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="152" y="273" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="700" fill="#B45309">tile</text>
  <text x="152" y="338" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" fill="#0369A1">strided 2D / 3D layout</text>

  <!-- ====================================================================== -->
  <!-- TMA ENGINE (center)                                                     -->
  <!-- ====================================================================== -->
  <rect x="382" y="112" width="236" height="266" rx="14" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="500" y="139" text-anchor="middle" font-size="20" font-weight="700" fill="#B45309">TMA Engine</text>
  <text x="500" y="159" text-anchor="middle" font-size="13" font-weight="500" fill="#92660B">dedicated copy hardware</text>

  <!-- Descriptor card -->
  <rect x="404" y="174" width="192" height="96" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.8"/>
  <text x="500" y="196" text-anchor="middle" font-size="14.5" font-weight="700" fill="#B45309">Copy Descriptor</text>
  <text x="500" y="213" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" fill="#475569">TensorMap · 128 B</text>
  <line x1="420" y1="222" x2="580" y2="222" stroke="#FDE7C2" stroke-width="1"/>
  <text x="500" y="239" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#64748B">base · dims · stride</text>
  <text x="500" y="255" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#64748B">dtype · swizzle</text>

  <!-- engine function line -->
  <text x="500" y="296" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" fill="#92660B">HW address generation + DMA</text>
  <text x="500" y="314" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" fill="#92660B">bounds check + padding</text>

  <!-- configured once tag -->
  <rect x="416" y="330" width="168" height="32" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="500" y="351" text-anchor="middle" font-size="12.5" font-weight="600" fill="#B45309">configured once, reused</text>

  <!-- ====================================================================== -->
  <!-- SHARED MEMORY (right)                                                   -->
  <!-- ====================================================================== -->
  <rect x="730" y="120" width="236" height="250" rx="14" fill="#6366F1" fill-opacity="0.10" stroke="#6366F1" stroke-width="2"/>
  <text x="848" y="148" text-anchor="middle" font-size="19" font-weight="700" fill="#3730A3">Shared Memory</text>
  <text x="848" y="170" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" fill="#4338CA">SMEM · on-chip, ~228 KB</text>

  <!-- delivered tile -->
  <rect x="760" y="188" width="176" height="96" rx="8" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="1.5"/>
  <rect x="784" y="208" width="128" height="56" rx="4" fill="#F59E0B" fill-opacity="0.22" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="848" y="241" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="700" fill="#B45309">tile in SMEM</text>

  <!-- mbarrier -->
  <rect x="760" y="300" width="176" height="48" rx="9" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-width="1.8"/>
  <text x="848" y="320" text-anchor="middle" font-size="13.5" font-weight="700" fill="#047857">mbarrier</text>
  <text x="848" y="338" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#047857">signals on completion</text>

  <!-- ====================================================================== -->
  <!-- ASYNC COPY ARROWS  GMEM <-> TMA <-> SMEM                                -->
  <!-- ====================================================================== -->
  <!-- GMEM -> TMA -->
  <line x1="270" y1="234" x2="380" y2="234" stroke="#F59E0B" stroke-width="3.5" marker-end="url(#tma-arr-amber)"/>
  <!-- TMA -> SMEM -->
  <line x1="620" y1="234" x2="728" y2="234" stroke="#F59E0B" stroke-width="3.5" marker-end="url(#tma-arr-amber)"/>
  <text x="325" y="222" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" font-weight="700" fill="#B45309">async load</text>
  <text x="674" y="222" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" font-weight="700" fill="#B45309">async store</text>
  <!-- return path (store back) - thin, dashed -->
  <line x1="728" y1="266" x2="622" y2="266" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#tma-arr-slate)"/>
  <line x1="380" y1="266" x2="272" y2="266" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#tma-arr-slate)"/>

  <!-- ====================================================================== -->
  <!-- BOTTOM ROW: single-thread issue  +  compute warps freed                -->
  <!-- ====================================================================== -->

  <!-- single producer thread issues the copy -->
  <rect x="34" y="398" width="430" height="78" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="74" cy="437" r="15" fill="#F59E0B" fill-opacity="0.18" stroke="#F59E0B" stroke-width="2"/>
  <text x="74" y="442" text-anchor="middle" font-size="15" font-weight="700" fill="#B45309">1</text>
  <text x="102" y="424" font-size="15" font-weight="700" fill="#0F172A">One thread issues the transfer</text>
  <text x="102" y="445" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" fill="#475569">cp.async.bulk.tensor: no per-element</text>
  <text x="102" y="461" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" fill="#475569">address math in the warps</text>
  <!-- arrow up from issuer; lands horizontally on the Copy Descriptor card's left edge (clear of the pill and the panel border) -->
  <path d="M 300,398 C 314,360 374,255 408,255" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#tma-arr-amber-sm)"/>
  <text x="292" y="352" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10.5" fill="#92660B">issue</text>

  <!-- compute warps freed for work -->
  <rect x="536" y="398" width="430" height="78" rx="12" fill="#10B981" fill-opacity="0.10" stroke="#10B981" stroke-width="1.8"/>
  <text x="556" y="424" font-size="15" font-weight="700" fill="#065F46">Compute warps stay free</text>
  <text x="556" y="445" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" fill="#047857">tensor-core MMAs overlap the copy;</text>
  <text x="556" y="461" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" fill="#047857">consume the tile after mbarrier signals</text>
  <!-- small tensor-core glyph -->
  <g transform="translate(902,418)">
    <rect x="0" y="0" width="40" height="40" rx="5" fill="#10B981" fill-opacity="0.16" stroke="#10B981" stroke-width="1.6"/>
    <line x1="0" y1="13.3" x2="40" y2="13.3" stroke="#10B981" stroke-width="1"/>
    <line x1="0" y1="26.6" x2="40" y2="26.6" stroke="#10B981" stroke-width="1"/>
    <line x1="13.3" y1="0" x2="13.3" y2="40" stroke="#10B981" stroke-width="1"/>
    <line x1="26.6" y1="0" x2="26.6" y2="40" stroke="#10B981" stroke-width="1"/>
  </g>
  <!-- mbarrier -> compute warps (consumer); label sits to the RIGHT of the curve in open space -->
  <path d="M 848,348 C 848,368 800,382 742,398" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#tma-arr-emerald)"/>
  <text x="866" y="382" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10.5" fill="#047857">tile ready</text>
</svg>
