<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="450" viewBox="0 0 1100 450" font-family="Montserrat, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- Light spectrogram intensity ramp: pale -> indigo -> violet -> amber -->
    <linearGradient id="specRamp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EEF2F7"/>
      <stop offset="38%" stop-color="#C7D2FE"/>
      <stop offset="70%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <!-- Arrowheads -->
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F43F5E"/>
    </marker>
    <marker id="dimTick" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748B"/>
    </marker>
    <!-- Faint dot texture for panels -->
    <pattern id="dotGrid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#EEF2F7"/>
    </pattern>
    <clipPath id="specClip"><rect x="44" y="96" width="364" height="248" rx="6"/></clipPath>
  </defs>

  <!-- Canvas -->
  <rect width="1100" height="450" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="42" font-size="27" font-weight="700" fill="#0F172A">Constellation Map &amp; Combinatorial Hashing</text>
  <text x="40" y="66" font-size="16" fill="#64748B">Keep only spectral peaks, then pair each anchor with its forward target zone &#8594; one hash per pair</text>

  <!-- ============================================================= -->
  <!-- LEFT PANEL: Spectrogram -> peak constellation                  -->
  <!-- ============================================================= -->
  <rect x="20" y="84" width="560" height="346" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="20" y="84" width="560" height="346" rx="16" fill="url(#dotGrid)"/>

  <!-- Stage label -->
  <text x="44" y="112" font-size="15" font-weight="700" fill="#4F46E5">1 &#183; Peak extraction</text>

  <!-- Dense spectrogram sub-frame -->
  <rect x="44" y="124" width="200" height="220" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="144" y="362" text-anchor="middle" font-size="12.5" fill="#64748B">Dense spectrogram</text>

  <!-- spectrogram cells: bright tint grid, a few hot (amber) cells = local maxima -->
  <g clip-path="url(#specClip)" font-family="JetBrains Mono, ui-monospace, monospace">
    <!-- base ramp wash -->
    <rect x="44" y="124" width="200" height="220" fill="url(#specRamp)" opacity="0.5"/>
    <!-- column striping to read as STFT frames -->
    <g fill="#FFFFFF" opacity="0.30">
      <rect x="64" y="124" width="2" height="220"/>
      <rect x="84" y="124" width="2" height="220"/>
      <rect x="104" y="124" width="2" height="220"/>
      <rect x="124" y="124" width="2" height="220"/>
      <rect x="144" y="124" width="2" height="220"/>
      <rect x="164" y="124" width="2" height="220"/>
      <rect x="184" y="124" width="2" height="220"/>
      <rect x="204" y="124" width="2" height="220"/>
      <rect x="224" y="124" width="2" height="220"/>
    </g>
    <!-- soft horizontal energy bands -->
    <g fill="#6366F1">
      <rect x="44" y="150" width="200" height="9" opacity="0.16"/>
      <rect x="44" y="196" width="200" height="11" opacity="0.20"/>
      <rect x="44" y="252" width="200" height="8" opacity="0.14"/>
      <rect x="44" y="300" width="200" height="10" opacity="0.18"/>
    </g>
    <!-- hot peak cells (local maxima) -->
    <g>
      <rect x="74"  y="146" width="13" height="13" rx="2" fill="#F59E0B"/>
      <rect x="118" y="190" width="13" height="13" rx="2" fill="#F59E0B"/>
      <rect x="98"  y="296" width="13" height="13" rx="2" fill="#F59E0B"/>
      <rect x="156" y="252" width="13" height="13" rx="2" fill="#F59E0B"/>
      <rect x="186" y="160" width="13" height="13" rx="2" fill="#F59E0B"/>
      <rect x="206" y="300" width="13" height="13" rx="2" fill="#F59E0B"/>
      <rect x="138" y="320" width="13" height="13" rx="2" fill="#F59E0B"/>
    </g>
  </g>

  <!-- axes for spectrogram -->
  <text x="40" y="234" text-anchor="middle" font-size="11" fill="#94A3B8" transform="rotate(-90 40 234)">freq</text>

  <!-- transform arrow -->
  <line x1="252" y1="234" x2="290" y2="234" stroke="#475569" stroke-width="2" marker-end="url(#arrowSlate)"/>
  <text x="271" y="222" text-anchor="middle" font-size="11" fill="#475569">keep</text>
  <text x="271" y="252" text-anchor="middle" font-size="11" fill="#475569">maxima</text>

  <!-- Constellation sub-frame -->
  <rect x="298" y="124" width="260" height="220" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="428" y="362" text-anchor="middle" font-size="12.5" fill="#64748B">Constellation of peaks (time, freq)</text>

  <!-- subtle reference grid -->
  <g stroke="#EEF2F7" stroke-width="1">
    <line x1="330" y1="140" x2="330" y2="328"/>
    <line x1="368" y1="140" x2="368" y2="328"/>
    <line x1="406" y1="140" x2="406" y2="328"/>
    <line x1="444" y1="140" x2="444" y2="328"/>
    <line x1="482" y1="140" x2="482" y2="328"/>
    <line x1="520" y1="140" x2="520" y2="328"/>
    <line x1="314" y1="172" x2="542" y2="172"/>
    <line x1="314" y1="210" x2="542" y2="210"/>
    <line x1="314" y1="248" x2="542" y2="248"/>
    <line x1="314" y1="286" x2="542" y2="286"/>
  </g>

  <!-- constellation points: sparse indigo stars -->
  <g fill="#4F46E5">
    <circle cx="322" cy="200" r="3.6"/>
    <circle cx="338" cy="280" r="3.6"/>
    <circle cx="352" cy="158" r="3.6"/>
    <circle cx="366" cy="236" r="3.6"/>
    <circle cx="384" cy="190" r="3.6"/>
    <circle cx="398" cy="300" r="3.6"/>
    <circle cx="414" cy="150" r="3.6"/>
    <circle cx="428" cy="252" r="3.6"/>
    <circle cx="444" cy="206" r="3.6"/>
    <circle cx="458" cy="174" r="3.6"/>
    <circle cx="472" cy="296" r="3.6"/>
    <circle cx="486" cy="222" r="3.6"/>
    <circle cx="500" cy="160" r="3.6"/>
    <circle cx="512" cy="268" r="3.6"/>
    <circle cx="528" cy="196" r="3.6"/>
    <circle cx="406" cy="320" r="3.6"/>
    <circle cx="356" cy="312" r="3.6"/>
    <circle cx="476" cy="146" r="3.6"/>
    <circle cx="538" cy="244" r="3.6"/>
    <circle cx="330" cy="232" r="3.6"/>
  </g>

  <!-- axes for constellation -->
  <text x="294" y="234" text-anchor="middle" font-size="11" fill="#94A3B8" transform="rotate(-90 294 234)">freq</text>
  <line x1="314" y1="334" x2="360" y2="334" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#dimTick)"/>
  <text x="368" y="338" font-size="11" fill="#94A3B8">time</text>

  <!-- ============================================================= -->
  <!-- RIGHT PANEL: anchor + target-zone fan-out + hash               -->
  <!-- ============================================================= -->
  <rect x="600" y="84" width="480" height="346" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="600" y="84" width="480" height="346" rx="16" fill="url(#dotGrid)"/>

  <text x="624" y="112" font-size="15" font-weight="700" fill="#8B5CF6">2 &#183; Pair anchor &#8594; target zone</text>

  <!-- plot frame -->
  <rect x="624" y="124" width="432" height="196" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="630" y="146" font-size="11" fill="#94A3B8" transform="rotate(-90 630 146)" text-anchor="end">freq</text>
  <line x1="640" y1="310" x2="688" y2="310" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#dimTick)"/>
  <text x="696" y="314" font-size="11" fill="#94A3B8">time</text>

  <!-- Target zone: forward-in-time, frequency-bounded window -->
  <rect x="772" y="150" width="208" height="120" rx="8" fill="#10B981" fill-opacity="0.10" stroke="#10B981" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="876" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">target zone</text>
  <text x="876" y="262" text-anchor="middle" font-size="10.5" fill="#10B981" font-family="JetBrains Mono, ui-monospace, monospace">forward in time &#183; freq-bounded</text>

  <!-- Background (unpaired) peaks, faint -->
  <g fill="#CBD5E1">
    <circle cx="690" cy="178" r="3.4"/>
    <circle cx="704" cy="288" r="3.4"/>
    <circle cx="668" cy="244" r="3.4"/>
    <circle cx="730" cy="300" r="3.4"/>
    <circle cx="1014" cy="200" r="3.4"/>
    <circle cx="1020" cy="296" r="3.4"/>
    <circle cx="998" cy="138" r="3.4"/>
  </g>

  <!-- Target points inside the zone (fan-out F = 4) -->
  <g fill="#10B981">
    <circle cx="838" cy="178" r="4.2"/>
    <circle cx="902" cy="228" r="4.2"/>
    <circle cx="946" cy="190" r="4.2"/>
    <circle cx="884" cy="252" r="4.2"/>
  </g>

  <!-- Fan-out pair links from anchor (rose) -->
  <g stroke="#F43F5E" stroke-width="1.6" fill="none">
    <line x1="744" y1="214" x2="838" y2="178"/>
    <line x1="744" y1="214" x2="884" y2="252"/>
    <line x1="744" y1="214" x2="902" y2="228"/>
    <line x1="744" y1="214" x2="946" y2="190" marker-end="url(#arrowRose)"/>
  </g>

  <!-- Anchor point (emphasised) -->
  <circle cx="744" cy="214" r="8.5" fill="#F43F5E" fill-opacity="0.16"/>
  <circle cx="744" cy="214" r="5" fill="#F43F5E"/>
  <text x="744" y="200" text-anchor="middle" font-size="11.5" font-weight="700" fill="#E11D48">anchor</text>

  <!-- labelled target highlighted for the example hash -->
  <circle cx="946" cy="190" r="8.5" fill="#10B981" fill-opacity="0.16"/>
  <text x="946" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">target</text>

  <!-- f1 / f2 guide lines + delta-t bracket for the example pair -->
  <line x1="744" y1="214" x2="722" y2="214" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="718" y="217" text-anchor="end" font-size="10.5" fill="#6366F1" font-family="JetBrains Mono, ui-monospace, monospace">f1</text>
  <line x1="946" y1="190" x2="968" y2="190" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="972" y="193" font-size="10.5" fill="#6366F1" font-family="JetBrains Mono, ui-monospace, monospace">f2</text>
  <!-- delta t bracket along time axis -->
  <line x1="744" y1="296" x2="946" y2="296" stroke="#475569" stroke-width="1" marker-start="url(#dimTick)" marker-end="url(#dimTick)"/>
  <line x1="744" y1="290" x2="744" y2="296" stroke="#475569" stroke-width="1"/>
  <line x1="946" y1="290" x2="946" y2="296" stroke="#475569" stroke-width="1"/>
  <text x="845" y="291" text-anchor="middle" font-size="10.5" fill="#475569" font-family="JetBrains Mono, ui-monospace, monospace">&#916;t</text>

  <!-- Hash readout card -->
  <rect x="624" y="338" width="432" height="74" rx="12" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="640" y="362" font-size="13" font-weight="700" fill="#334155">each pair &#8594; one hash</text>

  <!-- hash tuple chips -->
  <g font-family="JetBrains Mono, ui-monospace, monospace">
    <rect x="640" y="372" width="74" height="28" rx="7" fill="#6366F1" fill-opacity="0.12" stroke="#6366F1" stroke-width="1.2"/>
    <text x="677" y="391" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5">f1</text>

    <rect x="724" y="372" width="74" height="28" rx="7" fill="#6366F1" fill-opacity="0.12" stroke="#6366F1" stroke-width="1.2"/>
    <text x="761" y="391" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5">f2</text>

    <rect x="808" y="372" width="74" height="28" rx="7" fill="#475569" fill-opacity="0.10" stroke="#475569" stroke-width="1.2"/>
    <text x="845" y="391" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">&#916;t</text>

    <text x="895" y="391" font-size="15" font-weight="700" fill="#94A3B8">&#8594;</text>

    <rect x="916" y="372" width="124" height="28" rx="7" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="978" y="391" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B45309">32-bit key</text>
  </g>

  <!-- offset note -->
  <text x="624" y="426" font-size="11.5" fill="#64748B">Hash also stores t1 (anchor&#8217;s absolute time) &#183; ~10,000 hashes / 3-min track &#183; O(1) lookup</text>
</svg>
