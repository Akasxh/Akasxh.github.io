<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 300" width="750" height="300">
  <defs>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="750" height="300" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="375" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f172a">The Kardashev Scale</text>

  <!-- Main scale bar -->
  <rect x="80" y="110" width="590" height="18" rx="9" fill="url(#scaleGrad)" opacity="0.9"/>

  <!-- Tick marks and labels for Type I -->
  <line x1="160" y1="100" x2="160" y2="138" stroke="#0f172a" stroke-width="2"/>
  <!-- Earth icon -->
  <circle cx="160" cy="72" r="14" fill="#4f46e5" opacity="0.8"/>
  <ellipse cx="160" cy="72" rx="14" ry="6" fill="none" stroke="#f8f9fa" stroke-width="1" opacity="0.6"/>
  <line x1="160" y1="58" x2="160" y2="86" stroke="#f8f9fa" stroke-width="0.8" opacity="0.5"/>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#4f46e5">Type I</text>
  <text x="160" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">~10<tspan baseline-shift="super" font-size="8">16</tspan> W</text>
  <text x="160" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Planet</text>

  <!-- Tick marks and labels for Type II -->
  <line x1="375" y1="100" x2="375" y2="138" stroke="#0f172a" stroke-width="2"/>
  <!-- Sun icon -->
  <circle cx="375" cy="72" r="14" fill="#f59e0b" filter="url(#glow)"/>
  <line x1="375" y1="52" x2="375" y2="56" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="375" y1="88" x2="375" y2="92" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="355" y1="72" x2="359" y2="72" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="391" y1="72" x2="395" y2="72" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="361" y1="58" x2="364" y2="61" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="386" y1="83" x2="389" y2="86" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="361" y1="86" x2="364" y2="83" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="386" y1="61" x2="389" y2="58" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="375" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#7c3aed">Type II</text>
  <text x="375" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">~10<tspan baseline-shift="super" font-size="8">26</tspan> W</text>
  <text x="375" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Star</text>

  <!-- Tick marks and labels for Type III -->
  <line x1="590" y1="100" x2="590" y2="138" stroke="#0f172a" stroke-width="2"/>
  <!-- Galaxy spiral icon -->
  <g transform="translate(590,72)">
    <ellipse cx="0" cy="0" rx="16" ry="7" fill="none" stroke="#f59e0b" stroke-width="1.5" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="none" stroke="#f59e0b" stroke-width="1.2" transform="rotate(20)"/>
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="none" stroke="#f59e0b" stroke-width="1" transform="rotate(-10)"/>
    <circle cx="0" cy="0" r="3" fill="#f59e0b" opacity="0.9"/>
  </g>
  <text x="590" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#f59e0b">Type III</text>
  <text x="590" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">~10<tspan baseline-shift="super" font-size="8">37</tspan> W</text>
  <text x="590" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Galaxy</text>

  <!-- Jump annotations -->
  <text x="267" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">x 10,000,000,000</text>
  <path d="M190,205 Q267,195 345,205" fill="none" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="482" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">x 10,000,000,000</text>
  <path d="M405,205 Q482,195 560,205" fill="none" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Humanity marker at 0.73 -->
  <g transform="translate(237,119)">
    <!-- Arrow pointing up to scale -->
    <polygon points="0,-12 -5,0 5,0" fill="#ef4444"/>
    <line x1="0" y1="0" x2="0" y2="30" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="187" y="245" width="100" height="28" rx="6" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="237" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444">Humanity (0.73)</text>
  <line x1="237" y1="245" x2="237" y2="149" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
</svg>