<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="scaleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="30%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="80%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="earthGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="galaxyGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="500" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="150" cy="80" r="1" fill="white" opacity="0.15"/>
  <circle cx="280" cy="20" r="1.2" fill="white" opacity="0.25"/>
  <circle cx="400" cy="60" r="0.8" fill="white" opacity="0.1"/>
  <circle cx="520" cy="35" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="650" cy="15" r="1" fill="white" opacity="0.3"/>
  <circle cx="780" cy="50" r="1.3" fill="white" opacity="0.15"/>
  <circle cx="900" cy="25" r="0.9" fill="white" opacity="0.2"/>
  <circle cx="1020" cy="70" r="1.1" fill="white" opacity="0.25"/>
  <circle cx="100" cy="450" r="1" fill="white" opacity="0.15"/>
  <circle cx="300" cy="470" r="1.4" fill="white" opacity="0.2"/>
  <circle cx="500" cy="440" r="0.8" fill="white" opacity="0.1"/>
  <circle cx="700" cy="460" r="1.2" fill="white" opacity="0.25"/>
  <circle cx="850" cy="480" r="1" fill="white" opacity="0.15"/>
  <circle cx="1050" cy="450" r="1.3" fill="white" opacity="0.2"/>
  <circle cx="70" cy="250" r="0.7" fill="white" opacity="0.1"/>
  <circle cx="1060" cy="200" r="1" fill="white" opacity="0.15"/>
  <circle cx="200" cy="150" r="0.9" fill="white" opacity="0.2"/>
  <circle cx="950" cy="130" r="1.1" fill="white" opacity="0.15"/>
  <circle cx="440" cy="130" r="1" fill="white" opacity="0.1"/>
  <circle cx="750" cy="100" r="0.6" fill="white" opacity="0.25"/>

  <!-- Title -->
  <text x="550" y="55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="bold" fill="#e2e8f0">The Kardashev Scale</text>
  <text x="550" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8">Classifying civilizations by energy consumption</text>

  <!-- Scale bar -->
  <rect x="100" y="250" width="900" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="100" y="250" width="900" height="28" rx="14" fill="url(#scaleBar)" opacity="0.8"/>

  <!-- Scale tick marks -->
  <line x1="100" y1="246" x2="100" y2="283" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="243" x2="400" y2="286" stroke="#e2e8f0" stroke-width="2" opacity="0.5"/>
  <line x1="650" y1="243" x2="650" y2="286" stroke="#e2e8f0" stroke-width="2" opacity="0.5"/>
  <line x1="900" y1="243" x2="900" y2="286" stroke="#e2e8f0" stroke-width="2" opacity="0.5"/>
  <text x="100" y="305" text-anchor="middle" font-family="monospace" font-size="15" fill="#94a3b8">0</text>
  <text x="400" y="305" text-anchor="middle" font-family="monospace" font-size="15" fill="#94a3b8">I</text>
  <text x="650" y="305" text-anchor="middle" font-family="monospace" font-size="15" fill="#94a3b8">II</text>
  <text x="900" y="305" text-anchor="middle" font-family="monospace" font-size="15" fill="#94a3b8">III</text>

  <!-- Humanity marker at 0.73 (0.73/3 * 900 + 100 = 319) -->
  <line x1="319" y1="218" x2="319" y2="250" stroke="#ef4444" stroke-width="2.5"/>
  <polygon points="319,248 314,238 324,238" fill="#ef4444"/>
  <circle cx="319" cy="210" r="5" fill="#ef4444" filter="url(#glow)">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <rect x="222" y="185" width="194" height="26" rx="8" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="319" y="203" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="bold" fill="#fca5a5">Humanity Today (0.73)</text>

  <!-- Type I: Earth -->
  <g transform="translate(400, 140)">
    <circle cx="0" cy="0" r="38" fill="url(#earthGlow)" filter="url(#glow)"/>
    <ellipse cx="-10" cy="-6" rx="14" ry="20" fill="#22c55e" opacity="0.5"/>
    <ellipse cx="12" cy="10" rx="10" ry="12" fill="#22c55e" opacity="0.4"/>
    <ellipse cx="-6" cy="18" rx="7" ry="6" fill="#22c55e" opacity="0.3"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="bold" fill="#60a5fa">Type I</text>
    <text x="0" y="82" text-anchor="middle" font-family="monospace" font-size="15" fill="#cbd5e1">~10&#xb9;&#x2076; W</text>
  </g>
  <text x="400" y="340" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#60a5fa">Planetary Energy</text>

  <!-- Type II: Sun -->
  <g transform="translate(650, 140)">
    <circle cx="0" cy="0" r="30" fill="#fbbf24" opacity="0.15" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="38" fill="url(#sunGlow)" filter="url(#glow)"/>
    <line x1="0" y1="-45" x2="0" y2="-54" stroke="#fbbf24" stroke-width="2.5" opacity="0.6"/>
    <line x1="32" y1="-32" x2="38" y2="-38" stroke="#fbbf24" stroke-width="2.5" opacity="0.6"/>
    <line x1="45" y1="0" x2="54" y2="0" stroke="#fbbf24" stroke-width="2.5" opacity="0.6"/>
    <line x1="32" y1="32" x2="38" y2="38" stroke="#fbbf24" stroke-width="2.5" opacity="0.5"/>
    <line x1="0" y1="45" x2="0" y2="54" stroke="#fbbf24" stroke-width="2.5" opacity="0.4"/>
    <line x1="-32" y1="32" x2="-38" y2="38" stroke="#fbbf24" stroke-width="2.5" opacity="0.5"/>
    <line x1="-45" y1="0" x2="-54" y2="0" stroke="#fbbf24" stroke-width="2.5" opacity="0.6"/>
    <line x1="-32" y1="-32" x2="-38" y2="-38" stroke="#fbbf24" stroke-width="2.5" opacity="0.6"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="bold" fill="#fbbf24">Type II</text>
    <text x="0" y="82" text-anchor="middle" font-family="monospace" font-size="15" fill="#cbd5e1">~10&#xb2;&#x2076; W</text>
  </g>
  <text x="650" y="340" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#fbbf24">Stellar Energy</text>

  <!-- Type III: Galaxy -->
  <g transform="translate(900, 140)">
    <circle cx="0" cy="0" r="42" fill="url(#galaxyGlow)" opacity="0.25"/>
    <circle cx="0" cy="0" r="10" fill="#c084fc" filter="url(#glow)"/>
    <ellipse cx="0" cy="0" rx="38" ry="13" fill="none" stroke="#c084fc" stroke-width="2.5" opacity="0.6" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="30" ry="11" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.4" transform="rotate(25)"/>
    <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5" transform="rotate(-50)"/>
    <circle cx="18" cy="-9" r="1.5" fill="white" opacity="0.4"/>
    <circle cx="-22" cy="6" r="1" fill="white" opacity="0.3"/>
    <circle cx="10" cy="14" r="1.2" fill="white" opacity="0.35"/>
    <circle cx="-14" cy="-12" r="0.8" fill="white" opacity="0.3"/>
    <circle cx="28" cy="3" r="0.9" fill="white" opacity="0.25"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="bold" fill="#c084fc">Type III</text>
    <text x="0" y="82" text-anchor="middle" font-family="monospace" font-size="15" fill="#cbd5e1">~10&#xb3;&#x2077; W</text>
  </g>
  <text x="900" y="340" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#c084fc">Galactic Energy</text>

  <!-- Bottom annotation -->
  <rect x="300" y="440" width="500" height="38" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="550" y="465" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8">Energy scale increases by a factor of ~10 billion between each type</text>
</svg>