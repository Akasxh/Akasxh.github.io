<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" font-family="Montserrat, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <marker id="ar-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="ar-indigo" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="ar-violet" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7C3AED"/>
    </marker>
    <pattern id="dotgrid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#EEF2F7"/>
    </pattern>
  </defs>

  <!-- ===== Canvas ===== -->
  <rect width="1000" height="500" fill="#FFFFFF"/>
  <rect x="14" y="14" width="972" height="472" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="15" y="15" width="970" height="470" rx="15" fill="url(#dotgrid)"/>

  <!-- ===== Title ===== -->
  <text x="42" y="57" font-size="29" font-weight="700" fill="#0F172A" letter-spacing="-0.3">Multi-Head Attention</text>
  <text x="42" y="82" font-size="16" font-weight="500" fill="#64748B">One input, projected into <tspan font-family="JetBrains Mono, ui-monospace, monospace" fill="#334155">h</tspan> independent heads, then recombined</text>

  <!-- spec chips, top-right -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">
    <rect x="700" y="38" width="128" height="26" rx="9" fill="#EEF0FF" stroke="#C7D2FE" stroke-width="1"/>
    <text x="764" y="55.5" text-anchor="middle" fill="#4338CA">d_model = 512</text>
    <rect x="836" y="38" width="62" height="26" rx="9" fill="#EEF0FF" stroke="#C7D2FE" stroke-width="1"/>
    <text x="867" y="55.5" text-anchor="middle" fill="#4338CA">h = 8</text>
    <rect x="700" y="70" width="198" height="22" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
    <text x="799" y="85.5" text-anchor="middle" fill="#64748B">d_k = d_v = 512 / 8 = 64</text>
  </g>

  <!-- flow direction note -->
  <text x="42" y="470" font-size="12.5" font-style="italic" fill="#94A3B8">flow: bottom &#8594; top</text>

  <!-- ================= BOTTOM: shared input ================= -->
  <g filter="url(#cardShadow)">
    <rect x="192" y="430" width="280" height="40" rx="11" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  </g>
  <text x="332" y="448" text-anchor="middle" font-size="15.5" font-weight="700" fill="#3730A3">Input  X</text>
  <text x="332" y="463" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" fill="#6366F1">shape [ n &#215; 512 ]</text>

  <!-- X feeds straight up into the head stack -->
  <path d="M332 430 L332 392" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#ar-slate)"/>
  <text x="345" y="418" font-size="12" font-weight="600" fill="#64748B" font-style="italic">same X &#8594; all 8 heads</text>

  <!-- ================= STACK of parallel heads (signature) ================= -->
  <!-- offset ghost cards behind the detailed head convey "x8 in parallel" -->
  <g>
    <rect x="206" y="148" width="300" height="232" rx="14" fill="#F4F2FF" stroke="#C4B5FD" stroke-width="1.5"/>
    <rect x="198" y="140" width="300" height="232" rx="14" fill="#F1EEFF" stroke="#B7A7F7" stroke-width="1.5"/>
    <rect x="190" y="132" width="300" height="232" rx="14" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  </g>
  <!-- foreground, fully-detailed head -->
  <g filter="url(#cardShadow)">
    <rect x="182" y="124" width="300" height="232" rx="14" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  </g>
  <text x="198" y="115" font-size="14.5" font-weight="700" fill="#6D28D9">Scaled Dot-Product Attention, per head</text>
  <text x="466" y="148" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" fill="#7C3AED" opacity="0">i</text>

  <!-- three per-head projections W_i^Q / W_i^K / W_i^V : 512 -> 64 -->
  <g font-weight="700">
    <rect x="198" y="302" width="84" height="42" rx="10" fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.8"/>
    <text x="240" y="321" text-anchor="middle" font-size="14">W&#7522;<tspan font-size="10" dy="-5">Q</tspan></text>
    <text x="240" y="336" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5" font-weight="500" fill="#4F46E5">&#8594; Q&#7522; 64</text>

    <rect x="290" y="302" width="84" height="42" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.8"/>
    <text x="332" y="321" text-anchor="middle" font-size="14" fill="#92400E">W&#7522;<tspan font-size="10" dy="-5">K</tspan></text>
    <text x="332" y="336" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5" font-weight="500" fill="#B45309">&#8594; K&#7522; 64</text>

    <rect x="382" y="302" width="84" height="42" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="1.8"/>
    <text x="424" y="321" text-anchor="middle" font-size="14" fill="#065F46">W&#7522;<tspan font-size="10" dy="-5">V</tspan></text>
    <text x="424" y="336" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5" font-weight="500" fill="#047857">&#8594; V&#7522; 64</text>
  </g>

  <!-- scaled dot-product attention internals -->
  <!-- step 1: MatMul Q K^T -->
  <rect x="222" y="246" width="220" height="30" rx="9" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.4"/>
  <text x="332" y="265.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">MatMul&#160;&#160;<tspan font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" fill="#475569">Q&#7522; K&#7522;&#7488;</tspan></text>
  <!-- Q and K up into matmul; V routed up the right edge -->
  <path d="M240 302 L240 288 L300 288 L300 276" fill="none" stroke="#4F46E5" stroke-width="1.6" marker-end="url(#ar-indigo)"/>
  <path d="M332 302 L332 276" fill="none" stroke="#D97706" stroke-width="1.6" marker-end="url(#ar-slate)"/>
  <path d="M424 302 L424 147 L444 147" fill="none" stroke="#059669" stroke-width="1.6" marker-end="url(#ar-slate)"/>

  <!-- step 2: scale -->
  <rect x="222" y="208" width="220" height="30" rx="9" fill="#EEF0FF" stroke="#6366F1" stroke-width="1.4"/>
  <text x="332" y="227.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3730A3">Scale&#160;&#160;<tspan font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" fill="#4F46E5">&#247; &#8730;d_k = &#247;8</tspan></text>
  <path d="M332 246 L332 238" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#ar-slate)"/>

  <!-- step 3: softmax -->
  <rect x="222" y="170" width="220" height="30" rx="9" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.4"/>
  <text x="332" y="189.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#BE123C">Softmax  (row-wise)</text>
  <path d="M332 208 L332 200" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#ar-slate)"/>

  <!-- step 4: weighted sum with V -->
  <rect x="222" y="132" width="220" height="30" rx="9" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.4"/>
  <text x="332" y="151.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">MatMul&#160;&#160;<tspan font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" fill="#475569">&#8226; V&#7522;</tspan></text>
  <path d="M332 170 L332 162" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#ar-slate)"/>

  <!-- ================= grouping bracket + parallel multiplier ================= -->
  <path d="M512 134 q-10 0 -10 12 v88 q0 12 -10 12 q10 0 10 12 v88 q0 12 10 12"
        fill="none" stroke="#A78BFA" stroke-width="2"/>
  <text x="528" y="238" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="700" fill="#7C3AED">&#215; 8</text>
  <text x="528" y="258" font-size="12" font-weight="600" fill="#8B5CF6">heads,</text>
  <text x="528" y="273" font-size="12" font-weight="600" fill="#8B5CF6">in parallel</text>

  <!-- per-head output arrow into Concat -->
  <path d="M555 200 L620 200" fill="none" stroke="#7C3AED" stroke-width="2" marker-end="url(#ar-violet)"/>
  <text x="588" y="192" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" fill="#7C3AED">head&#7522;</text>
  <text x="588" y="216" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#94A3B8">[n&#215;64]</text>

  <!-- ================= Concat block ================= -->
  <g filter="url(#cardShadow)">
    <rect x="624" y="150" width="150" height="200" rx="13" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  </g>
  <text x="699" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">Concat</text>
  <g>
    <rect x="640" y="166" width="118" height="16" rx="4" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1"/>
    <rect x="640" y="186" width="118" height="16" rx="4" fill="#E0E7FF" stroke="#818CF8" stroke-width="1"/>
    <rect x="640" y="206" width="118" height="16" rx="4" fill="#FEF3C7" stroke="#FBBF24" stroke-width="1"/>
    <rect x="640" y="226" width="118" height="16" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
    <rect x="640" y="246" width="118" height="16" rx="4" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1"/>
    <rect x="640" y="266" width="118" height="16" rx="4" fill="#E0E7FF" stroke="#818CF8" stroke-width="1"/>
    <rect x="640" y="286" width="118" height="16" rx="4" fill="#FEF3C7" stroke="#FBBF24" stroke-width="1"/>
    <rect x="640" y="306" width="118" height="16" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  </g>
  <text x="699" y="338" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" fill="#7C3AED">8 &#215; 64 = 512</text>

  <!-- Concat -> output linear -->
  <path d="M774 250 L820 250" fill="none" stroke="#7C3AED" stroke-width="2.2" marker-end="url(#ar-violet)"/>
  <text x="797" y="242" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#94A3B8">[n&#215;512]</text>

  <!-- ================= Output projection W^O ================= -->
  <g filter="url(#cardShadow)">
    <rect x="822" y="214" width="128" height="72" rx="12" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2"/>
  </g>
  <text x="886" y="243" text-anchor="middle" font-size="16" font-weight="700" fill="#3730A3">Linear  W<tspan font-size="11" dy="-6">O</tspan></text>
  <text x="886" y="262" text-anchor="middle" font-size="11" font-weight="500" fill="#4F46E5">output projection</text>
  <text x="886" y="276" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#6366F1">512 &#8594; 512</text>

  <!-- W^O -> final output -->
  <path d="M886 214 L886 178" fill="none" stroke="#4F46E5" stroke-width="2.2" marker-end="url(#ar-indigo)"/>
  <g filter="url(#cardShadow)">
    <rect x="812" y="140" width="148" height="38" rx="11" fill="#4F46E5"/>
  </g>
  <text x="886" y="158" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">MultiHead(X)</text>
  <text x="886" y="172" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" fill="#C7D2FE">[ n &#215; 512 ]</text>

  <!-- ================= Equation strip (bottom-right, clear of input) ================= -->
  <rect x="510" y="398" width="450" height="66" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="528" y="419" font-size="12" font-weight="700" fill="#334155" letter-spacing="0.4">THE COMPUTATION</text>
  <text x="528" y="440" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12.5" fill="#0F172A">head&#7522; = softmax( Q&#7522;K&#7522;&#7488; / &#8730;d_k ) V&#7522;</text>
  <text x="528" y="457" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12.5" fill="#0F172A">MultiHead = Concat(head&#8321;..head&#8328;) W&#7484;</text>
</svg>
