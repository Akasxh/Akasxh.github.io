<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="greenG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#818cf8"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#334155" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bg)"/>
  <rect width="1000" height="500" fill="url(#dots)"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0">Multi-Head Attention Architecture</text>

  <!-- Output box -->
  <rect x="410" y="44" width="180" height="40" rx="8" fill="url(#greenG)" filter="url(#shadow)"/>
  <text x="500" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fff">Output</text>

  <!-- Arrow from Linear to Output -->
  <line x1="500" y1="100" x2="500" y2="84" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Linear W_O box -->
  <rect x="380" y="100" width="240" height="44" rx="8" fill="url(#indigo)" filter="url(#shadow)"/>
  <text x="500" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fff">Linear (W_O)</text>

  <!-- Arrow from Concat to Linear -->
  <line x1="500" y1="160" x2="500" y2="144" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Concat bar -->
  <rect x="60" y="160" width="880" height="36" rx="8" fill="#334155" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#c084fc">Concatenate</text>

  <!-- 8 Head boxes with arrows up to concat -->
  <!-- Head 1 -->
  <rect x="68" y="215" width="98" height="75" rx="8" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>
  <text x="117" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff">Head 1</text>
  <text x="117" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c7d2fe">Scaled Dot-Product</text>
  <text x="117" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c7d2fe">Attention</text>
  <line x1="117" y1="215" x2="117" y2="196" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Head 2 -->
  <rect x="176" y="215" width="98" height="75" rx="8" fill="#5b21b6" opacity="0.92" filter="url(#shadow)"/>
  <text x="225" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff">Head 2</text>
  <text x="225" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ddd6fe">Scaled Dot-Product</text>
  <text x="225" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ddd6fe">Attention</text>
  <line x1="225" y1="215" x2="225" y2="196" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Head 3 -->
  <rect x="284" y="215" width="98" height="75" rx="8" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>
  <text x="333" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff">Head 3</text>
  <text x="333" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c7d2fe">Scaled Dot-Product</text>
  <text x="333" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c7d2fe">Attention</text>
  <line x1="333" y1="215" x2="333" y2="196" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Head 4 -->
  <rect x="392" y="215" width="98" height="75" rx="8" fill="#5b21b6" opacity="0.92" filter="url(#shadow)"/>
  <text x="441" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff">Head 4</text>
  <text x="441" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ddd6fe">Scaled Dot-Product</text>
  <text x="441" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ddd6fe">Attention</text>
  <line x1="441" y1="215" x2="441" y2="196" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Head 5 -->
  <rect x="500" y="215" width="98" height="75" rx="8" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>
  <text x="549" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff">Head 5</text>
  <text x="549" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c7d2fe">Scaled Dot-Product</text>
  <text x="549" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c7d2fe">Attention</text>
  <line x1="549" y1="215" x2="549" y2="196" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Head 6 -->
  <rect x="608" y="215" width="98" height="75" rx="8" fill="#5b21b6" opacity="0.92" filter="url(#shadow)"/>
  <text x="657" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff">Head 6</text>
  <text x="657" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ddd6fe">Scaled Dot-Product</text>
  <text x="657" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ddd6fe">Attention</text>
  <line x1="657" y1="215" x2="657" y2="196" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Head 7 -->
  <rect x="716" y="215" width="98" height="75" rx="8" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>
  <text x="765" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff">Head 7</text>
  <text x="765" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c7d2fe">Scaled Dot-Product</text>
  <text x="765" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c7d2fe">Attention</text>
  <line x1="765" y1="215" x2="765" y2="196" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Head 8 -->
  <rect x="824" y="215" width="98" height="75" rx="8" fill="#5b21b6" opacity="0.92" filter="url(#shadow)"/>
  <text x="873" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff">Head 8</text>
  <text x="873" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ddd6fe">Scaled Dot-Product</text>
  <text x="873" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ddd6fe">Attention</text>
  <line x1="873" y1="215" x2="873" y2="196" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Fan-out lines from Q to all heads -->
  <g stroke="#818cf8" stroke-width="1.5" opacity="0.4">
    <line x1="260" y1="370" x2="117" y2="290"/><line x1="260" y1="370" x2="225" y2="290"/>
    <line x1="260" y1="370" x2="333" y2="290"/><line x1="260" y1="370" x2="441" y2="290"/>
    <line x1="260" y1="370" x2="549" y2="290"/><line x1="260" y1="370" x2="657" y2="290"/>
    <line x1="260" y1="370" x2="765" y2="290"/><line x1="260" y1="370" x2="873" y2="290"/>
  </g>
  <!-- Fan-out lines from K -->
  <g stroke="#f59e0b" stroke-width="1.5" opacity="0.4">
    <line x1="500" y1="370" x2="117" y2="290"/><line x1="500" y1="370" x2="225" y2="290"/>
    <line x1="500" y1="370" x2="333" y2="290"/><line x1="500" y1="370" x2="441" y2="290"/>
    <line x1="500" y1="370" x2="549" y2="290"/><line x1="500" y1="370" x2="657" y2="290"/>
    <line x1="500" y1="370" x2="765" y2="290"/><line x1="500" y1="370" x2="873" y2="290"/>
  </g>
  <!-- Fan-out lines from V -->
  <g stroke="#22c55e" stroke-width="1.5" opacity="0.4">
    <line x1="740" y1="370" x2="117" y2="290"/><line x1="740" y1="370" x2="225" y2="290"/>
    <line x1="740" y1="370" x2="333" y2="290"/><line x1="740" y1="370" x2="441" y2="290"/>
    <line x1="740" y1="370" x2="549" y2="290"/><line x1="740" y1="370" x2="657" y2="290"/>
    <line x1="740" y1="370" x2="765" y2="290"/><line x1="740" y1="370" x2="873" y2="290"/>
  </g>

  <!-- Q, K, V projection boxes -->
  <rect x="195" y="350" width="130" height="50" rx="8" fill="url(#indigo)" filter="url(#shadow)"/>
  <text x="260" y="373" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fff">W_Q</text>
  <text x="260" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#c7d2fe">Query Projection</text>

  <rect x="435" y="350" width="130" height="50" rx="8" fill="#92400e" filter="url(#shadow)"/>
  <text x="500" y="373" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fff">W_K</text>
  <text x="500" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fef3c7">Key Projection</text>

  <rect x="675" y="350" width="130" height="50" rx="8" fill="#15803d" filter="url(#shadow)"/>
  <text x="740" y="373" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fff">W_V</text>
  <text x="740" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#bbf7d0">Value Projection</text>

  <!-- Arrows from Input to Q,K,V -->
  <line x1="500" y1="445" x2="260" y2="400" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="445" x2="500" y2="400" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
  <line x1="500" y1="445" x2="740" y2="400" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Input box -->
  <rect x="340" y="445" width="320" height="44" rx="8" fill="#334155" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">Input Embeddings (X)</text>
</svg>