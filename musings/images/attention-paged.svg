  <text x="612" y="157" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(15,23,42,0.3)">used</text>

  <rect x="645" y="135" width="55" height="35" rx="4" fill="#e5e7eb" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
