  <text x="915" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff">New 1</text>
  <rect x="880" y="425" width="70" height="30" rx="6" fill="#7c3aed" opacity="0.8"/>
  <text x="915" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff">New 2</text>

  <!-- Arrows for CoW -->
  <line x1="680" y1="395" x2="748" y2="400" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowP)"/>
  <line x1="680" y1="435" x2="748" y2="430" stroke="#c084fc" stroke-width="2" marker-end="url(#arrowP)"/>
  <line x1="820" y1="400" x2="878" y2="390" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowP)"/>
  <line x1="820" y1="430" x2="878" y2="440" stroke="#c084fc" stroke-width="2" marker-end="url(#arrowP)"/>

  <text x="990" y="415" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Copy only</text>
  <text x="990" y="430" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">on diverge</text>

  <!-- Bottom callout -->
