<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-label="PagedAttention maps a sequence's logical KV-cache blocks through a per-sequence block table to non-contiguous physical blocks in GPU memory, like OS virtual-memory paging.">
  <defs>
    <style>
      .ttl   { font-family: Montserrat, "Segoe UI", system-ui, sans-serif; font-weight: 700; fill: #0F172A; }
      .lbl   { font-family: Montserrat, "Segoe UI", system-ui, sans-serif; font-weight: 600; fill: #334155; }
      .cap   { font-family: Montserrat, "Segoe UI", system-ui, sans-serif; font-weight: 500; fill: #64748B; }
      .mono  { font-family: "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace; fill: #334155; }
      .monoW { font-family: "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace; fill: #1E1B4B; }
    </style>

    <!-- arrowheads -->
    <marker id="aIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="aSky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0EA5E9"/>
    </marker>

    <!-- faint dot grid -->
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#EEF2F7"/>
    </pattern>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="1100" height="500" fill="#FFFFFF"/>
  <rect x="14" y="14" width="1072" height="472" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="14" y="14" width="1072" height="472" rx="16" fill="url(#dots)"/>

  <!-- ===== Title ===== -->
  <text x="550" y="52" text-anchor="middle" class="ttl" font-size="28">PagedAttention: Virtual Memory for the KV Cache</text>
  <text x="550" y="78" text-anchor="middle" class="cap" font-size="16">Fixed-size KV blocks need not be contiguous; a per-sequence block table maps logical &#8594; physical, like OS paging</text>

  <!-- ============================================================= -->
  <!-- LEFT : Logical KV blocks                                      -->
  <!-- ============================================================= -->
  <text x="175" y="122" text-anchor="middle" class="lbl" font-size="20" fill="#4F46E5">Logical KV blocks</text>
  <text x="175" y="144" text-anchor="middle" class="cap" font-size="13.5">one sequence &#183; block = 4 tokens</text>

  <!-- prompt chip -->
  <rect x="56" y="156" width="238" height="30" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="175" y="176" text-anchor="middle" class="mono" font-size="12.5">"Four score and seven years ago our fathers"</text>

  <!-- logical block 0 -->
  <rect x="70" y="200" width="210" height="58" rx="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <text x="86" y="224" class="lbl" font-size="15" fill="#4338CA">Block 0</text>
  <text x="86" y="246" class="mono" font-size="13">Four&#160;score&#160;and&#160;seven</text>
  <rect x="248" y="210" width="22" height="38" rx="5" fill="#C7D2FE"/>
  <text x="259" y="234" text-anchor="middle" class="monoW" font-size="12" font-weight="700">4</text>

  <!-- logical block 1 -->
  <rect x="70" y="268" width="210" height="58" rx="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <text x="86" y="292" class="lbl" font-size="15" fill="#4338CA">Block 1</text>
  <text x="86" y="314" class="mono" font-size="13">years&#160;ago&#160;our&#160;fathers</text>
  <rect x="248" y="278" width="22" height="38" rx="5" fill="#C7D2FE"/>
  <text x="259" y="302" text-anchor="middle" class="monoW" font-size="12" font-weight="700">4</text>

  <!-- logical block 2 (partial / growing) -->
  <rect x="70" y="336" width="210" height="58" rx="12" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="86" y="360" class="lbl" font-size="15" fill="#6366F1">Block 2</text>
  <rect x="158" y="348" width="80" height="16" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="198" y="360" text-anchor="middle" class="cap" font-size="10.5" fill="#6366F1">decode step</text>
  <text x="86" y="382" class="mono" font-size="13" fill="#64748B">brought&#160;&#9601;&#160;&#9601;&#160;&#9601;</text>
  <rect x="248" y="346" width="22" height="38" rx="5" fill="#E0E7FF"/>
  <text x="259" y="370" text-anchor="middle" class="monoW" font-size="12" font-weight="700" fill="#6366F1">1</text>

  <text x="175" y="414" text-anchor="middle" class="cap" font-size="12.5">last block partly filled &#183; grows on demand</text>

  <!-- ============================================================= -->
  <!-- CENTER : Block table                                          -->
  <!-- ============================================================= -->
  <text x="470" y="122" text-anchor="middle" class="lbl" font-size="20" fill="#0EA5E9">Block table</text>
  <text x="470" y="144" text-anchor="middle" class="cap" font-size="13.5">per sequence &#183; the "page table"</text>

  <!-- table frame -->
  <rect x="372" y="200" width="196" height="194" rx="12" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="2"/>

  <!-- header -->
  <rect x="372" y="200" width="196" height="34" rx="12" fill="#E0F2FE"/>
  <rect x="372" y="220" width="196" height="14" fill="#E0F2FE"/>
  <line x1="372" y1="234" x2="568" y2="234" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="404" y="222" text-anchor="middle" class="lbl" font-size="13" fill="#075985">logical</text>
  <text x="470" y="222" text-anchor="middle" class="lbl" font-size="13" fill="#075985">physical</text>
  <text x="534" y="222" text-anchor="middle" class="lbl" font-size="13" fill="#075985"># fill</text>

  <!-- column dividers -->
  <line x1="438" y1="234" x2="438" y2="394" stroke="#E0F2FE" stroke-width="1.5"/>
  <line x1="503" y1="234" x2="503" y2="394" stroke="#E0F2FE" stroke-width="1.5"/>

  <!-- row 0 : logical 0 -> physical 7, fill 4 -->
  <rect x="372" y="234" width="196" height="40" fill="#F0F9FF"/>
  <text x="404" y="259" text-anchor="middle" class="monoW" font-size="15" font-weight="700">0</text>
  <text x="470" y="259" text-anchor="middle" class="mono" font-size="15" fill="#0369A1" font-weight="700">7</text>
  <text x="534" y="259" text-anchor="middle" class="mono" font-size="14">4</text>

  <!-- row 1 : logical 1 -> physical 1, fill 4 -->
  <line x1="372" y1="274" x2="568" y2="274" stroke="#E0F2FE" stroke-width="1.5"/>
  <text x="404" y="299" text-anchor="middle" class="monoW" font-size="15" font-weight="700">1</text>
  <text x="470" y="299" text-anchor="middle" class="mono" font-size="15" fill="#0369A1" font-weight="700">1</text>
  <text x="534" y="299" text-anchor="middle" class="mono" font-size="14">4</text>

  <!-- row 2 : logical 2 -> physical 3, fill 1 -->
  <rect x="372" y="314" width="196" height="40" fill="#F0F9FF"/>
  <text x="404" y="339" text-anchor="middle" class="monoW" font-size="15" font-weight="700">2</text>
  <text x="470" y="339" text-anchor="middle" class="mono" font-size="15" fill="#0369A1" font-weight="700">3</text>
  <text x="534" y="339" text-anchor="middle" class="mono" font-size="14">1</text>

  <!-- row 3 : empty / free slot -->
  <line x1="372" y1="354" x2="568" y2="354" stroke="#E0F2FE" stroke-width="1.5"/>
  <text x="404" y="379" text-anchor="middle" class="mono" font-size="15" fill="#64748B">3</text>
  <text x="470" y="379" text-anchor="middle" class="mono" font-size="14" fill="#64748B">-</text>
  <text x="534" y="379" text-anchor="middle" class="mono" font-size="14" fill="#64748B">0</text>

  <!-- logical -> table arrows -->
  <path d="M282 229 H352" fill="none" stroke="#4F46E5" stroke-width="2.4" marker-end="url(#aIndigo)"/>
  <path d="M282 297 C322 297 332 294 352 294" fill="none" stroke="#4F46E5" stroke-width="2.4" marker-end="url(#aIndigo)"/>
  <path d="M282 365 C322 365 332 334 352 334" fill="none" stroke="#4F46E5" stroke-width="2.4" marker-end="url(#aIndigo)"/>

  <!-- ============================================================= -->
  <!-- RIGHT : Physical GPU blocks                                   -->
  <!-- ============================================================= -->
  <text x="838" y="122" text-anchor="middle" class="lbl" font-size="20" fill="#10B981">Physical KV blocks</text>
  <text x="838" y="144" text-anchor="middle" class="cap" font-size="13.5">GPU HBM pool &#183; non-contiguous</text>

  <!-- pool frame -->
  <rect x="636" y="164" width="404" height="232" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- 16 physical slots, 4x4. Index labels top-left of each cell. -->
  <!-- Row A: 0..3 -->
  <rect x="652" y="180" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="660" y="196" class="mono" font-size="11" fill="#64748B">0</text>
  <rect x="748" y="180" width="86" height="44" rx="9" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="756" y="196" class="mono" font-size="11" fill="#059669">1</text>
  <text x="791" y="208" text-anchor="middle" class="mono" font-size="12.5" font-weight="700" fill="#065F46">L1</text>
  <rect x="844" y="180" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="852" y="196" class="mono" font-size="11" fill="#64748B">2</text>
  <rect x="940" y="180" width="86" height="44" rx="9" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="948" y="196" class="mono" font-size="11" fill="#059669">3</text>
  <text x="983" y="208" text-anchor="middle" class="mono" font-size="12.5" font-weight="700" fill="#065F46">L2</text>

  <!-- Row B: 4..7 -->
  <rect x="652" y="232" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="660" y="248" class="mono" font-size="11" fill="#64748B">4</text>
  <rect x="748" y="232" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="756" y="248" class="mono" font-size="11" fill="#64748B">5</text>
  <rect x="844" y="232" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="852" y="248" class="mono" font-size="11" fill="#64748B">6</text>
  <rect x="940" y="232" width="86" height="44" rx="9" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="948" y="248" class="mono" font-size="11" fill="#059669">7</text>
  <text x="983" y="260" text-anchor="middle" class="mono" font-size="12.5" font-weight="700" fill="#065F46">L0</text>

  <!-- Row C: 8..11 -->
  <rect x="652" y="284" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="660" y="300" class="mono" font-size="11" fill="#64748B">8</text>
  <rect x="748" y="284" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="756" y="300" class="mono" font-size="11" fill="#64748B">9</text>
  <rect x="844" y="284" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="852" y="300" class="mono" font-size="11" fill="#64748B">10</text>
  <rect x="940" y="284" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="948" y="300" class="mono" font-size="11" fill="#64748B">11</text>

  <!-- Row D: 12..15 -->
  <rect x="652" y="336" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="660" y="352" class="mono" font-size="11" fill="#64748B">12</text>
  <rect x="748" y="336" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="756" y="352" class="mono" font-size="11" fill="#64748B">13</text>
  <rect x="844" y="336" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="852" y="352" class="mono" font-size="11" fill="#64748B">14</text>
  <rect x="940" y="336" width="86" height="44" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
  <text x="948" y="352" class="mono" font-size="11" fill="#64748B">15</text>

  <!-- table -> physical arrows (sky). To phys 7 (L0), phys 1 (L1), phys 3 (L2) -->
  <!-- row0 (y259) -> phys 7 center (983,254) -->
  <path d="M572 252 C620 246 700 252 936 254" fill="none" stroke="#0EA5E9" stroke-width="2.4" marker-end="url(#aSky)"/>
  <!-- row1 (y294) -> phys 1 center (791,202) -->
  <path d="M572 290 C616 286 700 220 744 206" fill="none" stroke="#0EA5E9" stroke-width="2.4" marker-end="url(#aSky)"/>
  <!-- row2 (y334) -> phys 3 center (983,202) -->
  <path d="M572 330 C690 330 760 206 936 204" fill="none" stroke="#0EA5E9" stroke-width="2.4" marker-end="url(#aSky)"/>

  <!-- ===== Legend ===== -->
  <g>
    <rect x="652" y="402" width="18" height="14" rx="3" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
    <text x="678" y="414" class="cap" font-size="13.5">mapped to this sequence (L0-L2)</text>
    <rect x="888" y="402" width="18" height="14" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
    <text x="914" y="414" class="cap" font-size="13.5">free / other seqs</text>
  </g>

  <!-- ============================================================= -->
  <!-- BOTTOM payoff strip                                           -->
  <!-- ============================================================= -->
  <rect x="56" y="436" width="988" height="40" rx="12" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.4"/>
  <circle cx="84" cy="456" r="6" fill="#4F46E5"/>
  <text x="102" y="461" class="lbl" font-size="14.5" fill="#3730A3">Near-zero fragmentation:</text>
  <text x="312" y="461" class="cap" font-size="12.5" fill="#475569">blocks are allocated on demand from a free list and shared across parallel samples via copy-on-write</text>
</svg>
