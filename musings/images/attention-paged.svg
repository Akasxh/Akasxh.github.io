  <text x="95" y="117" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4f46e5">Block 1</text>
  <text x="95" y="131" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(15,23,42,0.4)">tokens 16-31</text>

