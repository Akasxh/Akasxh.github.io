<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500">
  <defs>
    <linearGradient id="bgP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigoP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadowP">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowP" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#818cf8"/>
    </marker>
    <marker id="arrowAmberP" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <pattern id="dotsP" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#334155" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1100" height="500" fill="url(#bgP)"/>
  <rect width="1100" height="500" fill="url(#dotsP)"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0">PagedAttention: Virtual Memory for KV Cache</text>

  <!-- === Left: Logical KV Cache === -->
  <text x="130" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#818cf8">Logical KV Cache</text>
  <text x="130" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">"The cat sat on the mat"</text>

  <!-- 6 stacked blocks -->
  <rect x="55" y="95" width="150" height="50" rx="8" fill="#4f46e5" stroke="#818cf8" stroke-width="1.5" filter="url(#shadowP)"/>
  <text x="130" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fff" font-weight="bold">Block 0</text>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">"The cat"</text>

  <rect x="55" y="150" width="150" height="50" rx="8" fill="#4338ca" stroke="#818cf8" stroke-width="1.5" filter="url(#shadowP)"/>
  <text x="130" y="173" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fff" font-weight="bold">Block 1</text>
  <text x="130" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">"sat on"</text>

  <rect x="55" y="205" width="150" height="50" rx="8" fill="#4f46e5" stroke="#818cf8" stroke-width="1.5" filter="url(#shadowP)"/>
  <text x="130" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fff" font-weight="bold">Block 2</text>
  <text x="130" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">"the mat"</text>

  <rect x="55" y="260" width="150" height="50" rx="8" fill="#4338ca" stroke="#818cf8" stroke-width="1.5" filter="url(#shadowP)"/>
  <text x="130" y="283" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fff" font-weight="bold">Block 3</text>
  <text x="130" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">(continued)</text>

  <rect x="55" y="315" width="150" height="50" rx="8" fill="#4f46e5" stroke="#818cf8" stroke-width="1.5" filter="url(#shadowP)"/>
  <text x="130" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fff" font-weight="bold">Block 4</text>
  <text x="130" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">(continued)</text>

  <rect x="55" y="370" width="150" height="50" rx="8" fill="#4338ca" stroke="#818cf8" stroke-width="1.5" filter="url(#shadowP)"/>
  <text x="130" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fff" font-weight="bold">Block 5</text>
  <text x="130" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">(new tokens)</text>

  <!-- === Center: Block Table === -->
  <text x="420" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">Block Table</text>

  <!-- Table header -->
  <rect x="320" y="80" width="100" height="30" rx="4" fill="#92400e"/>
  <text x="370" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff">Logical</text>
  <rect x="420" y="80" width="100" height="30" rx="4" fill="#92400e"/>
  <text x="470" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff">Physical</text>

  <!-- Table rows -->
  <rect x="320" y="112" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="370" y="131" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">0</text>
  <rect x="420" y="112" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="470" y="131" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8">7</text>

  <rect x="320" y="142" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="370" y="161" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">1</text>
  <rect x="420" y="142" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="470" y="161" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8">2</text>

  <rect x="320" y="172" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="370" y="191" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">2</text>
  <rect x="420" y="172" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="470" y="191" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8">15</text>

  <rect x="320" y="202" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="370" y="221" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">3</text>
  <rect x="420" y="202" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="470" y="221" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8">11</text>

  <rect x="320" y="232" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="370" y="251" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">4</text>
  <rect x="420" y="232" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="470" y="251" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8">4</text>

  <rect x="320" y="262" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="370" y="281" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">5</text>
  <rect x="420" y="262" width="100" height="28" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="470" y="281" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8">19</text>

  <!-- Arrows from logical to block table -->
  <line x1="205" y1="120" x2="318" y2="126" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrowP)"/>
  <line x1="205" y1="175" x2="318" y2="156" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrowP)"/>
  <line x1="205" y1="230" x2="318" y2="186" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrowP)"/>
  <line x1="205" y1="285" x2="318" y2="216" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrowP)"/>
  <line x1="205" y1="340" x2="318" y2="246" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrowP)"/>
  <line x1="205" y1="395" x2="318" y2="276" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrowP)"/>

  <!-- === Right: Physical GPU Memory === -->
  <text x="830" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#22c55e">Physical GPU Memory</text>
  <text x="830" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Non-contiguous allocation</text>

  <!-- Grid of 24 blocks (6 cols x 4 rows) -->
  <!-- Row 1: blocks 0-5 -->
  <rect x="600" y="95" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="632" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">0</text>
  <rect x="672" y="95" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="704" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">1</text>
  <rect x="744" y="95" width="65" height="40" rx="4" fill="#4338ca" stroke="#818cf8" stroke-width="2"/><text x="776" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff" font-weight="bold">2</text>
  <rect x="816" y="95" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="848" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">3</text>
  <rect x="888" y="95" width="65" height="40" rx="4" fill="#4f46e5" stroke="#818cf8" stroke-width="2"/><text x="920" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff" font-weight="bold">4</text>
  <rect x="960" y="95" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="992" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">5</text>

  <!-- Row 2: blocks 6-11 -->
  <rect x="600" y="142" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="632" y="167" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">6</text>
  <rect x="672" y="142" width="65" height="40" rx="4" fill="#4f46e5" stroke="#818cf8" stroke-width="2"/><text x="704" y="167" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff" font-weight="bold">7</text>
  <rect x="744" y="142" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="776" y="167" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">8</text>
  <rect x="816" y="142" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="848" y="167" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">9</text>
  <rect x="888" y="142" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="920" y="167" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">10</text>
  <rect x="960" y="142" width="65" height="40" rx="4" fill="#4338ca" stroke="#818cf8" stroke-width="2"/><text x="992" y="167" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff" font-weight="bold">11</text>

  <!-- Row 3: blocks 12-17 -->
  <rect x="600" y="189" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="632" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">12</text>
  <rect x="672" y="189" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="704" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">13</text>
  <rect x="744" y="189" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="776" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">14</text>
  <rect x="816" y="189" width="65" height="40" rx="4" fill="#4f46e5" stroke="#818cf8" stroke-width="2"/><text x="848" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff" font-weight="bold">15</text>
  <rect x="888" y="189" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="920" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">16</text>
  <rect x="960" y="189" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="992" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">17</text>

  <!-- Row 4: blocks 18-23 -->
  <rect x="600" y="236" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="632" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">18</text>
  <rect x="672" y="236" width="65" height="40" rx="4" fill="#4338ca" stroke="#818cf8" stroke-width="2"/><text x="704" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff" font-weight="bold">19</text>
  <rect x="744" y="236" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="776" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">20</text>
  <rect x="816" y="236" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="848" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">21</text>
  <rect x="888" y="236" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="920" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">22</text>
  <rect x="960" y="236" width="65" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/><text x="992" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">23</text>

  <!-- Arrows from block table to physical blocks -->
  <line x1="522" y1="126" x2="670" y2="162" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmberP)"/>
  <line x1="522" y1="156" x2="742" y2="115" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmberP)"/>
  <line x1="522" y1="186" x2="814" y2="209" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmberP)"/>
  <line x1="522" y1="216" x2="958" y2="162" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmberP)"/>
  <line x1="522" y1="246" x2="886" y2="115" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmberP)"/>
  <line x1="522" y1="276" x2="670" y2="256" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmberP)"/>

  <!-- Free blocks label -->
  <rect x="730" y="290" width="200" height="26" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="738" y="296" width="14" height="14" rx="2" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="765" y="307" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">= Free</text>
