  <text x="785" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff">Shared</text>
  <text x="785" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fff">Blocks</text>

