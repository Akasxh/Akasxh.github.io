  <text x="857" y="307" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8">= Allocated</text>

  <!-- === Copy-on-Write annotation === -->
  <rect x="570" y="340" width="480" height="140" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadowP)"/>
  <text x="810" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#c084fc">Copy-on-Write (Beam Search)</text>

  <!-- Beam 1 -->
  <rect x="600" y="380" width="80" height="30" rx="6" fill="#4f46e5" opacity="0.8"/>
  <text x="640" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fff">Beam 1</text>

  <!-- Beam 2 -->
  <rect x="600" y="420" width="80" height="30" rx="6" fill="#7c3aed" opacity="0.8"/>
  <text x="640" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fff">Beam 2</text>

  <!-- Shared block -->
