  <rect x="525" y="175" width="55" height="35" rx="4" fill="#e5e7eb" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
  <text x="552" y="197" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(15,23,42,0.3)">used</text>

  <rect x="585" y="175" width="55" height="35" rx="4" fill="#e5e7eb" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
  <text x="612" y="197" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(15,23,42,0.3)">free</text>

  <rect x="645" y="175" width="55" height="35" rx="4" fill="#e5e7eb" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
  <text x="672" y="197" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(15,23,42,0.3)">free</text>

